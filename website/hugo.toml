baseURL = "https://intoolswetrust.github.io/jsignpdf/"
title    = "JSignPdf"

languageCode      = "en-us"
defaultContentLanguage = "en"
enableRobotsTXT   = true
enableGitInfo     = true
hasCJKLanguage    = false

# ---------------------------------------------------------------------------
# Hextra theme via Hugo modules
# ---------------------------------------------------------------------------
[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

# ---------------------------------------------------------------------------
# Hugo's exec policy locks down which binaries the renderer may call.
# We need `asciidoctor` for the .adoc guide.
# ---------------------------------------------------------------------------
[security]
  [security.exec]
    allow = ['^(dart-)?sass(-embedded)?$', '^go$', '^git$', '^npx$', '^postcss$', '^tailwindcss$', '^asciidoctor$']

# ---------------------------------------------------------------------------
# Markup: enable AsciiDoc through the asciidoctor CLI
# ---------------------------------------------------------------------------
[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

  [markup.asciidocExt]
    backend           = "html5"
    safeMode          = "unsafe"
    sectionNumbers    = false
    trace             = false
    verbose           = false
    workingFolderCurrent = true
    [markup.asciidocExt.attributes]
      # jsignpdf-version is substituted into the copied guide by prepare.sh
      # (sourced from the GitHub Releases API, or $JSIGNPDF_VERSION if set).
      icons             = "font"
      idprefix          = ""
      idseparator       = "-"
      # Ask asciidoctor to build a TOC. Hugo's AsciiDoc converter reads
      # that generated TOC to populate Page.Fragments.Headings, which is
      # exactly what Hextra's stock right-hand "On this page" partial
      # consumes — so enabling this is enough to get the sidebar TOC
      # working for the guide without any layout overrides.
      toc               = ""
      toclevels         = "3"

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
[menu]
  [[menu.main]]
    name     = "Guide"
    pageRef  = "/docs/guide"
    weight   = 1
  [[menu.main]]
    name     = "Screenshots"
    pageRef  = "/screenshots"
    weight   = 2
  [[menu.main]]
    name     = "Blog"
    pageRef  = "/blog"
    weight   = 3
  [[menu.main]]
    name     = "GitHub"
    weight   = 4
    url      = "https://github.com/intoolswetrust/jsignpdf"
    [menu.main.params]
      icon = "github"

# ---------------------------------------------------------------------------
# Hextra params
# ---------------------------------------------------------------------------
[params]
  description = "JSignPdf — sign PDF documents for free"

  [params.navbar]
    displayTitle = true
    displayLogo  = true
    [params.navbar.logo]
      path   = "img/signedpdf.png"
      link   = "/"
      width  = 28
      height = 28

  [params.theme]
    default       = "system"
    displayToggle = true

  [params.footer]
    enable           = true
    displayCopyright = true
    displayPoweredBy = false

  [params.editURL]
    enable = true
    base   = "https://github.com/intoolswetrust/jsignpdf/edit/master/website-hugo/content"
