# Bundled defaults for the advanced JSignPdf configuration.
# These values are the in-jvm fallback when the user has not set the
# corresponding key in <cfg>/advanced.properties, and the source for the
# Preferences dialog "Reset to defaults" action.
#
# DO NOT edit at runtime. User overrides live in <cfg>/advanced.properties.

# Identifier of the signing engine used by default. Use --list-engines to see
# the available identifiers. The user-config file <cfg>/advanced.properties may
# override this, and the CLI --engine flag overrides it for a single invocation.
engine=openpdf

# Engine-specific configuration. Each engine module reads its own keys under the
# engine.<id>.* prefix (via EngineConfig). No keys are defined for the bundled
# OpenPDF engine

# Path to a TTF/OTF font used to render the visible signature L2 text.
# Empty value -> JSignPdf uses the bundled DejaVuSans font.
font.path=

# Font name used when calling OpenPDF BaseFont.createFont. Empty value ->
# basename of font.path is used; falls back to the bundled font name.
font.name=

# Font encoding. Allowed: Cp1250, Cp1252, Cp1257, Identity-H, Identity-V,
# MacRoman. Empty -> WINANSI when font.path is set, Identity-H for the
# bundled DejaVuSans.
font.encoding=

# When true, expired or not-yet-valid certificates are filtered from the
# alias list.
certificate.checkValidity=true

# When true, only certificates whose KeyUsage includes digitalSignature
# or nonRepudiation are listed.
certificate.checkKeyUsage=true

# When true, certificates with critical extensions outside JSignPdf's
# known set (KeyUsage, SubjectAltName, BasicConstraints, CertificateIssuer,
# ExtendedKeyUsage) are rejected.
certificate.checkCriticalExtensions=false

# When true, hostname verification is disabled and all server certificates
# are trusted for TSA / OCSP / CRL traffic. Use only on trusted networks.
relax.ssl.security=false

# Comma-separated, ordered list of preview backends. The first library
# that succeeds is used. Allowed tokens: jpedal, pdfbox, openpdf.
pdf2image.libraries=jpedal,pdfbox,openpdf

# Default hash algorithm requested when stamping a signature with a TSA
# (used when the signer options don't override it).
tsa.hashAlgorithm=SHA-256

# DSS signing engine (PAdES). These knobs only matter when the 'dss' engine
# is selected and the requested PAdES level is LT/LTA (which embed revocation
# data). B and T work fully offline and ignore them.
#
# Fetch revocation data (OCSP/CRL) and intermediate certs (AIA) online.
# Required to produce LT/LTA. Default false keeps B/T fully offline.
engine.dss.online.enabled=false
# Use the default EU List Of Trusted Lists (LOTL) to build the trust anchors.
engine.dss.trust.useDefaultLotl=false
# Comma-separated lists of custom trust material.
engine.dss.trust.lotlUrls=
engine.dss.trust.certFiles=
engine.dss.trust.certUrls=
# Truststore holding trust anchors (type defaults to the JVM default).
engine.dss.trust.truststoreFile=
engine.dss.trust.truststoreType=
engine.dss.trust.truststorePassword=
#
# Bytes reserved in the PDF /Contents for the CMS signature. 0 (default) sizes
# it automatically from the certificate chain and options; set a positive value
# to force a fixed size. Raise it only if signing fails with a "signature size
# too small" error and retrying (below) is disabled.
engine.dss.contentSize=0
# Re-sign with a larger reservation if the reserved /Contents turns out too
# small. Enabled by default; each retry repeats signing (and refetches the TSA
# timestamp for level T and above).
engine.dss.retryOnUndersize=true
