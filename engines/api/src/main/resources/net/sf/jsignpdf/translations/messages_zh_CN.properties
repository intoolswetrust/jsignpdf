hlp.append=添加签章到已存在的文档。默认会覆盖已存在的签章(若有)。
hlp.bgPath=用于可见签章的背景图像路径
hlp.bgScale=可见签章的背景图像比例。正值以将图像大小乘以该值。负值以最适合调整大小。零值以用它填充整个背景 (拉伸)。
hlp.certLevel=认证层级。默认是不认证(NOT_CERTIFIED)。可用值为{0}
hlp.contact=签署者联系信息(签章的一部份)
hlp.crl=启用CRL证书验证
hlp.disableAcro6Layers=禁用Adobe® Acrobat 6图层模式 即所有签署图层都将被创建。Adobe® Acrobat 6及更高版本仅建议图层n2及n4展示。
hlp.disableAnnot=禁止修改加密文档中的注释
hlp.disableAssembly=禁止加密文档组合
hlp.disableContent=禁止修改加密文档内容
hlp.disableCopy=禁止复制加密文档
hlp.disableFill=禁止填写加密文档
hlp.disableScrRead=禁止加密文档的屏幕阅读器访问
hlp.enableStdinPasswords=允许从标准输入读取密码值。启用后,密码选项值为 '-' 表示：从标准输入读取一行（或在主控台上提示）。多个密码选项都可使用 '-', 并依固定顺序读取：--keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password。
hlp.encCert=凭证文件路径, 用于加密输出的PDF -encryption CERTIFICATE
hlp.encrypted=已被弃用, 请用 -encryption PASSWORD 取代!
hlp.encryption=输出PDF的加密模式 默认不加密(NONE)。可用值为{0}。当使用PASSWORD(密码)模式时须配合-upwd与-opwd , 及使用凭证模式(CERTIFICATE)时配合 -ec 使用
hlp.footer.examples=范例:\n---------\n$ jsignpdf -kst WINDOWS-MY mydocument.pdf\n-> 复制mydocument.pdf 以创建签署后的新文件 mydocument_signed.pdf , 将使用查找到保存于系统存放区的第一组证书。\n------------\n$ jsignpdf -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> 创建签署及加密的 mydocument_signed.pdf , 输出文件不允许打印。 将使用my_certificate.pfx中别名为 cert23 的证书密钥\n------------\n$ jsignpdf -lkt\n-> 列出支持的keystore类型\n------------\n$ jsignpdf -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> 给予keystore用于列出 my_certificate.pfx中所有证书密钥名称(别名)。启用安静模式(Quiet mode)以停止输出调试信息。
hlp.footer.exitCodes=进程退出状态代码:\n-------------------\n  0 进程正常运行\n  1 命令行格式错误\n  2 缺少参数 - 如:未提供要签署的文件\n  3 某些 (但不是全部) 文档的签名失败\n  4 全部文档的签名失败\n  5 无法读取输入档\n  6 通用错误
hlp.gui=(测试) 即使提供了其他命令行参数也总是显示 GUI
hlp.hashAlgorithm=用于签署的哈希(hash)算法。 默认为SHA1 , 可用值为{0}
hlp.header=JSignPdf 是一款设计用于对 PDF 文档进行数字签章的应用程序。如果您在没有任何命令行参数的情况下启动进程, 则会启动 GUI，您可以在命令行批量模式下使用 JSignPdf。
hlp.help=输出帮助接口
hlp.imgPath=可见签章的图像路径
hlp.keyAlias=凭证密钥的名称(别名), 当签署文档时必要。若此选项未提供, 默认将使用keystore中第一个发现的密钥。(使用 -lk 列出所有凭证密钥的别名)
hlp.keyIndex=从零开始的密钥索引，用于签署文档。如果既没有给出此选项也没有给出别名，则使用密钥库中的第一个密钥 (索引 = 0)。 (使用 -lk 列出密钥别名)。此选项的优先性低于别名。
hlp.keyPwd=keystore中私钥的密码。此选项通常不需提供 - 仅在私钥使用密码保护时，用于以防万一 :) 使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.ksFile=配置Keystore文件 - 当私钥存盘于文件(.p12, .pfx, .jks, ...)时数值可能为路径。有些keystore不会存放密钥于文件(如:windows凭证存放区 - WINDOWS-MY)则不使用此选项。
hlp.ksPwd=KeyStore的密码。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.ksType=KeyStore类型(您可以使用 -lkt 参数列出所有此选项支持的值)
hlp.l2Text=签章文本，您也可以使用占位符使用签章信息 (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=可见签章的字体大小，默认值为{0}
hlp.l4Text=状态文本
hlp.listKeys=列出选择的keystore中所有凭证密钥
hlp.listKsTypes=列出所有用于 -kst 选项支持的keystore类型
hlp.loadProperties=从(由 GUI 应用程序创建的)默认文件加载属性。
hlp.loadPropertiesFile=从给定文件加载属性。可以通过复制 GUI 在用户主目录中创建的默认属性文件 (.JSignPdf) 来创建该文件。
hlp.location=签署地点 (例如华盛顿特区 Washington DC)。默认为空。
hlp.ocsp=启用OCSP凭证验证
hlp.ocspServerUrl=默认OCSP服务器URL，将在无法从凭证取得此信息时使用
hlp.outPath=将保存签署文档的文件夹。默认值为当前文件夹。
hlp.outPrefix=已签署文档的前缀。默认值为空前缀。
hlp.outSuffix=已签署文档的后缀。默认值为"_signed"。(如:输入文件为mydocument.pdf则输出文件将会创建为mydocument_signed.pdf)
hlp.ownerpwd=加密文档的拥有者密码 (当给定 -e 参数时使用)。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.page=显示可见签章的页面。 默认值为 1 (第一页)。如果页面数字超出文档的所有最后一页，将使用(放置)于最后一页。
hlp.posLLX=可见签署的左下角X坐标 (从页宽减去负值)
hlp.posLLY=可见签署的左下角Y坐标 (从页高减去负值)
hlp.posURX=可见签署的右上角X坐标 (从页宽减去负值)
hlp.posURY=可见签署的右上角Y坐标 (从页高减去负值)
hlp.printRight=是否允许打印。用于加密文档。默认值为 ALLOW_PRINTING。可用值为 {0}
hlp.proxyHost=代理服务器的域名或IP地址
hlp.proxyPort=代理服务器的端口，默认值为{0}
hlp.proxyType=网络连接的代理方法。默认值为{0}。可用值为{1}
hlp.quiet=安静模式 - 运行时无详细(INFO)消息
hlp.signerName=签署者名称. 默认为选择之凭证主旨中的通用名称(CN).
hlp.reason=签署原因. 默认为空.
hlp.renderMode=可见签署的渲染模式。 默认为仅描述模式(DESCRIPTION_ONLY)。可用值为 {0}
hlp.tsaAuthn=TSA服务器的认证方式。默认为不认证(NONE)。可用值为 {0}
hlp.tsaCertFile=keystore文件路径，应包含用于TSA服务器认证用的私钥，当使用TSA服务器使用凭证(CERTIFICATE)方法验证时使用
hlp.tsaCertFileType=TSA服务器凭证认证(CERTIFICATE)的keystore类型 - 默认为PKCS12
hlp.tsaCertPasswd=访问(用于-tscf选项的)PKCS#12文件存放的私钥密码。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.tsaHashAlg=用于时间戳(TSA)服务器查找的哈希(Hash)算法; 默认为{0}
hlp.tsaPolicy=TSA政策 OID 应该被配置用于时间戳请求。
hlp.tsaPwd=TSA用户密码。 当使用时间戳(TSA, -ts)且TSA服务器要求验证时使用。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.tsaUrl=时间戳(TSA)服务器地址。若使用此选项时间戳将包含签章。 (若用于测试目的 您可以使用此URL: http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=TSA用户名。 当使用时间戳且TSA服务器要求验证时使用。
hlp.userpwd=加密文档的用户密码(当启用-e选项时使用)。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.version=显示应用程序版本
hlp.visible=启用可见签章
extcsp.nocert=并未在keystore中找到凭证, 错误: {0}
extcsp.nohost=无法连接到签署服务器 - 未知的域名 {0}:{1}
extcsp.iohost=无法连接到签署服务器 - 连接错误: {0}
