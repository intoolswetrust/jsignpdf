name: Do Release

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Version to be released (e.g. 3.1.0).'
        required: true
      next-snapshot-version:
        description: 'Version to be set after the release - without the -SNAPSHOT suffix (e.g. 3.2.0).'
        required: true

env:
  GIT_AUTHOR_NAME: Flash Gordon
  GIT_AUTHOR_EMAIL: <>
  GIT_COMMITTER_NAME: Terminator the Kitty
  GIT_COMMITTER_EMAIL: <>

# Cancel a previous workflow on the same ref (e.g. when re-running a release
# manually). We do NOT cancel in-progress runs — a half-finished release would
# leave Maven Central and SourceForge in an inconsistent state.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  do-release:
    # Tags the repo, deploys the library jar to Maven Central, and assembles
    # the cross-platform full + minimal ZIPs from the unshaded build. The ZIPs
    # are the inputs the per-platform matrix builds on (jpackage scripts read
    # distribution/target/appassembler), and the full ZIP is the Flatpak input.
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.maven_release.outputs.TAG }}
      version: ${{ steps.maven_release.outputs.VERSION }}
      base-version: ${{ steps.maven_release.outputs.BASE_VERSION }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Verify release notes file exists
      run: |
        VERSION=${{ github.event.inputs.release-version }}
        BASE_VERSION="${VERSION%%-*}"
        NOTES_FILE="distribution/doc/release-notes/${BASE_VERSION}.md"
        if [ ! -f "$NOTES_FILE" ]; then
          echo "::error::Release notes file not found: $NOTES_FILE"
          echo "Create it before triggering the release workflow."
          exit 1
        fi
        echo "Found release notes: $NOTES_FILE"

    - name: Set up Java and credentials
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'
        server-id: ossrh
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        gpg-passphrase: MAVEN_GPG_PASSPHRASE
        cache: 'maven'

    - name: Do the Maven release and assemble cross-platform ZIPs
      id: maven_release
      run: |
        VERSION=${{ github.event.inputs.release-version }}
        BASE_VERSION="${VERSION%%-*}"
        FULL_VERSION="JSignPdf-$VERSION"
        NEXT_VERSION=${{ github.event.inputs.next-snapshot-version }}-SNAPSHOT
        TAG=JSignPdf_${VERSION//\./_}
        set -x
        mvn --batch-mode clean install
        mvn -P release --batch-mode "-Dtag=${TAG}" release:prepare \
                 "-DreleaseVersion=${VERSION}" \
                 "-DdevelopmentVersion=${NEXT_VERSION}"
        mvn -P release --batch-mode release:perform \
            -DstagingProgressTimeoutMinutes=30 -Dmaven.wagon.rto=7200000 \
            -Dmaven.wagon.httpconnectionManager.maxPerRoute=60 -Dmaven.wagon.httpconnectionManager.maxTotal=100
        cd distribution/target
        ls -R
        mkdir -p upload
        cp "jsignpdf-${VERSION}-full.zip"    "upload/jsignpdf-${VERSION}-full.zip"
        cp "jsignpdf-${VERSION}-minimal.zip" "upload/jsignpdf-${VERSION}-minimal.zip"
        cp generated-docs/JSignPdf.pdf "upload/$FULL_VERSION.pdf"
        cp "../doc/release-notes/${BASE_VERSION}.md" upload/README.md
        echo "TAG=$TAG" >> $GITHUB_OUTPUT
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_OUTPUT
      env:
        MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

    - name: Stage cross-platform ZIPs + PDF + README for the publish job
      uses: actions/upload-artifact@v7
      with:
        name: jsignpdf-crossplatform-assets
        path: distribution/target/upload/*
        if-no-files-found: error
        retention-days: 1

    - name: Publish PDF guide for downstream jobs
      uses: actions/upload-artifact@v7
      with:
        name: jsignpdf-pdf-guide
        path: distribution/target/generated-docs/JSignPdf.pdf
        if-no-files-found: error
        retention-days: 1

    - name: Publish full ZIP for the Flatpak builder
      uses: actions/upload-artifact@v7
      with:
        name: jsignpdf-full-zip
        path: distribution/target/jsignpdf-${{ github.event.inputs.release-version }}-full.zip
        if-no-files-found: error
        retention-days: 1

  package:
    # Per-platform native installers via jpackage. Each runner rebuilds the
    # distribution module locally (cheap thanks to the Maven cache) and then
    # runs the platform script from distribution/{windows,linux,macos}/.
    #
    # fail-fast: false so a single broken platform doesn't abort the others
    # mid-release. macOS DMGs are unsigned in 3.1 — see design-doc/3.1-no-fat-jar.md.
    needs: do-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            label: windows-x64
            script: ./distribution/windows/build-windows-installers.ps1
            signpath: true
          - os: ubuntu-24.04
            label: linux-x64
            script: ./distribution/linux/build-linux-installers.sh
            signpath: false
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            script: ./distribution/linux/build-linux-installers.sh
            signpath: false
            # OpenJFX 21 does not publish linux-aarch64 classifier jars on Maven Central.
            # Force the linux (x86_64) classifier for compilation; the actual arm64 JFX
            # runtime comes from the bundled Zulu+FX JDK via jpackage.
            maven-extra-args: -Djavafx.platform=linux
          - os: macos-13
            label: macos-x64
            script: ./distribution/macos/build-macos-installers.sh
            signpath: false
          - os: macos-14
            label: macos-aarch64
            script: ./distribution/macos/build-macos-installers.sh
            signpath: false
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.do-release.outputs.version }}
    steps:
    - name: Checkout release tag
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.do-release.outputs.tag }}

    # jpackage runs need JavaFX modules in the bundled runtime image, so we
    # consume Azul Zulu+FX (java-package: jdk+fx). Temurin does not ship JFX.
    - name: Set up Zulu+FX 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'zulu'
        java-package: 'jdk+fx'
        cache: 'maven'

    - name: Install Linux packaging tools
      if: startsWith(matrix.os, 'ubuntu-')
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y fakeroot rpm

    - name: Build the distribution staging (appassembler/lib + ZIPs)
      shell: bash
      run: mvn -B -DskipTests -pl distribution -am package ${{ matrix.maven-extra-args }}

    - name: Download PDF guide
      uses: actions/download-artifact@v8
      with:
        name: jsignpdf-pdf-guide
        path: distribution/target/pdf-guide

    - name: Build native installers
      # `shell:` cannot reference matrix.* at step level, and the PS1 needs
      # PowerShell while the .sh scripts want bash. Bash is preinstalled on
      # the Windows runner, so we dispatch from bash and shell out to pwsh
      # for the PowerShell entry point.
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          pwsh -File ${{ matrix.script }} -Version "$VERSION"
        else
          ${{ matrix.script }} "$VERSION"
        fi

    # Windows artifacts go through SignPath before they're handed to the
    # publish job. Other platforms upload directly.
    - name: Upload unsigned Windows installers for SignPath
      if: matrix.signpath
      id: upload-unsigned-windows
      uses: actions/upload-artifact@v7
      with:
        name: jsignpdf-windows-assets-unsigned
        path: distribution/target/upload/*
        if-no-files-found: error
        retention-days: 1

    - name: Submit signing request to SignPath
      if: matrix.signpath
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '8d0ef437-1c25-49c6-9954-ed7fe51f9df8'
        project-slug: 'jsignpdf'
        signing-policy-slug: 'test-signing'
        artifact-configuration-slug: 'zip'
        github-artifact-id: '${{ steps.upload-unsigned-windows.outputs.artifact-id }}'
        wait-for-completion: true
        output-artifact-directory: 'distribution/target/signed'

    - name: Stage signed Windows installers for publish
      if: matrix.signpath
      uses: actions/upload-artifact@v7
      with:
        name: jsignpdf-platform-assets-${{ matrix.label }}
        path: distribution/target/signed/*
        if-no-files-found: error
        retention-days: 1

    - name: Stage platform installers for publish
      if: ${{ !matrix.signpath }}
      uses: actions/upload-artifact@v7
      with:
        name: jsignpdf-platform-assets-${{ matrix.label }}
        path: distribution/target/upload/*
        if-no-files-found: error
        retention-days: 1

  flatpak:
    # Builds Flatpak bundles for both x86_64 and aarch64 from the cross-platform
    # full ZIP. JavaFX lives inside the ZIP for the x86_64 case; aarch64 falls
    # through to Swing because OpenJFX 21 does not publish linux-aarch64
    # classifier jars on Maven Central.
    needs: do-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.do-release.outputs.version }}
    steps:
    - name: Checkout release tag
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.do-release.outputs.tag }}

    - name: Download full ZIP
      uses: actions/download-artifact@v8
      with:
        name: jsignpdf-full-zip
        path: flatpak-input

    - name: Cache Flatpak SDK
      uses: actions/cache@v5
      with:
        path: ~/.local/share/flatpak
        key: flatpak-sdk-25.08-${{ matrix.arch }}

    - name: Install Flatpak and build tools
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y flatpak flatpak-builder
        flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
        # SDK version must match runtime-version in distribution/linux/flatpak/io.github.intoolswetrust.JSignPdf.yaml
        flatpak install --user -y --noninteractive flathub \
          org.freedesktop.Platform//25.08 \
          org.freedesktop.Sdk//25.08 \
          org.freedesktop.Sdk.Extension.openjdk21//25.08

    - name: Patch manifest to use local zip
      run: |
        set -euo pipefail
        MANIFEST=distribution/linux/flatpak/io.github.intoolswetrust.JSignPdf.yaml
        ZIP_NAME=jsignpdf-${VERSION}-full.zip
        SHA256=$(sha256sum "flatpak-input/${ZIP_NAME}" | awk '{print $1}')
        cp "flatpak-input/${ZIP_NAME}" distribution/linux/flatpak/
        sed -i \
          "s|^        url:.*\.zip|        path: ${ZIP_NAME}|" \
          "${MANIFEST}"
        grep -q "path: ${ZIP_NAME}" "${MANIFEST}" \
          || { echo "::error::URL sed patch did not match — check manifest indentation"; exit 1; }
        sed -i \
          "s|sha256: [a-f0-9]\{64\}|sha256: ${SHA256}|" \
          "${MANIFEST}"
        grep -q "sha256: ${SHA256}" "${MANIFEST}" \
          || { echo "::error::sha256 sed patch did not match"; exit 1; }

    - name: Build Flatpak bundle
      run: |
        set -euo pipefail
        BUNDLE_NAME=jsignpdf-${VERSION}-linux-${{ matrix.arch }}.flatpak
        cd distribution/linux/flatpak
        flatpak-builder --user --repo=flatpak-repo --force-clean --disable-rofiles-fuse build-dir \
          io.github.intoolswetrust.JSignPdf.yaml
        flatpak build-bundle flatpak-repo "${BUNDLE_NAME}" \
          io.github.intoolswetrust.JSignPdf
        mkdir -p upload
        mv "${BUNDLE_NAME}" upload/

    - name: Stage Flatpak bundle for publish job
      uses: actions/upload-artifact@v7
      with:
        name: jsignpdf-flatpak-assets-${{ matrix.arch }}
        path: distribution/linux/flatpak/upload/*
        if-no-files-found: error
        retention-days: 1

  publish-release:
    # Collects every per-platform asset, computes SHA-256 checksums, mirrors to
    # SourceForge, and creates the GitHub Release. Flatpak is optional: if its
    # job failed (e.g. SDK extension outage) we still publish the rest.
    needs: [do-release, package, flatpak]
    if: |
      always()
      && needs.do-release.result == 'success'
      && needs.package.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TAG: ${{ needs.do-release.outputs.tag }}
      VERSION: ${{ needs.do-release.outputs.version }}
      BASE_VERSION: ${{ needs.do-release.outputs.base-version }}
      FULL_VERSION: JSignPdf-${{ needs.do-release.outputs.version }}
    steps:
    - name: Checkout release tag
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.do-release.outputs.tag }}

    - name: Download cross-platform assets (ZIPs + PDF guide + README)
      uses: actions/download-artifact@v8
      with:
        name: jsignpdf-crossplatform-assets
        path: release-assets/JSignPdf-${{ needs.do-release.outputs.version }}

    - name: Download per-platform installers
      uses: actions/download-artifact@v8
      with:
        pattern: jsignpdf-platform-assets-*
        merge-multiple: true
        path: release-assets/JSignPdf-${{ needs.do-release.outputs.version }}

    - name: Download Flatpak bundles
      if: needs.flatpak.result == 'success'
      uses: actions/download-artifact@v8
      with:
        pattern: jsignpdf-flatpak-assets-*
        merge-multiple: true
        path: release-assets/JSignPdf-${{ needs.do-release.outputs.version }}

    - name: Compute SHA-256 checksums
      run: |
        set -euo pipefail
        cd "release-assets/$FULL_VERSION"
        # Hash every shipped asset except the checksums file itself.
        find . -maxdepth 1 -type f \
          ! -name '*-SHA256SUMS.txt' \
          -printf '%f\n' | sort | xargs sha256sum > "jsignpdf-${VERSION}-SHA256SUMS.txt"
        echo "Generated jsignpdf-${VERSION}-SHA256SUMS.txt:"
        cat "jsignpdf-${VERSION}-SHA256SUMS.txt"

    - name: List staged assets
      run: ls -R release-assets

    - name: Upload all assets to SourceForge
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        set -euo pipefail
        echo "$SSH_PRIVATE_KEY" > private_key
        chmod 600 private_key
        cd release-assets
        sftp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ../private_key kwart@frs.sourceforge.net:/home/frs/project/jsignpdf/stable <<EOF
        put -R "${FULL_VERSION}"
        exit
        EOF
        cd ..
        rm -f private_key

    - name: Create GitHub release with all assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        NOTES_FILE="distribution/doc/release-notes/${BASE_VERSION}.md"
        if [ ! -f "$NOTES_FILE" ]; then
          echo "::error::Release notes file not found at $NOTES_FILE"
          exit 1
        fi
        # Delete any pre-existing release so we publish a single release event
        # with the correct body and the full asset set in one shot.
        if gh release view "$TAG" >/dev/null 2>&1; then
          gh release delete "$TAG" --yes --cleanup-tag=false
        fi
        shopt -s nullglob
        assets=(release-assets/"$FULL_VERSION"/*)
        if [ ${#assets[@]} -eq 0 ]; then
          echo "::error::No assets found under release-assets/$FULL_VERSION/"
          exit 1
        fi
        prerelease_flag=()
        shopt -s nocasematch
        if [[ "$VERSION" == *ALPHA* || "$VERSION" == *BETA* || "$VERSION" == *RC* || "$VERSION" == *MILESTONE* ]]; then
          prerelease_flag=(--prerelease)
        fi
        shopt -u nocasematch
        gh release create "$TAG" \
          --title "$TAG" \
          --notes-file "$NOTES_FILE" \
          "${prerelease_flag[@]}" \
          "${assets[@]}"
