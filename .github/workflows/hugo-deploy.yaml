name: Hugo (website-hugo prototype)

# Prototype workflow for the Hextra/Hugo migration.
# Manual-only for now so it doesn't fight with doc-builder.yaml.
# Once you're happy with it, switch the trigger to `push` on master and
# delete the old Docusaurus workflow.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.138.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # for enableGitInfo

      - name: Install Hugo (extended)
        run: |
          curl -sSL -o /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo install /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Install Asciidoctor
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - id: pages
        uses: actions/configure-pages@v5

      - name: Prepare guide content
        working-directory: website-hugo
        run: ./prepare.sh

      - name: Resolve Hugo modules
        working-directory: website-hugo
        run: hugo mod get -u ./...

      - name: Build site
        working-directory: website-hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website-hugo/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
