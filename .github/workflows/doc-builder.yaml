name: Build and deploy website

on:
  push:
    branches:
      - master
    paths:
      - 'website/**'
      - '.github/workflows/doc-builder.yaml'
  release:
    types: [published]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# in-progress run and the latest queued. Do NOT cancel in-progress runs as we
# want production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.138.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # for hugo's enableGitInfo

      - name: Install Hugo (extended)
        run: |
          curl -sSL -o /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
          sudo install /tmp/hugo /usr/local/bin/hugo
          hugo version

      - name: Install Asciidoctor
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - id: pages
        uses: actions/configure-pages@v5

      - name: Prepare guide content
        working-directory: website
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./prepare.sh

      - name: Resolve Hugo modules
        working-directory: website
        run: hugo mod get -u ./...

      - name: Build site
        working-directory: website
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
