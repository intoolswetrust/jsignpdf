hlp.ksType=define o tipo de KeyStore (voc\u00EA pode listar os valores poss\u00EDveis para esta op\u00E7\u00E3o -lkt argumento)
hlp.footer.examples=Exemplos:\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\n-> cria c\u00F3pia do mydocument.pdf com o nome mydocument_signed.pdf, assinado digitalmente com o primeiro certificado encontrado no certificado armazenado padr\u00E3o do sistema operativo\n------------\njava -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> cria ficheiro assinado e encriptado mydocument_signed.pdf, a impress\u00E3o do novo ficheiro n\u00E3o \u00E9 permitida. Para assinatura \u00E9 utilizada chave com o apelido cert23 do ficheiro my_certificate.pfx\n------------\n$ java -jar JSignPdf.jar -lkt\n-> lista os tipos de armazenamento de chaves\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> lista nomes (aliases) de chaves armazenadas no ficheiro my_certificate.pfx utilizando a palavra-passe para keystore. O modo silencioso \u00E9 ativado para que nenhuma informa\u00E7\u00E3o de depura\u00E7\u00E3o seja impressa.
hlp.hashAlgorithm=algoritmo de hash usado para assinatura. O valor padr\u00E3o \u00E9 SHA1. Os valores dispon\u00EDveis s\u00E3o {0}
hlp.header=JSignPdf \u00E9 um sistema desenvolvido para assinar digitalmente documentos PDF. Se iniciar o programa sem nenhum argumento de linha de comando, a GUI ser\u00E1 iniciada, caso contr\u00E1rio, pode usar JSignPdf no modo de lote de linha de comando.
hlp.help=imprime esta tela de ajuda
hlp.imgPath=caminho da imagem para assinatura vis\u00EDvel
hlp.keyAlias=nome (apelido) da chave, que deve ser usada para assinar o documento. Se esta op\u00E7\u00E3o n\u00E3o for dada, \u00E9 utilizada a primeira chave do armazenamento de chaves. (Liste os apelidos da chave usando -lk)
hlp.keyIndex=\u00EDndice zero da chave, que deve ser usado para assinar o documento. Se nem essa op\u00E7\u00E3o nem o apelido forem informados, \u00E9 utilizada a primeira chave (\u00EDndice=0) do armazenamento de chaves. (Liste os apelidos de chave usando -lk). Esta op\u00E7\u00E3o tem prioridade menor do que o apelido.
hlp.keyPwd=senha da chave no armazenamento de chaves. Na maioria dos casos, voc\u00EA n\u00E3o precisa definir esta op\u00E7\u00E3o - apenas o armazenamento de chaves \u00E9 protegido por uma senha, mas apenas neste caso :)
hlp.l2Text=texto de assinatura, voc\u00EA tamb\u00E9m pode usar vari\u00E1veis de posi\u00E7\u00E3o para propriedades de assinatura (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=tamanho da fonte para texto de assinatura vis\u00EDvel, o valor padr\u00E3o \u00E9 {0}
hlp.l4Text=texto de status
hlp.listKeys=lista as chaves no armazenamento de chaves escolhido
hlp.loadPropertiesFile=Carrega propriedades do ficheiro fornecido. O ficheiro pode ser criado copiando o ficheiro de propriedades padr\u00E3o .JSignPdf criado pela GUI no diret\u00F3rio inicial do usu\u00E1rio.
hlp.ksPwd=senha para KeyStore
hlp.ocsp=habilitar valida\u00E7\u00E3o de certificado OCSP
hlp.outPath=pasta em que os documentos assinados ser\u00E3o armazenados. O valor padr\u00E3o \u00E9 a pasta atual.
hlp.outPrefix=prefixo para ficheiro assinado. O valor padr\u00E3o \u00E9 o prefixo vazio.
hlp.ownerpwd=senha do propriet\u00E1rio para documentos criptografados (usada quando a op\u00E7\u00E3o -e \u00E9 fornecida)
hlp.page=p\u00E1gina com assinatura vis\u00EDvel. O valor padr\u00E3o \u00E9 1 (primeira p\u00E1gina). Se o n\u00FAmero da p\u00E1gina fornecido estiver fora dos limites, a \u00FAltima p\u00E1gina ser\u00E1 usada.
hlp.posLLX=posi\u00E7\u00E3o do canto esquerdo inferior no eixo X de uma assinatura vis\u00EDvel (valor negativo \u00E9 subtra\u00EDdo da largura da p\u00E1gina)
hlp.tsaCertFile=caminho para o ficheiro keystore, que cont\u00E9m a chave privada usada para autentica\u00E7\u00E3o no servidor TSA, quando o m\u00E9todo de autentica\u00E7\u00E3o CERTIFICATE \u00E9 usado
hlp.tsaCertFileType=tipo de armazenamento de chaves para autentica\u00E7\u00E3o do CERTIFICADO TSA - o padr\u00E3o \u00E9 PKCS12
hlp.tsaCertPasswd=senha usada para abrir o ficheiro PKCS#12 (ver op\u00E7\u00E3o -tscf) com uma chave privada
hlp.tsaHashAlg=algoritmo de hash usado na consulta ao servidor de carimbo de tempo (TSA); o padr\u00E3o \u00E9 {0}
hlp.tsaPolicy=Pol\u00EDtica TSA OID que deve ser definida para pedido de carimbo de tempo.
hlp.tsaPwd=Senha de usu\u00E1rio TSA. Use essa op\u00E7\u00E3o se voc\u00EA usar carimbo de tempo (-ts) e o servidor TSA exigir autentica\u00E7\u00E3o.
hlp.tsaUrl=endere\u00E7o do servidor de carimbo de tempo (TSA). Se voc\u00EA usar este argumento, o carimbo de tempo ser\u00E1 inclu\u00EDdo na assinatura. (Para fins de teste, voc\u00EA pode tentar o seguinte URL http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=Nome de usu\u00E1rio TSA. Use essa op\u00E7\u00E3o se voc\u00EA usar carimbo de tempo (-ts) e o servidor TSA exigir autentica\u00E7\u00E3o.
hlp.userpwd=senha de usu\u00E1rio para documentos criptografados (usada quando a op\u00E7\u00E3o -e \u00E9 fornecida)
extcsp.certfactory=Falha ao criar uma inst\u00E2ncia de CertificateFactory
extcsp.nosignatureerr=Erro de assinatura, o armazenamento de chaves retornou um erro: {0}
extcsp.unknownhashalg=O algoritmo de impress\u00E3o digital/hash fornecido ({0}) n\u00E3o \u00E9 compat\u00EDvel
