hlp.footer.examples=Príklady:\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\n-> vytvorí digitálne podpísanú kópiu súboru mydocument.pdf s názvom mydocument_signed.pdf. Podpis je vytvorený pomocou prvého osobného certifikátu nájdeného vo východiskovom úložisku certifikátov systému Windows\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> vytvorí podpísaný a zašifrovaný súbor mydocument_signed.pdf, tlač podpísaného dokumentu je zákázaná. Pre podpis je použitý kľúč s menom cert23 z úložiska typu PKCS12 v súbore my_certificate.pfx\n------------\n$ java -jar JSignPdf.jar -lkt\n-> vypíše typy úložísk\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> vypíše mená (aliasy) kľúčov uložených v úložisku my_certificate.pfx. Pre prístup do úložiska je použité heslo. Je použitý tichý mód, takže nebudú vytlačené žiadne dodatočné informácie.
