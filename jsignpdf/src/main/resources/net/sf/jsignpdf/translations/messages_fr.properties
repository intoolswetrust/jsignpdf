hlp.enableStdinPasswords=autorise la lecture des mots de passe depuis l'entrée standard. Lorsqu'activée, la valeur « - » d'une option de mot de passe signifie : lire une ligne depuis l'entrée standard (ou la demander sur une console). Plusieurs options peuvent utiliser « - » ; elles sont lues dans l'ordre fixe : --keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password.
hlp.encCert=chemin vers le fichier de certificat utilisé pour chiffrer le PDF de sortie en cas de -encryption CERTIFICATE
hlp.encryption=mode de chiffrement pour le PDF de sortie. La valeur par défaut est NONE. Les valeurs possibles sont {0}. À utiliser avec -upwd et -opwd en mode PASSWORD, et avec -ec en mode CERTIFICATE
hlp.footer.exitCodes=Codes de sortie du programme :\\r\\n-------------------\\r\\n  0 programme terminé sans erreur\\r\\n  1 ligne de commande mal formée\\r\\n  2 aucune opération demandée - par exemple aucun fichier à signer fourni\\r\\n  3 la signature de certains fichiers (mais pas tous) a échoué\\r\\n  4 la signature de tous les fichiers a échoué
hlp.gui=(beta) afficher l'interface graphique même lorsque d'autres arguments de ligne de commande sont fournis
hlp.signerName=nom du signataire. Par défaut, il s'agit du nom commun (CN) du certificat choisi.
hlp.tsaAuthn=méthode d'authentification utilisée lors de la connexion au serveur TSA. La valeur par défaut est NONE. Les valeurs possibles sont {0}
hlp.tsaCertFile=chemin vers le fichier keystore contenant la clé privée utilisée pour l'authentification auprès du serveur TSA, quand la méthode d'authentification CERTIFICATE est utilisée
hlp.tsaCertFileType=type de keystore pour l'authentification TSA CERTIFICATE - la valeur par défaut est PKCS12
hlp.tsaCertPasswd=mot de passe utilisé pour ouvrir le fichier PKCS#12 (voir l'option -tscf) avec une clé privée. Utilisez « - » pour lire depuis l'entrée standard (nécessite --enable-stdin-passwords).
hlp.tsaHashAlg=algorithme de hachage utilisé dans la requête au serveur d'horodatage (TSA) ; la valeur par défaut est {0}
console.stdinSentinelWarning=[jsignpdf] Avertissement : la valeur de --{0} correspond à la sentinelle stdin, mais --{1} n'a pas été fournie. Utilisée comme mot de passe littéral.
