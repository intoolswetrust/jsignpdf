hlp.append=Ajoute une signature à celles existantes. Par défaut, les signatures existantes sont remplacées par la nouvelle
hlp.bgPath=Chemin de l'image d'arrière plan pour matérialiser une signature dans le document PDF.
hlp.bgScale=Image d'arrière plan pour matérialiser une signature dans un document PDF. Inserrer une valeur positive pour multiplier la taille de l' image par cette valeur.\nInserrer une valeur nulle pour remplir tout l'arrière plan avec l'image (extensibilité).\nInserrer une valeur négative pour optimiser le remplissage.
hlp.certLevel=Niveau de certification. Par défaut, la valeur est NOT_CERTIFIED. Les valeurs autorisées sont {0}.
hlp.contact=Détails des coordonnées de contact du signataire.
hlp.crl=Autoriser la validation par liste de révocation de certificats
hlp.disableAcro6Layers=Désactive le mode de calque d'Acrobat 6 i.e. tous les calques de signatures seront créer. Les versions d'Acrobat 6.0 et supérieures recommandent que seuls les calques de niveau 2 et 4 soient présents. 
hlp.disableAnnot=Interdit la modification des annotations des documents chiffrés/signés
hlp.disableAssembly=Interdit l'assemblage de documents chiffrés/signés
hlp.disableContent=Interdit la modification du contenu des documents chiffrés/signés
hlp.disableCopy=Interdit la copie du documents chiffrés/signés
hlp.disableFill=Interdit l'enrichissement des documents chiffrés/signés
hlp.disableScrRead=Interdit les lecteurs d'écran dans les documents chiffrés/signés
hlp.encrypted=Permet le chiffrement du PDF et autorise la restrictions des droits d'accès. Utiliseer cette option avec -opwd (mot de passe du propriétaire) and -upwd (mot de passe de l'utilisateur).
hlp.footer.examples=Exemples:\r\n---------\r\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\r\n-> crée une copie de mydocument.pdf et le renomme mydocument_signed.pdf, qui est signé numériquement avec le premier certificat trouvé dans le magasin WIndows\r\n------------\r\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\r\n-> crée un fichier signé et chiffré mydocument_signed.pdf, dont l'imression est interdite. Pour la signature , la clé ayant pour alias cert23 et issue du magasin de type fichier nommé my_certificate.pfx\r\n------------\r\n$ java -jar JSignPdf.jar -lkt\r\n-> liste des types de magasins de certificats\r\n------------\r\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\r\n-> liste les noms (alias) des clés stockées dans le magasin my_certificate.pfx protégé par mot de passe. Le mode silencieux est activé, aucune information de débogage ne sera affichée.
hlp.hashAlgorithm=Algorithme de hashage utilisé pour la signature. La  valeur par défaut est l'algorythme SHA1. Les valeurs autorisées sont {0}
hlp.header=JSignpdf est une application conçue pour signer numériquement des documents PDF. Si vous exécutez le programme sans aucun paramètre dans la ligne de commande, l'interface graphique de l'utilisateur (GUI) s'affiche, sinon vous pouvez également utiliser JSignPdf dans une console / un shell de commande.
hlp.help=Imprime cette page d'aide
hlp.imgPath=Chemin de l'image matérialisant une signature visible dans le document PDF 
hlp.keyAlias=Le nom d'alias de la clé, qui doit être utilisée pour la signautre des documents. Si cette option n'est pas renseignée, la première clé du magasin de certificats est utilisée (Lister les aliases de clé en utilisant -lk).
hlp.keyIndex=Index des clés débutanjt à zero, qui doit être utiliser pour signer les documents. Si aucune option ou aucun alias n'est renseigné, la premiere clé (index=0) du magasin de certificats est utilisée (Lister les aliases de clé en utilisant -lk).
hlp.keyPwd=Mot de passe du certificat contenu dans le magasin de certificats même si ce dernier est aussi protégé par un mot de passe. Utilisez « - » pour lire depuis l'entrée standard (nécessite --enable-stdin-passwords).
hlp.ksFile=Paramètre du fichier du magasin de certificats (ou répertoire contenant les certificats logiciels (.p12, .pfx, .jks...)
hlp.ksPwd=Mot de passe du magasin de certificats. Utilisez « - » pour lire depuis l'entrée standard (nécessite --enable-stdin-passwords).
hlp.ksType=Paramètre du magasin de certificats
hlp.l2Text=Texte de l'attache de signature
hlp.l2TextFontSize=Taille de la police de l'attache de signature
hlp.l4Text=Text du statut 
hlp.listKeys=Listes des clés contenues dans le magasin de certificats sélectionné
hlp.listKsTypes=Listes des types de magasin de certificats
hlp.loadProperties=Chargement des propriétés depuis un fichier par défaut (créé par l'application d'interface graphique utilisateur).
hlp.loadPropertiesFile=Lecture des propriétés du fichier soumis à signature.
hlp.location=Lieu où est réalisé la signature. Par défaut, aucun lieu n'est renseigné.  
hlp.ocsp=Autoriser la validation de certificat par interrogation des serveurs OCSP (équivalent à une liste de révocation).
hlp.ocspServerUrl=Autoriser la validation de certificat par interrogation des serveurs OCSP (équivalent à une liste de révocation).
hlp.outPath=Répertoire contenant les documents signés
hlp.outPrefix=Préfixe des documents signés. Par défaut aucun préfix n'est requis. 
hlp.outSuffix=Suffixe ou extension des documents signés. La valeur par défaut est "_signed" (c.a.d la signature du fichier "MonDocument.pdf" sera nommée MonDocument_signed.pdf"  
hlp.ownerpwd=Mot de passe pour le chiffrement de documents. Utilisez « - » pour lire depuis l'entrée standard (nécessite --enable-stdin-passwords).
hlp.page=Page d'insertion de l'attache de signature. La page par défaut est la première page.
hlp.posLLX=Abscisse du coin inférieur gauche de l'attache de signature inserrée dans le document PDF.
hlp.posLLY=Ordonnée du coin inférieur gauche de l'attache de signature inserrée dans le document PDF.
hlp.posURX=Abscisse du coin supérieur droit de l'attache de signature inserrée dans le document PDF.
hlp.posURY=Ordonnée du coin supérieur droit de l'attache de signature inserrée dans le document PDF.
hlp.printRight=Droits d'impression des documents chiffrés. La valeur par défaut est impression autorisé. D'autres valeurs sont disponibles {0}
hlp.proxyHost=Nom ou Adresse IP du proxy pour la connection Internet.
hlp.proxyPort=port du proxy pour la connexion Internet. La valeur par défault est {0}
hlp.proxyType=Type de proxy pour la connexion Internet. La valeur par défault est {0}. D'autres valeurs sont permises : {1}
hlp.quiet=Mode silencieux, sans message d'alerte durant les traitements
hlp.reason=Qualité du signataire. Non renseignée par défaut.
hlp.renderMode=Visibilité de la signature dans le document. La valeur par défaut se réduit à une simple descritption. Vous pouvez choisi parmi {0}
hlp.tsaPolicy=Politique d'horodatage
hlp.tsaPwd=Mot de passe du serveur d'horodatage. Utilisez « - » pour lire depuis l'entrée standard (nécessite --enable-stdin-passwords).
hlp.tsaUrl=Adresse du serveur d'horodatage
hlp.tsaUser=Nom d'utilisateur TSA. Utilisez ce commutateur si vous utilisez l'horodatage (-ts) et que le serveur TSA exige une authentification.
hlp.userpwd=Mot de passe de chiffrement. Utilisez « - » pour lire depuis l'entrée standard (nécessite --enable-stdin-passwords).
hlp.version=affiche la version de l'application
