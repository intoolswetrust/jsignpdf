hlp.append=将签名追加到现有签名中。默认情况下，新签名会覆盖现有签名。
hlp.bgPath=可视化签名的背景图像路径
hlp.bgScale=可视化签名的背景图像缩放比例。输入正值以倍增图像大小。输入零值以填充整个背景（拉伸）。输入负值以进行最佳适应调整。
hlp.certLevel=认证级别。默认值为 NOT_CERTIFIED。可用值为 {0}
hlp.contact=签名者的联系方式（签名域的一部分）
hlp.crl=启用 CRL 证书验证
hlp.disableAcro6Layers=禁用 Adobe® Acrobat 6 图层模式，即创建所有签名图层。Adobe® Acrobat 6.0 及更高版本建议仅显示图层 n2 和 n4。
hlp.disableAnnot=禁止修改加密文档中的注释
hlp.disableAssembly=禁止加密文档的文档汇编
hlp.disableContent=禁止修改加密文档的内容
hlp.disableCopy=禁止复制加密文档内容
hlp.disableFill=禁止填写加密文档
hlp.disableScrRead=禁止屏幕阅读器读取加密文档
hlp.enableStdinPasswords=允许从标准输入读取密码值。启用后，密码选项值为 '-' 表示：从标准输入读取一行（或在控制台上提示）。多个密码选项均可使用 '-'，并按固定顺序读取：--keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password。
hlp.encCert=证书文件路径，用于在选择 -encryption CERTIFICATE 时加密输出的 PDF
hlp.encrypted=此属性已弃用，请改用 -encryption PASSWORD！
hlp.encryption=输出 PDF 的加密模式。默认值为 NONE（无）。可用值为 {0}。PASSWORD（密码）模式下请配合 -upwd 和 -opwd 使用，CERTIFICATE（证书）模式下请配合 -ec 使用
hlp.footer.examples=示例：\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\n-> 创建 mydocument.pdf 的副本并命名为 mydocument_signed.pdf。该文件将使用默认操作系统证书库中找到的第一个证书进行数字签名。\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> 创建签名并加密的文件 mydocument_signed.pdf，不允许打印该新文件。使用文件 my_certificate.pfx 中别名为 cert23 的密钥进行签名。\n------------\n$ java -jar JSignPdf.jar -lkt\n-> 列出密钥库类型\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> 使用密钥库密码列出存储在 my_certificate.pfx 文件中的密钥名称（别名）。已启用静默模式，因此不会打印调试信息。
hlp.footer.exitCodes=程序退出代码：\n-------------------\n  0 程序无错误结束\n  1 命令行格式错误\n  2 未请求任何操作 - 例如：未提供要签名的文件\n  3 部分（但非全部）文件签名失败\n  4 所有文件签名失败\n  5 输入的文件无法开启\n  6 通用异常
hlp.gui=（测试版）即使提供了其他命令行参数也显示 GUI 界面
hlp.hashAlgorithm=用于签名的哈希算法。默认值为 SHA1。可用值为 {0}
hlp.header=JSignPdf 是一款用于对 PDF 文档进行数字签名的应用程序。如果您在没有任何命令行参数的情况下启动程序，将启动 GUI 界面；否则，您可以在命令行批处理模式下使用 JSignPdf。
hlp.help=打印此帮助屏幕
hlp.imgPath=可视化签名的图像路径
hlp.keyAlias=用于签署文档的密钥名称（别名）。如果未提供此选项，将使用密钥库中的第一个密钥。（使用 -lk 列出密钥别名）
hlp.keyIndex=用于签署文档的密钥索引（从零开始）。如果既未提供此选项也未提供别名，则使用密钥库中的第一个密钥（index=0）。（使用 -lk 列出密钥别名）。此选项优先级低于别名。
hlp.keyPwd=密钥库中密钥的密码。大多数情况下您不需要设置此选项 - 密钥库本身已有密码保护，但这只是为了以防万一 :) 使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.ksFile=设置密钥库文件 - 值为包含私钥的文件的路径（.p12, .pfx, .jks, ...）。某些密钥库不将密钥存储在文件中（例如 Windows 密钥库 - WINDOWS-MY），这种情况下请勿使用此选项。
hlp.ksPwd=密钥库密码。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.ksType=设置密钥库类型（您可以使用 -lkt 参数列出此选项的可用值）
hlp.l2Text=签名文本，您也可以使用签名属性的占位符（${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact}）
hlp.l2TextFontSize=可视化签名文本的字体大小，默认值为 {0}
hlp.l4Text=状态文本
hlp.listKeys=列出所选密钥库中的密钥
hlp.listKsTypes=列出可用作 -kst 选项值的密钥库类型
hlp.loadProperties=从默认文件（由 GUI 应用程序创建）加载属性。
hlp.loadPropertiesFile=从指定文件加载属性。可以通过复制 GUI 在用户主目录中创建的默认属性文件 .JSignPdf 来创建该文件。
hlp.location=签名地点（例如：北京）。默认为空。
hlp.ocsp=启用 OCSP 证书验证
hlp.ocspServerUrl=默认 OCSP 服务器 URL，当签名证书不包含此信息时将使用该地址
hlp.outPath=存储已签名文档的文件夹。默认值为当前文件夹。
hlp.outPrefix=已签名文件的前缀。默认值为空前缀。
hlp.outSuffix=已签名文件的后缀。默认值为“_signed”。（例如：对 mydocument.pdf 进行签名将创建新文件 mydocument_signed.pdf）
hlp.ownerpwd=加密文档的所有者密码（在指定 -e 选项时使用）。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.page=显示可视化签名的页面。默认值为 1（第一页）。如果提供的页码超出范围，则使用最后一页。
hlp.posLLX=可视化签名左下角在 X 轴上的位置（负值表示从页面宽度减去）
hlp.posLLY=可视化签名左下角在 Y 轴上的位置（负值表示从页面高度减去）
hlp.posURX=可视化签名右上角在 X 轴上的位置（负值表示从页面宽度减去）
hlp.posURY=可视化签名右上角在 Y 轴上的位置（负值表示从页面高度减去）
hlp.printRight=打印权限。用于加密文档。默认值为 ALLOW_PRINTING。可用值为 {0}
hlp.proxyHost=代理服务器的主机名或 IP 地址
hlp.proxyPort=代理服务器端口，默认值为 {0}
hlp.proxyType=网络连接的代理类型。默认值为 {0}。可能的值为 {1}
hlp.quiet=静默模式 - 过程中不显示信息性消息
hlp.signerName=签名者名称。默认为所选证书的通用名称 (CN)。
hlp.reason=签名原因。默认为空。
hlp.renderMode=可视化签名的渲染模式。默认值为 DESCRIPTION_ONLY（仅描述）。可用值为 {0}
hlp.tsaAuthn=连接 TSA 服务器时使用的认证方法。默认值为 NONE（无）。可用值为 {0}
hlp.tsaCertFile=密钥库文件路径，当使用 CERTIFICATE（证书）认证方法时，该文件应包含用于 TSA 服务器认证的私钥
hlp.tsaCertFileType=TSA CERTIFICATE（证书）认证的密钥库类型 - 默认为 PKCS12
hlp.tsaCertPasswd=用于打开包含私钥的 PKCS#12 文件（见 -tscf 选项）的密码。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.tsaHashAlg=用于查询时间戳服务器 (TSA) 的哈希算法；默认为 {0}
hlp.tsaPolicy=应在时间戳请求中设置的 TSA 策略 OID。
hlp.tsaPwd=TSA 用户密码。如果使用时间戳 (-ts) 且 TSA 服务器需要认证，请使用此开关。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.tsaUrl=时间戳服务器 (TSA) 地址。如果使用此参数，时间戳将包含在签名中。（用于测试目的，您可以尝试以下 URL：http://dse200.ncipher.com/TSS/HttpTspServer）
hlp.tsaUser=TSA 用户名。如果使用时间戳 (-ts) 且 TSA 服务器需要认证，请使用此开关。
hlp.userpwd=加密文档的用户密码（在指定 -e 选项时使用）。使用 '-' 从标准输入读取密码（需要 --enable-stdin-passwords）。
hlp.version=显示应用程序版本
hlp.visible=启用可视化签名
