hlp.append=新增簽章到已存在的文件。預設會覆蓋已存在的簽章(若有)。
hlp.bgPath=用於可見簽章的背景影像路徑
hlp.bgScale=可見簽章的背景影像比例。正值以將圖像大小乘以該值。負值以最適合調整大小。零值以用它填充整個背景 (拉伸)。
hlp.certLevel=認證層級。預設是不認證(NOT_CERTIFIED)。可用值為{0}
hlp.contact=簽署者聯絡資訊(簽章的一部份)
hlp.crl=啟用CRL證書驗證
hlp.disableAcro6Layers=停用Adobe® Acrobat 6圖層模式 即所有簽署圖層都將被建立。Adobe® Acrobat 6及更高版本僅建議圖層n2及n4展示。
hlp.disableAnnot=禁止修改加密文檔中的註釋
hlp.disableAssembly=禁止加密文檔組合
hlp.disableContent=禁止修改加密文檔內容
hlp.disableCopy=禁止複製加密文檔
hlp.disableFill=禁止填寫加密文檔
hlp.disableScrRead=禁止掃描加密文檔畫面
hlp.enableStdinPasswords=允許從標準輸入讀取密碼值。啟用後，密碼選項值為 '-' 表示：從標準輸入讀取一行（或在主控台上提示）。多個密碼選項都可使用 '-'，並依固定順序讀取：--keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password。
hlp.encCert=憑證檔案路徑，用於加密輸出的PDF -encryption CERTIFICATE
hlp.encrypted=已被棄用，請用 -encryption PASSWORD 取代!
hlp.encryption=輸出PDF的加密模式 預設不加密(NONE)。可用值為{0}。當使用PASSWORD(密碼)模式時須配合-upwd與-opwd，及使用憑證模式(CERTIFICATE)時配合 -ec 使用
hlp.footer.examples=範例:\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\n-> 複製mydocument.pdf 以建立簽署後的新檔案 mydocument_signed.pdf，將使用查詢到儲存於系統存放區的第一組證書。\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> 建立簽署及加密的 mydocument_signed.pdf，輸出檔案不允許列印。 將使用my_certificate.pfx中別名為 cert23 的證書金鑰\n------------\n$ java -jar JSignPdf.jar -lkt\n-> 列出支援的keystore類型\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> 給予keystore用於列出 my_certificate.pfx中所有證書金鑰名稱(別名)。啟用安靜模式(Quiet mode)以停止輸出除錯資訊。
hlp.footer.exitCodes=程序退出狀態代碼:\n-------------------\n  0 程序正常運行\n  1 命令行格式錯誤\n  2 缺少參數 - 如:未提供要簽屬的檔案\n  3 某些 (但不是全部) 文件的簽名失敗\n  4 全部文件的簽名失敗\n  5 無法讀取輸入檔\n  6 通用錯誤
hlp.gui=(測試) 即使提供了其他命令列參數也總是顯示 GUI
hlp.hashAlgorithm=用於簽屬的哈希(hash)算法。 預設為SHA1，可用值為{0}
hlp.header=JSignPdf 是一款設計用於對 PDF 文件進行數位簽章的應用程式。如果您在沒有任何命令列參數的情況下啟動程序，則會啟動 GUI，您可以在命令列批次模式下使用 JSignPdf。
hlp.help=輸出幫助介面
hlp.imgPath=可見簽章的影像路徑
hlp.keyAlias=憑證金鑰的名稱(別名)，當簽署文檔時必要。若此選項未提供，預設將使用keystore中第一個發現的金鑰。(使用 -lk 列出所有憑證金鑰的別名)
hlp.keyIndex=從零開始的密鑰索引，用於簽署文件。如果既沒有給出此選項也沒有給出別名，則使用密鑰庫中的第一個密鑰 (索引 = 0)。 (使用 -lk 列出關鍵別名)。此選項的優先性低於別名。
hlp.keyPwd=keystore中私鑰的密碼。此選項通常不需提供 - 僅在私鑰使用密碼保護時，用於以防萬一 :) 使用 '-' 從標準輸入讀取密碼（需要 --enable-stdin-passwords）。
hlp.ksFile=配置Keystore檔案 - 當私鑰存檔於檔案(.p12, .pfx, .jks, ...)時數值可能為路徑。有些keystore不會存放金鑰於檔案(如:windows憑證存放區 - WINDOWS-MY)則不使用此選項。
hlp.ksPwd=KeyStore的密碼。使用 '-' 從標準輸入讀取密碼（需要 --enable-stdin-passwords）。
hlp.ksType=KeyStore類型(您可以使用 -lkt 參數列出所有此選項支持的值)
hlp.l2Text=簽章文字，您也可以使用佔位符使用簽章資訊 (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=可見簽章的字體大小，預設值為{0}
hlp.l4Text=狀態文字
hlp.listKeys=列出選擇的keystore中所有憑證金鑰
hlp.listKsTypes=列出所有用於 -kst 選項支持的keystore類型
hlp.loadProperties=從(由 GUI 應用程式建立的)預設檔案載入屬性。
hlp.loadPropertiesFile=從給定檔案載入屬性。可以透過複製 GUI 在使用者主目錄中建立的預設屬性檔案 (.JSignPdf) 來建立該檔案。
hlp.location=簽署地點 (例如華盛頓特區 Washington DC)。預設為空。
hlp.ocsp=啟用OCSP憑證驗證
hlp.ocspServerUrl=預設OCSP伺服器URL，將在無法從憑證取得此資訊時使用
hlp.outPath=將儲存簽署文件的資料夾。預設值為目前資料夾。
hlp.outPrefix=已簽署文件的前綴。預設值為空前綴。
hlp.outSuffix=已簽署文件的後綴。預設值為"_signed"。(如:輸入檔案為mydocument.pdf則輸出檔案將會建立為mydocument_signed.pdf)
hlp.ownerpwd=加密文檔的擁有者密碼 (當給定 -e 參數時使用)。使用 '-' 從標準輸入讀取密碼（需要 --enable-stdin-passwords）。
hlp.page=顯示可見簽章的頁面。 預設值為 1 (第一頁)。如果頁面數字超出文檔的所有最後一頁，將使用(放置)於最後一頁。
hlp.posLLX=可見簽署的左下角X座標 (從頁寬減去負值)
hlp.posLLY=可見簽署的左下角Y座標 (從頁高減去負值)
hlp.posURX=可見簽署的右上角X座標 (從頁寬減去負值)
hlp.posURY=可見簽署的右上角Y座標 (從頁寬減去負值)
hlp.printRight=是否允許列印。用於加密文檔。預設值為 ALLOW_PRINTING。可用值為 {0}
hlp.proxyHost=代理伺服器的域名或IP地址
hlp.proxyPort=代理伺服器的端口，預設值為{0}
hlp.proxyType=網路連接的代理方法。預設值為{0}。可用值為{1}
hlp.quiet=安靜模式 - 執行時無詳細(INFO)訊息
hlp.signerName=簽署者名稱. 預設為選擇之憑證主旨中的通用名稱(CN).
hlp.reason=簽署原因. 預設為空.
hlp.renderMode=可見簽署的渲染模式。 預設為僅描述模式(DESCRIPTION_ONLY)。可用值為 {0}
hlp.tsaAuthn=TSA伺服器的認證方式。預設為不認證(NONE)。可用值為 {0}
hlp.tsaCertFile=keystore檔案路徑，應包含用於TSA伺服器認證用的私鑰，當使用TSA伺服器使用憑證(CERTIFICATE)方法驗證時使用
hlp.tsaCertFileType=TSA伺服器憑證認證(CERTIFICATE)的keystore類型 - 預設為PKCS12
hlp.tsaCertPasswd=存取(用於-tscf選項的)PKCS#12檔案存放的私鑰密碼。使用 '-' 從標準輸入讀取密碼（需要 --enable-stdin-passwords）。
hlp.tsaHashAlg=用於時間戳(TSA)伺服器查詢的哈希(Hash)算法; 預設為{0}
hlp.tsaPolicy=TSA政策 OID 應該被配置用於時間戳請求。
hlp.tsaPwd=TSA使用者密碼。 當使用時間戳(TSA, -ts)且TSA伺服器要求驗證時使用。使用 '-' 從標準輸入讀取密碼（需要 --enable-stdin-passwords）。
hlp.tsaUrl=時間戳(TSA)伺服器地址。若使用此選項時間戳將包含簽章。 (若用於測試目的 您可以使用此URL: http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=TSA使用者名稱。 當使用時間戳且TSA伺服器要求驗證時使用。
hlp.userpwd=加密文檔的使用者密碼(當啟用-e選項時使用)。使用 '-' 從標準輸入讀取密碼（需要 --enable-stdin-passwords）。
hlp.version=顯示應用程式版本
