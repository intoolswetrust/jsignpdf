hlp.encrypted=このプロパティは非推奨です。代わりに -encryption PASSWORD を使用してください！
hlp.encryption=出力PDFの暗号化モード。デフォルト値は NONE です。使用可能な値: {0}。PASSWORD モードの場合は -upwd および -opwd と、CERTIFICATE モードの場合は -ec と併用してください
hlp.footer.examples=例:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> mydocument.pdf のコピー mydocument_signed.pdf を作成し、デフォルトのOS証明書ストアで最初に見つかった証明書でデジタル署名します\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> 署名および暗号化されたファイル mydocument_signed.pdf を作成します。新しいファイルの印刷は許可されません。署名には、my_certificate.pfx ファイルのエイリアス cert23 の鍵が使用されます\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> キーストアタイプを一覧表示します\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> キーストアのパスワードを使用して my_certificate.pfx ファイルに保存されている鍵の名前（エイリアス）を一覧表示します。静粛モードが有効なのでデバッグ情報は出力されません。
hlp.footer.exitCodes=プログラムの終了コード:\\r\\n-------------------\\r\\n  0 プログラムはエラーなしで終了しました\\r\\n  1 コマンドラインの形式が正しくありません\\r\\n  2 操作が指定されていません（例: 署名対象のファイルが指定されていない）\\r\\n  3 一部のファイル（ただし全部ではない）の署名に失敗しました\\r\\n  4 すべてのファイルの署名に失敗しました
hlp.gui=(ベータ) 他のコマンドライン引数が指定されていても GUI を表示します
hlp.hashAlgorithm=署名に使用するハッシュアルゴリズム。デフォルト値は SHA1 です。使用可能な値: {0}
hlp.header=JSignPdf は PDF 文書にデジタル署名するためのアプリケーションです。コマンドライン引数なしで起動すると GUI が表示されます。それ以外の場合は、コマンドラインバッチモードで JSignPdf を使用できます。
hlp.help=このヘルプ画面を表示します
hlp.imgPath=可視署名の画像パス
hlp.keyAlias=文書の署名に使用する鍵の名前（エイリアス）。このオプションが指定されていない場合、キーストア内の最初の鍵が使用されます。（鍵エイリアスを一覧表示するには -lk を使用してください）
hlp.keyIndex=文書の署名に使用する鍵の0から始まるインデックス。このオプションもエイリアスも指定されていない場合、キーストア内の最初の鍵（index=0）が使用されます。（鍵エイリアスを一覧表示するには -lk を使用してください）。このオプションはエイリアスより優先順位が低いです。
hlp.keyPwd=キーストア内の鍵のパスワード。ほとんどの場合このオプションを設定する必要はありません。通常、キーストアはパスワードで保護されていますが、念のため :)
hlp.ksFile=KeyStore ファイルを設定します。値として秘密鍵が格納されているファイル（.p12, .pfx, .jks など）のパスを指定します。一部のキーストアは鍵をファイルに格納しません（例: WINDOWS-MY キーストア）。その場合はこのオプションを使用しないでください。
hlp.ksPwd=KeyStore のパスワード
hlp.ksType=KeyStore タイプを設定します（このオプションに使用できる値は -lkt 引数で一覧表示できます）
hlp.l2Text=署名テキスト。署名プロパティ用のプレースホルダー（${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact}）も使用できます
hlp.l2TextFontSize=可視署名テキストのフォントサイズ。デフォルト値は {0}
hlp.l4Text=状態テキスト
hlp.listKeys=選択したキーストア内の鍵を一覧表示します
hlp.listKsTypes=-kst オプションで使用できるキーストアタイプを一覧表示します
hlp.loadProperties=デフォルトのファイル（GUIアプリケーションで作成）からプロパティを読み込みます。
hlp.loadPropertiesFile=指定されたファイルからプロパティを読み込みます。このファイルは、ユーザーのホームディレクトリで GUI により作成されたデフォルトのプロパティファイル .JSignPdf をコピーして作成できます。
hlp.location=署名の場所（例: Washington DC）。デフォルトは空です。
hlp.ocsp=OCSPによる証明書検証を有効にします
hlp.ocspServerUrl=署名証明書にこの情報が含まれていない場合に使用されるデフォルトの OCSP サーバー URL
hlp.outPath=署名済み文書を保存するフォルダ。デフォルト値は現在のフォルダです。
hlp.outPrefix=署名済みファイルのプレフィックス。デフォルト値は空のプレフィックスです。
hlp.outSuffix=署名済みファイル名のサフィックス。デフォルト値は "_signed" です。（例: mydocument.pdf への署名処理では mydocument_signed.pdf という新しいファイルが作成されます）
hlp.ownerpwd=暗号化された文書の所有者パスワード（-e オプション指定時に使用）
hlp.page=可視署名を表示するページ。デフォルト値は 1（最初のページ）です。指定されたページ番号が範囲外の場合は最後のページが使用されます。
hlp.posLLX=可視署名の左下隅のX軸位置（負の値はページ幅から減算されます）
hlp.posLLY=可視署名の左下隅のY軸位置（負の値はページ高さから減算されます）
hlp.posURX=可視署名の右上隅のX軸位置（負の値はページ幅から減算されます）
hlp.posURY=可視署名の右上隅のY軸位置（負の値はページ高さから減算されます）
hlp.printRight=印刷権限。暗号化された文書で使用されます。デフォルト値は ALLOW_PRINTING です。使用可能な値: {0}
hlp.proxyHost=プロキシサーバーのホスト名またはIPアドレス
hlp.proxyPort=プロキシサーバーのポート。デフォルト値は {0}
hlp.proxyType=インターネット接続のプロキシタイプ。デフォルト値は {0}。使用可能な値: {1}
hlp.quiet=静粛モード - 処理中の情報メッセージを表示しません
hlp.reason=署名の理由。デフォルトは空です。
hlp.renderMode=可視署名のレンダリングモード。デフォルト値は DESCRIPTION_ONLY です。使用可能な値: {0}
hlp.signerName=署名者名。デフォルトは選択した証明書のコモンネーム（CN）です。
hlp.tsaAuthn=TSAサーバーとの通信時に使用する認証方法。デフォルト値は NONE です。使用可能な値: {0}
hlp.tsaCertFile=CERTIFICATE認証方式を使用する場合に、TSAサーバーに対する認証に使用する秘密鍵を含むキーストアファイルのパス
hlp.tsaCertFileType=TSA CERTIFICATE認証用のキーストアタイプ - デフォルトは PKCS12
hlp.tsaCertPasswd=秘密鍵を含む PKCS#12 ファイル（-tscf オプション参照）を開くために使用するパスワード
hlp.tsaHashAlg=タイムスタンプサーバー（TSA）へのクエリで使用するハッシュアルゴリズム。デフォルトは {0}
hlp.tsaPolicy=タイムスタンプリクエストに設定するTSAポリシーOID。
hlp.tsaPwd=TSAユーザーパスワード。タイムスタンプ（-ts）を使用し、TSAサーバーが認証を要求する場合にこのスイッチを使用してください。
hlp.tsaUrl=タイムスタンプサーバー（TSA）のアドレス。この引数を使用すると、署名にタイムスタンプが含まれます。（テスト用に次のURLを試せます: http://dse200.ncipher.com/TSS/HttpTspServer）
hlp.tsaUser=TSAユーザー名。タイムスタンプ（-ts）を使用し、TSAサーバーが認証を要求する場合にこのスイッチを使用してください。
hlp.userpwd=暗号化された文書のユーザーパスワード（-e オプション指定時に使用）
hlp.version=アプリケーションのバージョンを表示します
hlp.visible=可視署名を有効にします
pdfEncryption.certificate=証明書
pdfEncryption.notEncrypted=暗号化なし
pdfEncryption.password=パスワード
rights.allowDegradedPrinting=低品質印刷を許可
rights.allowPrinting=許可
rights.disallowPrinting=禁止
serverAuthn.certificate=クライアント証明書
serverAuthn.none=認証なし
serverAuthn.password=ユーザー名 / パスワード
ssl.keymanager.init=キーストアファイル {0} から鍵マネージャを初期化しています。
jfx.gui.menu.file.saveAs=出力を別名で保存...
jfx.gui.menu.signing.visibleSig=可視署名
jfx.gui.status.visibleSigEnabled=可視署名
jfx.gui.status.invisibleSig=不可視署名
jfx.gui.panel.signatureProperties=署名プロパティ
jfx.gui.dialog.missingEncCert.title=暗号化証明書がありません
jfx.gui.dialog.missingEncCert.text=証明書暗号化には、暗号化証明書ファイルを選択する必要があります。
jfx.gui.dialog.resetSettings.title=Reset Settings
jfx.gui.dialog.resetSettings.text=This will delete all saved settings and reset the application to its default state. Continue?
jfx.gui.status.settingsReset=Settings have been reset to defaults
