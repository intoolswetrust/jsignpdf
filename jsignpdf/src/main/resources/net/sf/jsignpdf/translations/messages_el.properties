hlp.append=προσθήκη υπογραφής σε υπάρχουσες. Εξορισμού, υπάρχουσες υπογραφές αντικαθίστανται από τη νέα.
hlp.bgPath=διαδρομή εικόνας υποβάθρου για ορατές υπογραφές
hlp.bgScale=κλίμακα εικόνας υποβάθρου για ορατές υπογραφές. Εισάγετε θετική τιμή για να πολλαπλασιάσετε το μέγεθος εικόνας με την τιμή. Εισάγετε μηδέν για να καλύψετε όλο το υπόβαθρο με αυτή (τέντωμα). Εισάγετε αρνητική τιμή για την αλλαγή μεγέθους για το καλύτερο ταίριασμα. 
hlp.certLevel=επίπεδο πιστοποίησης. Η προεπιλεγμένη τιμή είναι NOT_CERTIFIED. Διαθέσιμες τιμές είναι {0}
hlp.contact=στοιχεία επικοινωνίας του υπογράφοντα (ένα πεδίο της υπογραφής)
hlp.crl=ενεργοποίησε έλεγχο πιστοποιητικού μέσω της CRL
hlp.disableAcro6Layers=απενεργοποιεί τη λειτουργία στρωμάτων του Acrobat 6 δηλ. όλα τα στρώματα υπογραφών θα δημιουργηθούν. Ο Acrobat 6.0 και πάνω συνιστά την ύπαρξη των στρωμάτων n2 και n4 μόνο.
hlp.disableAnnot=δεν επιτρέπονται οι αλλαγές στα σχόλια κρυπτογραφημένων εγγράφων
hlp.disableAssembly=δεν επιτρέπεται η προσθαφαίρεση σελίδων σε κρυπτογραφημένα έγγραφα
hlp.disableContent=δεν επιτρέπεται η τροποποίηση περιεχομένου σε κρυπτογραφημένα έγγραφα
hlp.disableCopy=δεν επιτρέπεται η αντιγραφή από κρυπτογραφημένα έγγραφα
hlp.disableFill=δεν επιτρέπεται η συμπλήρωση σε κρυπτογραφημένα έγγραφα
hlp.disableScrRead=δεν επιτρέποναι οι αναγνώστες οθόνης σε κρυπτογραφημένα έγγραφα
hlp.encCert=διαδρομή στο αρχείο πιστοποιητικού, το οποίο χρησιμοποιείται για την κρυπτογράφηαη του PDF εξόδου σε περίπτωση -encryption CERTIFICATE
hlp.encrypted=Αυτή η ιδιότητα είναι This property is παρωχημένη, χρησιμοποιείστε -encryption PASSWORD αντ΄αυτής!
hlp.encryption=η λειτουργία κρυπτογράφησης για το αρχείο εξόδου PDF είναι NONE. Πιθανές τιμές είναι {0}. Χρησιμοποιείστε μαζί με -upwd και -opwd σε περίπτωση PASSWORD λειτουργίας, και-ec σε περίπτωση CERTIFICATE
hlp.footer.examples=Παραδείγματα:\r\n---------\r\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\r\n-> δημιουργεί αντίγραφο του mydocument.pdf με το όνομα mydocument_signed.pdf, το οποίο είναι ψηφιακά υπογεγραμμένο με το πρώτο πιστοποιητικό που βρίσκεται στο χώρο αποθήκευσης πιστοποιητικών των Windows\r\n------------\r\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\r\n-> δημιουργεί ένα υπογεγραμμένο και κρυπτογραφημένο αρχείο mydocument_signed.pdf, και η εκτύπωση του νέου αρχείου δεν επιτρέπεται. Για την υπογραφή χρησιμοπιείται πιστοποιητικό με το ψευδώνυμο cert23 από το αρχείο my_certificate.pfx\r\n------------\r\n$ java -jar JSignPdf.jar -lkt\r\n-> εμφανίζει τους τύπους χώρων αποθήκευσης κλειδιών\r\n------------\r\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\r\n-> εμφανίζει ονόματα (ψευδώνυμα) των πιστοποιητικών αποθηκευμένων στο αρχείο my_certificate.pfx χρησιμοποιώντας τον κωδικό για το χώρο αποθήκευσης κλειδιών. Αθόρυβη λειτουργία είναι ενεργοποιημένη κι έτσι δεν εμφανίζεται πληροφορία εκσφαλμάτωσης.
hlp.footer.exitCodes=Κωδικοί εξόδου εφαρμογής:\r\n-------------------\r\n  0 η εφαρμογή ολοκλήρωση χωρίς σφάλμα\r\n  1 η εντολή είναι σε λάθος μορφή\r\n  2 δεν ζητήθηκε κάποια λειτουργία - π.χ. δεν ορίσθηκε αρχείο για υπογραφή\r\n  3 η υπογραφή κάποιων - αλλά όχι όλων των - αρχείων απέτυχε\r\n  4 η υπογραφή όλων των αρχείων απέτυχε
hlp.hashAlgorithm=αλγόριθμός σύνοψης που χρησιμοποιείται για υπογραφή. Η προεπιλεγμένη τιμή είναι SHA1. Διαθέσιμες τιμές είναι {0}
hlp.header=Το JSignpdf είναι μια εφαρμογή σχεδιασμένη για την ψηφιακή υπογραφή PDF εγγράφων. Αν εκκινήσετε την εφαρμογή χωρίς κάποια παράμετρο, θα εμφανιστεί η γραφική διεπαφή, αλλιώς μπορείτε να χρησιμοποιήσετε το JSignPdf σε κατάσταση γραμμής εντολών σε λειτουργία batch.
hlp.help=εμφανίζει αυτή την οθόνη βοήθειας
hlp.imgPath=η διαδρομή εικόνας για τις ορατές υπογραφές
hlp.keyAlias=το όνομα (ψευδώνυμο) του πιστοποιητικού, που πρέπει να χρησιμοποιηθεί για την υπογραφή του εγγράφου. Εάν αυτή η επιλογή δεν είναι ορισμένη, το πρώτο πιστοποιητικό στο χώρο αποθήκευσης κλειδιών θα χρησιμοποιηθεί. (Εμφανίστε όλα τα ψευδώνυμα πιστοποιητικών χρησιμοποιώντας την παράμετρο -lk)
hlp.keyIndex=ο δείκτης του πιστοποιητικού, ξεκινώντας από το 0, που θα πρέπει να χρησιμοποιηθεί για την υπογραφή του εγγράφου. Εάν ούτε αυτή η επιλογή ούτε το ψευδώνυμο δεν δίνεται, το πρώτο πιστοποιητικό (δείκτης=0) στο χώρο αποθήκευσης κλειδιών θα χρησιμοποιηθεί. (Εμφανίστε όλα τα ψευδώνυμα πιστοποιητικών χρησιμοποιώντας την παράμετρο -lk). Αυτή η επιλογή έχει χαμηλότερη προτεραιότητα απ΄ό,τι το ψευδώνυμο.
hlp.keyPwd=ο κωδικός του πιστοποιητικού στο χώρο αποθήκευσης κλειδιών. Στις περισσότερες περιπτώσεις δε χρειάζεται να ορίσετε αυτή την επιλογή - μόνο χώροι αποθήκευσης κλειδιών είναι προστατευμένοι με δωδικό, αλλά για κάθε περίπτωση :)
hlp.ksFile=θέτει το αρχείο για το χώρο αποθήκευσης κλειδιών - σαν τιμή χρησιμοποιήστε τη διαδρομή στην οποία υπάρχει αρχείο με τα ιδιωτικά κλειδιά (.p12, .pfx, .jks, ...). Μερικοί χώροι αποθήκευσης κλειδιών δεν έχουν κλειδιά αποθηκευμένα σε ένα αρχείο (π.χ. ο χώρος αποθήκευσης κλειδιών των Windows - WINDOWS-MY), σε αυτή την περίπτωση μη χρησιμοποιείται αυτή την επιλογή.
hlp.ksPwd=κωδικός για το χώρο αποθήκευσης κλειδιών
hlp.ksType=θέτει τον τύπο του χώρου αποθήκευσης κλειδιών (μπορείτε να εμφανίσετε τις πιθανές τιμές για αυτή την επιλογή με την παράμετρο -lkt)
hlp.l2Text=κείμενο υπογραφής
hlp.l2TextFontSize=μέγεθος γραμματοσειράς για το κείμενο στις ορατές υπογραφές, προεπιλεγμένη τιμή είναι {0}
hlp.l4Text=κείμενο κατάστασης
hlp.listKeys=εμφανίζει πιστοποιητικά στον επιλεγμένο χώρου αποθήκευσης κλειδιών
hlp.listKsTypes=εμφανίζει τύπους χώρων αποθήκευσης κλειδιών, οι οποίοι μπορούν να χρησιμοποιηθούν σαν τιμές στην παράμετρο -kst
hlp.loadProperties=Φορτώνει ιδιότητες από ένα προκαθορισμένο αρείο (δημιουργείται από την εφαρμογή GUI).
hlp.loadPropertiesFile=Φορτώνει ιδιότητες από ένα αρχείο. Το αρχείο μπορεί να δημιυοργηθεί αντιγράφοντας το πρότυπο αρχείο ιδιοτήτων .JSignPdf που δημιουργείται από το GUI στον αρχικό κατάλογο του χρήστη.
hlp.location=τόπος μιας υπογραφής (π.χ. Αθήνα). Κενό εξαρχής.
hlp.ocsp=ενεργοποίησε επαλήθευση πιστοποιητικού μέσω OCSP
hlp.ocspServerUrl=προκαθορισμένη διεύθυνση URL OCSP εξυπηρετητή, η οποία θα χρησιμοποιείται σε περίπτωση που το πιστοποιητικό υπογραφής δεν περιέχει αυτή την πληροφορία
hlp.outPath=φάκελος στον οποίο τα υπογεγραμμένα έγγραφα θα αποθηκεύονται. Προκαθορισμένη τιμή είναι ο τρέχον κατάλογος.
hlp.outPrefix=πρόθεμα για υπογεγραμμένα αρχεία. Προκαθορισμένη τιμή είναι το κενό πρόθεμα.
hlp.outSuffix=επίθεμα για υπογεγραμμένα αρχεία. Προκαθορισμένη τιμή είναι "_signed". (π.χ. η υπογραφή του αρχείου mydocument.pdf θα δημιουργήσει ένα νέο αρχείο με το όνομα mydocument_signed.pdf)
hlp.ownerpwd=κωδικός κατόχου για κρυπτογραφημένα αρχεία (χρησιμοποιείται όταν η επιλογή -e έχει δοθεί)
hlp.page=σελίδα με ορατή υπογραφή. Η προεπιλεγμένη τιμή είναι 1 (πρώτ σελίδα)
hlp.posLLX=θέση της κάτω αριστερά γωνίας στον άξονα Χ μιας ορατής υπογραφής
hlp.posLLY=θέση της κάτω αριστερά γωνίας στον άξονα Y μιας ορατής υπογραφής
hlp.posURX=θέση της πάνω δεξιά γωνίας στον άξονα Χ μιας ορατής υπογραφής
hlp.posURY=θέση της πάνω δεξιά γωνίας στον άξονα Y μιας ορατής υπογραφής
hlp.printRight=δικαιώματα εκτύπωσης. Χρησιμοποιείται για κρυπτογραφημένα έγγραφα. Η προκαθορισμένη τιμή είναι ALLOW_PRINTING. Διαθέσιμες τιμές είναι {0}
hlp.proxyHost=όνομα host ή IP διεύθυνση του διακομιστή
hlp.proxyPort=πόρτα του διακομιστή, προκαθορισμένη τιμή είναι {0}
hlp.proxyType=τύπος διακομιστή για συνδέσεις internet. Η προκαθορισμένη τιμή είναι {0}. Διαθέσιμες τιμές είναι {1}
hlp.quiet=αθόρυβη λειτουργία - χωρίς πληροφοριακά μηνύματα κατά τη διάρκεια της διαδικασίας
hlp.reason=αιτά για την υπογραφή. Κενό εξαρχής.
hlp.renderMode=τρόπος εμφάνισης για ορατές υπογραφές. Η προκαθορισμένη τιμή είναι DESCRIPTION_ONLY. Διαθέσιμες τιμές είναι {0}
hlp.tsaAuthn=μέθοδος αυθεντικοποίησης που χρησιμοποιείται όταν γίνεται επικοινωνία με εξυπηρετητή χρονοσήμανσης (TSA). Η προκαθορισμένη τιμή είναι NONE. Διαθέσιμες τιμές είναι {0}
hlp.tsaCertPasswd=κωδικός για την πρόσβαση στο PKCS#12 αρχείο (βλ. -tscf επιλογή) με ένα ιδιωτικό κλειδί
hlp.tsaPolicy=OID της πολιτικής TSA που θα πρέπει να τεθεί στο αίτημα προς τον εξυπηρετητή χρονοσήμανσης.
hlp.tsaPwd=κωδικός χρήστη TSA. Χρησιμοποιείστε αυτή την επιλογή αν χρησιμοποιείτε χρονοσήμανση (-ts) και ο εξυπηρετητής TSA απαιτεί αυθεντικοποίηση.
hlp.tsaUrl=διεύθυνση ενός εξυπηρετητή χρονοσήμανσης (TSA). Αν χρησιμοποιείτε αυτή την παράμετρο, η χρονοσήμανση θα περιληφθεί στην υπογραφή. (Για λόγους testing μπορείτε να χρησιμοποιήσετε την ακόλουθη διεύθυνση URL http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=όνομα χρήστη TSA. Χρησιμοποιήστε αυτή την επιλογή αν χρησιμοποιείτε χρονοσήμανση (-ts) και ο εξυπηρετητής TSA απαιτεί αυθεντικοποίηση.
hlp.userpwd=κωδικός χρήστη για κρυπτογραφημένα έγγραφα (χρησιμοποιείται μαζί με την επιλογή -e)
hlp.version=δείχνει την έκδοση της εφαρμογής
hlp.visible=ενεργοποιεί την ορατή υπογραφή
