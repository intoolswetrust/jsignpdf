hlp.append=aggiunge la firma a quelle esistenti. Per impostazione predefinita, le firme esistenti vengono sostituite dalla nuova.
hlp.bgPath=percorso dell'immagine di sfondo per le firme visibili
hlp.bgScale=scala dell'immagine di sfondo per le firme visibili. Inserire un valore positivo per moltiplicare la dimensione dell'immagine per il valore. Inserire zero per riempire tutto lo sfondo (stretch). Inserire un valore negativo per un ridimensionamento ottimale.
hlp.certLevel=livello di certificazione. Il valore predefinito è NOT_CERTIFIED. I valori disponibili sono {0}
hlp.contact=dettagli di contatto del firmatario (un campo della firma)
hlp.crl=abilita la validazione del certificato tramite CRL
hlp.disableAcro6Layers=disabilita la modalità layer di Acrobat 6, ovvero verranno creati tutti i layer della firma. Acrobat 6.0 e versioni successive raccomandano che siano presenti solo i layer n2 e n4.
hlp.disableAnnot=vieta la modifica delle annotazioni nei documenti crittografati
hlp.disableAssembly=vieta l'assemblaggio nei documenti crittografati
hlp.disableContent=vieta la modifica del contenuto nei documenti crittografati
hlp.disableCopy=vieta la copia nei documenti crittografati
hlp.disableFill=vieta la compilazione dei documenti crittografati
hlp.disableScrRead=vieta i lettori di schermo nei documenti crittografati
hlp.encCert=percorso del file del certificato, utilizzato per crittografare il PDF di output in caso di -encryption CERTIFICATE
hlp.encrypted=Questa proprietà è deprecata, utilizzare invece -encryption PASSWORD!
hlp.encryption=modalità di crittografia per il PDF di output. Il valore predefinito è NONE. I valori possibili sono {0}. Utilizzare insieme a -upwd e -opwd in caso di modalità PASSWORD, e a -ec in caso di CERTIFICATE
hlp.footer.examples=Esempi:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> crea una copia di mydocument.pdf con nome mydocument_signed.pdf, firmata digitalmente con il primo certificato trovato nell'archivio certificati predefinito del sistema operativo\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> crea il file firmato e crittografato mydocument_signed.pdf, la stampa del nuovo file non è consentita. Per la firma viene utilizzata la chiave con alias cert23 dal file my_certificate.pfx\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> elenca i tipi di keystore\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> elenca i nomi (alias) delle chiavi memorizzate nel file my_certificate.pfx utilizzando la password del keystore. La modalità silenziosa è attiva quindi non vengono stampate informazioni di debug.
hlp.footer.exitCodes=Codici di uscita del programma:\\r\\n-------------------------------\\r\\n  0 il programma è terminato senza errori\\r\\n  1 la riga di comando è in un formato errato\\r\\n  2 nessuna operazione richiesta - es. nessun file da firmare fornito\\r\\n  3 firma di alcuni - ma non tutti - i file non riuscita\\r\\n  4 firma di tutti i file non riuscita
hlp.gui=(beta) mostra la GUI anche quando sono forniti altri argomenti da riga di comando
hlp.hashAlgorithm=algoritmo di hash utilizzato per la firma. Il valore predefinito è SHA1. I valori disponibili sono {0}
hlp.header=JSignPdf è un'applicazione progettata per firmare digitalmente documenti PDF. Se si avvia il programma senza alcun argomento da riga di comando, verrà avviata la GUI, altrimenti è possibile utilizzare JSignPdf in modalità batch da riga di comando.
hlp.help=mostra questa schermata di aiuto
hlp.imgPath=percorso dell'immagine per la firma visibile
hlp.keyAlias=nome (alias) della chiave da utilizzare per firmare il documento. Se questa opzione non viene specificata, viene utilizzata la prima chiave del keystore. (Elencare gli alias delle chiavi con -lk)
hlp.keyIndex=indice (a base zero) della chiave da utilizzare per firmare il documento. Se non viene specificata né questa opzione né l'alias, viene utilizzata la prima chiave (index=0) del keystore. (Elencare gli alias delle chiavi con -lk). Questa opzione ha priorità inferiore rispetto all'alias.
hlp.keyPwd=password della chiave nel keystore. Nella maggior parte dei casi non è necessario impostare questa opzione - solo il keystore è protetto da password, ma non si sa mai :)
hlp.ksFile=imposta il file KeyStore - come valore usare il percorso in cui si trova il file con le chiavi private (.p12, .pfx, .jks, ...). Alcuni keystore non memorizzano le chiavi in un file (es. windows keystore - WINDOWS-MY), in tal caso non utilizzare questa opzione.
hlp.ksPwd=password del KeyStore
hlp.ksType=imposta il tipo di KeyStore (è possibile elencare i valori possibili per questa opzione con l'argomento -lkt)
hlp.l2Text=testo della firma, è possibile utilizzare segnaposto per le proprietà della firma (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=dimensione del carattere per il testo della firma visibile, il valore predefinito è {0}
hlp.l4Text=testo di stato
hlp.listKeys=elenca le chiavi nel keystore selezionato
hlp.listKsTypes=elenca i tipi di keystore utilizzabili come valori per l'opzione -kst
hlp.loadProperties=Carica le proprietà da un file predefinito (creato dall'applicazione GUI).
hlp.loadPropertiesFile=Carica le proprietà dal file indicato. Il file può essere creato copiando il file di proprietà predefinito .JSignPdf creato dalla GUI nella directory home dell'utente.
hlp.location=luogo della firma (es. Washington DC). Vuoto per impostazione predefinita.
hlp.ocsp=abilita la validazione del certificato tramite OCSP
hlp.ocspServerUrl=URL predefinito del server OCSP, che verrà utilizzato qualora il certificato di firma non contenga questa informazione
hlp.outPath=cartella in cui verranno salvati i documenti firmati. Il valore predefinito è la cartella corrente.
hlp.outPrefix=prefisso per il file firmato. Il valore predefinito è prefisso vuoto.
hlp.outSuffix=suffisso per il nome del file firmato. Il valore predefinito è "_signed". (es. la firma del file mydocument.pdf creerà il nuovo file mydocument_signed.pdf)
hlp.ownerpwd=password del proprietario per i documenti crittografati (utilizzata quando è specificata l'opzione -e)
hlp.page=pagina con la firma visibile. Il valore predefinito è 1 (prima pagina). Se il numero di pagina fornito è fuori intervallo, viene utilizzata l'ultima pagina.
hlp.posLLX=posizione dell'angolo inferiore sinistro sull'asse X di una firma visibile (un valore negativo viene sottratto dalla larghezza della pagina)
hlp.posLLY=posizione dell'angolo inferiore sinistro sull'asse Y di una firma visibile (un valore negativo viene sottratto dall'altezza della pagina)
hlp.posURX=posizione dell'angolo superiore destro sull'asse X di una firma visibile (un valore negativo viene sottratto dalla larghezza della pagina)
hlp.posURY=posizione dell'angolo superiore destro sull'asse Y di una firma visibile (un valore negativo viene sottratto dall'altezza della pagina)
hlp.printRight=diritti di stampa. Utilizzati per i documenti crittografati. Il valore predefinito è ALLOW_PRINTING. I valori disponibili sono {0}
hlp.proxyHost=nome host o indirizzo IP del server proxy
hlp.proxyPort=porta del server proxy, il valore predefinito è {0}
hlp.proxyType=tipo di proxy per le connessioni internet. Il valore predefinito è {0}. I valori possibili sono {1}
hlp.quiet=modalità silenziosa - senza messaggi informativi durante il processo
hlp.reason=motivo della firma. Vuoto per impostazione predefinita.
hlp.renderMode=modalità di visualizzazione per le firme visibili. Il valore predefinito è DESCRIPTION_ONLY. I valori possibili sono {0}
hlp.signerName=nome del firmatario. Per impostazione predefinita è il common name (CN) del certificato scelto.
hlp.tsaAuthn=metodo di autenticazione utilizzato quando si contatta il server TSA. Il valore predefinito è NONE. I valori possibili sono {0}
hlp.tsaCertFile=percorso del file keystore, che contiene la chiave privata utilizzata per l'autenticazione al server TSA, quando viene usato il metodo di autenticazione CERTIFICATE
hlp.tsaCertFileType=tipo di keystore per l'autenticazione TSA CERTIFICATE - il valore predefinito è PKCS12
hlp.tsaCertPasswd=password utilizzata per aprire il file PKCS#12 (vedi opzione -tscf) con una chiave privata
hlp.tsaHashAlg=algoritmo di hash utilizzato nella richiesta al server di marca temporale (TSA); il valore predefinito è {0}
hlp.tsaPolicy=OID della policy TSA da impostare nella richiesta di marca temporale.
hlp.tsaPwd=password dell'utente TSA. Utilizzare questa opzione se si usa la marca temporale (-ts) e il server TSA richiede l'autenticazione.
hlp.tsaUrl=indirizzo del server di marca temporale (TSA). Se si utilizza questo argomento, la marca temporale verrà inclusa nella firma. (A scopo di test è possibile provare il seguente URL http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=nome utente TSA. Utilizzare questa opzione se si usa la marca temporale (-ts) e il server TSA richiede l'autenticazione.
hlp.userpwd=password utente per i documenti crittografati (utilizzata quando è specificata l'opzione -e)
hlp.version=mostra la versione dell'applicazione
hlp.visible=abilita la firma visibile
pdfEncryption.certificate=Certificato
pdfEncryption.notEncrypted=Non crittografato
pdfEncryption.password=Password
render.descriptionOnly=Solo descrizione
render.graphicAndDescription=Immagine e descrizione
rights.allowDegradedPrinting=Consenti degradata
rights.allowPrinting=Consenti
rights.disallowPrinting=Vieta
serverAuthn.certificate=Certificato client
ssl.keymanager.init=Inizializzazione del key manager dal file keystore {0}.
