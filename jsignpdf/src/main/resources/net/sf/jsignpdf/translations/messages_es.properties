hlp.tsaCertPasswd=contraseña utilizada para abrir el archivo PKCS#12 (véase la opción« -tscf») que contiene la clave privada. Use «-» para leer desde la entrada estándar (requiere --enable-stdin-passwords).
gui.vs.bgImgScale.tooltip=Escribe un valor positivo para multiplicar el tamaño de la imagen con el valor.\nEscribe un valor cero para rellenar todo el fondo (estirándolo).\nEscribe un valor negativo para ajustar las dimensiones sin distorsiones.
gui.vs.l2TextFontSize.label=Tamaño de la letra de firma
hlp.outSuffix=sufijo para el nombre del archivo firmado. El valor predeterminado es «_signed». (por ejemplo, el proceso de firma en el archivo «midocumento.pdf» creará un nuevo archivo «midocumento_signed.pdf»)
hlp.page=página con firma visible. El valor predeterminado es 1 (la primera página). Si el número de página proporcionado queda fuera de los límites se utiliza la última página.
hlp.bgPath=ruta de la imagen de fondo para las firmas visibles
hlp.bgScale=Escala de la imagen de fondo para las firmas visibles. Inserte un valor positivo para multiplicar el tamaño de la imagen con el valor. Inserte un valor cero para llenar todo el fondo con él (estirar). Inserte un valor negativo para ajustar al máximo el tamaño de la imagen.
hlp.disableAssembly=prohíbe el ensamblaje de documentos cifrados
hlp.keyPwd=contraseña de la clave contenida en el almacén de claves. En la mayoría de los casos esto no es necesario, ya que solo es el almacén el que está protegido por contraseña y no la clave que tiene dentro, pero por si acaso :) Use «-» para leer desde la entrada estándar (requiere --enable-stdin-passwords).
hlp.ksFile=establece el archivo del almacén de claves, se debe de utilizar una ruta en la que se encuentren las claves privadas (.p12, .pfx, .jks, ...). Algunos almacenes de claves funcionan con archivos (como el almacén de claves de Windows «WINDOWS-MY»), por lo que esta opción puede no ser necesaria dependiendo de la plataforma.
hlp.posURY=posición en el eje Y de la esquina superior derecha de la firma visible (cuando se usa un valor negativo, el valor se resta de la altura de la página)
hlp.footer.examples=Ejemplos:\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY midocumento.pdf\n-> crea una copia de mydocument.pdf con el nombre mydocument_signed.pdf, que está firmado digitalmente con el primer certificado que se encuentra en el almacén de certificados del sistema operativo predeterminado\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> crea un archivo firmado y encriptado mydocument_signed.pdf, no se permite la impresión del nuevo archivo. Para la firma se utiliza clave con alias cert23 del archivo my_certificate.pfx\n------------\n$ java -jar JSignPdf.jar -lkt\n-> enumera los tipos de almacén de claves\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> enumerar los nombres (alias) de las claves almacenadas en el archivo my_certificate.pfx usando la contraseña para el almacén de claves. El modo silencioso está habilitado, por lo que no se imprime información de depuración.
hlp.ocspServerUrl=URL del servidor OCSP predeterminado, que se utilizará en caso de que el certificado de firma no contenga dicha información
hlp.proxyType=tipo de proxy para las conexiones a Internet. El valor por defecto es {0}. Los valores posibles son {1}
