hlp.append=añadir una firma a las existentes. Por defecto, las firmas existentes son reemplazadas por la nueva.
hlp.certLevel=nivel de certificación. El valor predeterminado es «NOT_CERTIFIED» (sin certificar). Los valores disponibles son {0}
hlp.contact=datos de contacto del firmante (un campo de firma)
hlp.crl=activar la validación de certificados CRL
hlp.disableAcro6Layers=desactiva el modo de capas de Acrobat 6; por lo que se crearán todas las capas de firma. En Acrobat 6.0 versiones posteriores se recomienda utilizar solo las capas n2 y n4.
hlp.disableAnnot=prohíbe modificar anotaciones en documentos cifrados
hlp.disableCopy=prohíbe la copia de los documentos cifrados
hlp.disableFill=prohíbe rellenar los documentos cifrados
hlp.disableScrRead=prohíbe el uso de lectores de pantalla en los documentos cifrados
hlp.enableStdinPasswords=permite leer valores de contraseña desde la entrada estándar. Cuando está activado, un valor «-» en una opción de contraseña significa: leer una línea de la entrada estándar (o solicitarla en la consola). Varias opciones de contraseña pueden usar «-» y se leen en el orden fijo: --keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password.
hlp.encCert=ruta al archivo del certificado utilizado para cifrar el PDF de salida si se utiliza «-encryption CERTIFICATE» (con certificado)
hlp.encryption=modo de cifrado para el PDF de salida. El valor predeterminado es «NONE» (ninguno). Los valores posibles son {0}. Se debe utilizar con «-upwd» y «-opwd» si se utiliza el modo «PASSWORD» (contraseña), y «-ec» en caso de «CERTIFICATE» (certificado)
hlp.footer.exitCodes=Códigos de salida del programa:\n-------------------\n  0 el programa terminó sin error\n  1 la línea de comandos tiene un formato incorrecto\n  2 no se ha solicitado ninguna operación, por ejemplo; no se ha proporcionado ningún archivo a firmar\n  3 falla la firma de algunos archivos, pero no de todos\n  4 falla la firma de todos los archivos
hlp.hashAlgorithm=algoritmo de hash utilizado para la firma. El valor por defecto es «SHA1». Los valores disponibles son {0}
hlp.header=JSignPdf es una aplicación diseñada para firmar digitalmente documentos PDF. Si inicia el programa sin ningún argumento en la línea de comandos se abrirá la interfaz gráfica de usuario; en caso contrario se puede usar JSignPdf para automatizar a través del modo por lotes de la línea de comandos.
hlp.help=muestra esta pantalla de ayuda
hlp.imgPath=ruta de la imagen para la firma visible
hlp.keyAlias=nombre (alias) de la clave que debe utilizarse para firmar el documento. Si no se da esta opción se utiliza la primera clave en el almacén de claves (para enumerar los alias de las claves se puede utilizar «-lk»)
hlp.keyIndex=índice que empieza en cero de la clave que debe utilizarse para firmar el documento. Si no se da esta opción ni el alias se utiliza la primera clave (índice=0) del almacén de claves. (Se puede mostrar la lista de alias de claves utilizando «-lk»). Esta opción tiene menor prioridad que alias.
hlp.ksPwd=contraseña para el almacén de claves (KeyStore). Use «-» para leer desde la entrada estándar (requiere --enable-stdin-passwords).
hlp.ksType=establece el tipo de almacén de claves (puede enumerar los posibles valores de esta opción «-lkt» argumento)
hlp.l2Text=texto de la firma, también se pueden utilizar marcadores de posición para las propiedades de la firma (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=tamaño de letra para el texto visible de la firma, de forma predeterminada es {0}
hlp.l4Text=texto de estado
hlp.listKeys=enumera los contenidos del almacén de claves elegido
hlp.listKsTypes=enumera los tipos de almacenes de claves, que pueden utilizarse como valores opción -kst
hlp.loadProperties=Carga las propiedades desde un archivo propio (creado por la interfaz gráfica).
hlp.loadPropertiesFile=Carga las propiedades del archivo dado. El archivo puede crearse copiando el archivo de propiedades predeterminado «.JSignPdf» creado por la interfaz gráfica de usuario en el directorio principal del usuario.
hlp.location=lugar donde se realiza la firma (por ejemplo, Washington DC). Si no se especifica queda en blanco.
hlp.ocsp=activar la validación de certificados OCSP
hlp.outPath=carpeta en la que se almacenarán los documentos firmados. Si no se emplea la carpeta actual.
hlp.outPrefix=prefijo para el nombre del archivo firmado. El valor predeterminado es un prefijo vacío.
hlp.ownerpwd=contraseña del propietario para los documentos cifrados (se utiliza cuando se da la opción «-e»). Use «-» para leer desde la entrada estándar (requiere --enable-stdin-passwords).
hlp.posLLX=posición de la esquina inferior izquierda en el eje X de una firma visible (el valor negativo se resta del ancho de la página)
hlp.posLLY=posición en el eje Y de la esquina inferior izquierda de la firma visible (cuando se usa un valor negativo, el valor se resta de la altura de la página)
hlp.posURX=posición en el eje X de la esquina superior derecha de la firma visible (cuando se usa un valor negativo, el valor se resta del ancho de la página)
hlp.printRight=derechos de impresión. Se utiliza en documentos cifrados. El valor predeterminado es «ALLOW_PRINTING» (se permite su impresión). Los valores disponibles son {0}
hlp.proxyHost=nombre o dirección IP del servidor proxy
hlp.proxyPort=puerto del servidor proxy, el valor por defecto es {0}
hlp.quiet=modo silencioso, no proporciona ningún mensaje informativo durante el proceso
hlp.signerName=nombre del firmante. El valor predeterminado es el nombre común (CN) del certificado elegido.
hlp.reason=razón de firma, vacía de forma predeterminada.
hlp.tsaAuthn=método de autenticación utilizado al contactar con el servidor de sellado temporal (TSA). El valor predeterminado es NONE (ninguno). Los valores posibles son {0}
hlp.tsaCertFile=ruta al archivo del almacén de claves que contiene la clave privada utilizada para la autenticación frente al servidor de sellado temporal (TSA), cuando se utiliza el método de autenticación CERTIFICATE
hlp.tsaHashAlg=algoritmo de hash en la petición al servidor de sellado temporal (TSA); si no se indica se utiliza {0}
hlp.tsaPolicy=ID de objeto (OID) de política de autoridad de sellado de tiempo (TSA) que utilizar en la petición de sellado temporal.
hlp.tsaPwd=contraseña del usuario del servidor de sellado de tiempo (TSA). Utilice este modificador si se utiliza sellado temporal (-ts) y el servidor TSA necesita autenticación. Use «-» para leer desde la entrada estándar (requiere --enable-stdin-passwords).
hlp.tsaUrl=dirección del servidor de sellado de tiempo (TSA). Si se utiliza este argumento la marca de tiempo se incluirá en la firma. (Para hacer pruebas se puede utilizar la URL http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.visible=activa la firma visible
extcsp.nocert=No se recibió ningún certificado desde el almacén de claves, error: {0}
extcsp.nohost=No se puede conectar con el servidor de firma - servidor desconocido {0}: {1}
hlp.tsaUser=nombre del usuario del servidor de sellado de tiempo (TSA). Utilice este conmutador si se utiliza sellado temporal (-ts) y el servidor TSA necesita autenticación.
hlp.userpwd=contraseña del usuario para los documentos cifrados (se utiliza junto con la opción -e). Use «-» para leer desde la entrada estándar (requiere --enable-stdin-passwords).
hlp.version=muestra la versión de la aplicación
extcsp.iohost=No se puede conectar con el servidor de firma; error de conexión: {0}
extcsp.certfactory=Hubo un falo al crear una instancia de «CertificateFactory»
extcsp.nosignature=Hubo un error al firmar, no se ha recibido la firma y no hay ninguna explicación dada
extcsp.nosignatureerr=Hubo un error al firmar, el almacén de claves devolvió un error: {0}
extcsp.unknownhashalg=El algoritmo de huella digital o hash proporcionado ({0}) no es compatible
