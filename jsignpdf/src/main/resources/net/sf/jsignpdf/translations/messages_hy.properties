hlp.disableScrRead=արգելել էկրանի ընթերցիչները գաղտնագրված փաստաթղթերում
hlp.enableStdinPasswords=թույլատրել գաղտնաբառերի արժեքների ընթերցումը ստանդարտ մուտքից։ Երբ միացված է, գաղտնաբառի '-' արժեքը նշանակում է՝ կարդալ մեկ տող ստանդարտ մուտքից (կամ հարցնել կոնսոլում)։ Մի քանի գաղտնաբառերի տարբերակներ կարող են օգտագործել '-' և կարդացվում են ֆիքսված հերթականությամբ՝ --keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password։
hlp.encCert=վկայագրի ֆայլի ուղին, որն օգտագործվում է ելքային PDF-ի գաղտնագրման համար -encryption CERTIFICATE դեպքում
hlp.encrypted=Այս հատկությունը հնացած է, փոխարենը օգտագործեք -encryption PASSWORD։
hlp.encryption=ելքային PDF-ի գաղտնագրման ռեժիմ։ Կանխադրված արժեքն է NONE։ Հնարավոր արժեքներն են {0}։ Օգտագործեք -upwd և -opwd-ի հետ միասին՝ PASSWORD ռեժիմի համար, և -ec՝ CERTIFICATE-ի համար
hlp.footer.examples=Օրինակներ՝\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> ստեղծում է mydocument.pdf-ի պատճեն mydocument_signed.pdf անունով, որը թվայնորեն ստորագրված է կանխադրված օպերացիոն համակարգի վկայագրերի պահոցում գտնված առաջին վկայագրով\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> ստեղծում է ստորագրված և գաղտնագրված mydocument_signed.pdf ֆայլ, նոր ֆայլի տպումն արգելված է։ Ստորագրման համար օգտագործվում է my_certificate.pfx ֆայլի cert23 կեղծանունով բանալին\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> ցուցակագրում է keystore-ի տեսակները\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> ցուցակագրում է my_certificate.pfx ֆայլում պահված բանալիների անունները (կեղծանունները)՝ օգտագործելով keystore-ի գաղտնաբառը։ Լուռ ռեժիմը միացված է, ուստի debug տեղեկատվությունը չի տպվում։
hlp.footer.exitCodes=Ծրագրի ելքային կոդերը՝\\r\\n-------------------\\r\\n  0 ծրագիրն ավարտվեց առանց սխալի\\r\\n  1 հրամանի տողը սխալ ձևաչափով է\\r\\n  2 գործողություն չի պահանջվել - օր․՝ ստորագրման համար ֆայլ չի տրամադրվել\\r\\n  3 որոշ - բայց ոչ բոլոր - ֆայլերի ստորագրումը ձախողվեց\\r\\n  4 բոլոր ֆայլերի ստորագրումը ձախողվեց
hlp.gui=(բետա) ցույց տալ GUI նույնիսկ երբ տրամադրված են այլ հրամանի տողի արգումենտներ
hlp.hashAlgorithm=ստորագրման համար օգտագործվող հեշ ալգորիթմը։ Կանխադրված արժեքն է SHA1։ Հասանելի արժեքներն են {0}
hlp.header=JSignPdf-ը ծրագիր է, որը նախատեսված է PDF փաստաթղթերը թվայնորեն ստորագրելու համար։ Եթե ծրագիրը գործարկեք առանց որևէ հրամանի տողի արգումենտի, կգործարկվի GUI-ն, հակառակ դեպքում դուք կարող եք օգտագործել JSignPdf-ը հրամանի տողի փաթեթային ռեժիմում։
hlp.help=տպում է այս օգնության էկրանը
hlp.imgPath=պատկերի ուղի տեսանելի ստորագրության համար
hlp.keyAlias=բանալու անունը (կեղծանունը), որը պետք է օգտագործվի փաստաթուղթը ստորագրելու համար։ Եթե այս տարբերակը նշված չէ, օգտագործվում է keystore-ում առաջին բանալին։ (Բանալիների կեղծանունները ցուցակագրելու համար օգտագործեք -lk)
hlp.keyIndex=բանալու զրոյից սկսող ինդեքսը, որը պետք է օգտագործվի փաստաթուղթը ստորագրելու համար։ Եթե ոչ այս տարբերակը, ոչ էլ կեղծանունը նշված չեն, օգտագործվում է keystore-ում առաջին (index=0) բանալին։ (Բանալիների կեղծանունները ցուցակագրելու համար օգտագործեք -lk)։ Այս տարբերակն ունի ավելի ցածր առաջնահերթություն, քան կեղծանունը։
hlp.keyPwd=keystore-ում բանալու գաղտնաբառը։ Շատ դեպքերում դուք կարիք չեք ունենա այս տարբերակը սահմանել - միայն keystore-ն է պաշտպանված գաղտնաբառով, բայց ամեն դեպքում :) Օգտագործեք '-' գաղտնաբառը ստանդարտ մուտքից կարդալու համար (պահանջում է --enable-stdin-passwords):
hlp.ksFile=սահմանում է KeyStore ֆայլը - որպես արժեք օգտագործեք այն ուղին, որտեղ գտնվում է գաղտնի բանալին(ները) պարունակող ֆայլը (.p12, .pfx, .jks, ...)։ Որոշ keystore-ներ բանալիները ֆայլում չեն պահում (օր․՝ windows keystore - WINDOWS-MY), այդ դեպքում մի օգտագործեք այս տարբերակը։
hlp.ksPwd=KeyStore-ի գաղտնաբառ։ Օգտագործեք '-' գաղտնաբառը ստանդարտ մուտքից կարդալու համար (պահանջում է --enable-stdin-passwords):
hlp.ksType=սահմանում է KeyStore-ի տեսակը (այս տարբերակի հնարավոր արժեքները կարող եք ցուցակագրել -lkt արգումենտով)
hlp.l2Text=ստորագրության տեքստ, կարող եք նաև օգտագործել ստորագրության հատկությունների փոխարինիչներ (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=տեսանելի ստորագրության տեքստի տառատեսակի չափը, կանխադրված արժեքն է {0}
hlp.l4Text=կարգավիճակի տեքստ
hlp.listKeys=ցուցակագրում է ընտրված keystore-ի բանալիները
hlp.listKsTypes=ցուցակագրում է keystore-ի տեսակները, որոնք կարող են օգտագործվել որպես -kst տարբերակի արժեքներ
hlp.loadProperties=Բեռնում է հատկությունները կանխադրված ֆայլից (ստեղծված GUI ծրագրի կողմից)։
hlp.loadPropertiesFile=Բեռնում է հատկությունները տրված ֆայլից։ Ֆայլը կարող է ստեղծվել՝ պատճենելով GUI-ի կողմից օգտատիրոջ տնային գրացուցակում ստեղծված կանխադրված .JSignPdf հատկությունների ֆայլը։
hlp.location=ստորագրության տեղանքը (օր․՝ Washington DC)։ Կանխադրված դատարկ է։
hlp.ocsp=միացնել OCSP վկայագրի վավերացումը
hlp.ocspServerUrl=կանխադրված OCSP սերվերի URL, որը կօգտագործվի այն դեպքում, երբ ստորագրման վկայագիրը չի պարունակում այս տեղեկատվությունը
hlp.outPath=պանակ, որում կպահվեն ստորագրված փաստաթղթերը։ Կանխադրված արժեքն ընթացիկ պանակն է։
hlp.outPrefix=ստորագրված ֆայլի նախածանցը։ Կանխադրված արժեքը դատարկ նախածանց է։
hlp.outSuffix=ստորագրված ֆայլի անվան վերջածանցը։ Կանխադրված արժեքն է "_signed"։ (օր․՝ mydocument.pdf ֆայլի ստորագրումը կստեղծի նոր ֆայլ mydocument_signed.pdf անունով)
hlp.ownerpwd=սեփականատիրոջ գաղտնաբառը գաղտնագրված փաստաթղթերի համար (օգտագործվում է, երբ տրված է -e տարբերակը)։ Օգտագործեք '-' գաղտնաբառը ստանդարտ մուտքից կարդալու համար (պահանջում է --enable-stdin-passwords):
hlp.page=տեսանելի ստորագրությամբ էջը։ Կանխադրված արժեքն է 1 (առաջին էջ)։ Եթե տրամադրված էջի համարը սահմաններից դուրս է, ապա օգտագործվում է վերջին էջը։
hlp.posLLX=տեսանելի ստորագրության ներքևի ձախ անկյան դիրքը X առանցքի վրա (բացասական արժեքը հանվում է էջի լայնությունից)
hlp.posLLY=տեսանելի ստորագրության ներքևի ձախ անկյան դիրքը Y առանցքի վրա (բացասական արժեքը հանվում է էջի բարձրությունից)
hlp.posURX=տեսանելի ստորագրության վերևի աջ անկյան դիրքը X առանցքի վրա (բացասական արժեքը հանվում է էջի լայնությունից)
hlp.posURY=տեսանելի ստորագրության վերևի աջ անկյան դիրքը Y առանցքի վրա (բացասական արժեքը հանվում է էջի բարձրությունից)
hlp.printRight=տպման իրավունքներ։ Օգտագործվում է գաղտնագրված փաստաթղթերի համար։ Կանխադրված արժեքն է ALLOW_PRINTING։ Հասանելի արժեքներն են {0}
hlp.proxyHost=proxy սերվերի հոսթի անվանումը կամ IP հասցեն
hlp.proxyPort=proxy սերվերի պորտը, կանխադրված արժեքն է {0}
hlp.proxyType=proxy-ի տեսակը ինտերնետային կապակցումների համար։ Կանխադրված արժեքն է {0}։ Հնարավոր արժեքներն են {1}
hlp.quiet=լուռ ռեժիմ - առանց տեղեկատվական հաղորդագրությունների գործընթացի ընթացքում
hlp.reason=ստորագրության պատճառը։ Կանխադրված դատարկ է։
hlp.renderMode=տեսանելի ստորագրությունների արտապատկերման ռեժիմը։ Կանխադրված արժեքն է DESCRIPTION_ONLY։ Հնարավոր արժեքներն են {0}
hlp.signerName=ստորագրողի անունը։ Կանխադրված է ընտրված վկայագրի ընդհանուր անվանումը (CN)։
hlp.tsaAuthn=TSA սերվերի հետ կապ հաստատելիս օգտագործվող նույնականացման մեթոդը։ Կանխադրված արժեքն է NONE։ Հնարավոր արժեքներն են {0}
hlp.tsaCertFile=keystore ֆայլի ուղին, որը պարունակում է գաղտնի բանալին, որն օգտագործվում է TSA սերվերի դիմաց նույնականացման համար, երբ օգտագործվում է CERTIFICATE նույնականացման մեթոդը
hlp.tsaCertFileType=keystore-ի տեսակը TSA CERTIFICATE նույնականացման համար - կանխադրվածը PKCS12 է
hlp.tsaCertPasswd=գաղտնաբառ, որն օգտագործվում է գաղտնի բանալի պարունակող PKCS#12 ֆայլը բացելու համար (տես -tscf տարբերակը)։ Օգտագործեք '-' գաղտնաբառը ստանդարտ մուտքից կարդալու համար (պահանջում է --enable-stdin-passwords):
hlp.tsaHashAlg=ժամանականիշ տրամադրող սերվերին (TSA) հարցման մեջ օգտագործվող հեշ ալգորիթմը; կանխադրվածն է {0}
hlp.tsaPolicy=TSA քաղաքականության OID, որը պետք է սահմանվի ժամանականիշի հարցման համար։
hlp.tsaPwd=TSA օգտատիրոջ գաղտնաբառը։ Օգտագործեք այս տարբերակը, եթե օգտագործում եք ժամանականիշավորում (-ts) և TSA սերվերը պահանջում է նույնականացում։ Օգտագործեք '-' գաղտնաբառը ստանդարտ մուտքից կարդալու համար (պահանջում է --enable-stdin-passwords):
hlp.tsaUrl=ժամանականիշ տրամադրող սերվերի (TSA) հասցեն։ Եթե օգտագործեք այս արգումենտը, ժամանականիշը կներառվի ստորագրության մեջ։ (Փորձարկման նպատակներով կարող եք փորձել հետևյալ URL-ը՝ http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=TSA օգտատիրոջ անունը։ Օգտագործեք այս տարբերակը, եթե օգտագործում եք ժամանականիշավորում (-ts) և TSA սերվերը պահանջում է նույնականացում։
hlp.userpwd=օգտատիրոջ գաղտնաբառը գաղտնագրված փաստաթղթերի համար (օգտագործվում է, երբ տրված է -e տարբերակը)։ Օգտագործեք '-' գաղտնաբառը ստանդարտ մուտքից կարդալու համար (պահանջում է --enable-stdin-passwords):
