hlp.disableFill=மறைகுறியாக்கப்பட்ட ஆவணங்களை நிரப்பு மறுக்கவும்
hlp.disableScrRead=மறைகுறியாக்கப்பட்ட ஆவணங்களில் திரை வாசகர்களை மறுக்கவும்
hlp.enableStdinPasswords=நிலையான உள்ளீட்டிலிருந்து கடவுச்சொல் மதிப்புகளைப் படிக்க அனுமதிக்கிறது. அமைக்கப்பட்டால், கடவுச்சொல் விருப்பத்தின் மதிப்பு '-' என்பது stdin இலிருந்து ஒரு வரியைப் படிக்கவும் (அல்லது கன்சோலில் கேட்கவும்) என்பதைக் குறிக்கிறது. பல கடவுச்சொல் விருப்பங்கள் '-' ஐப் பயன்படுத்தலாம், அவை நிலையான வரிசையில் படிக்கப்படுகின்றன: --keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password.
hlp.encCert=சான்றிதழ் கோப்பிற்கான பாதை, இது -குறியாக்க சான்றிதழ் இருந்தால் வெளியீட்டு PDF ஐ குறியாக்க பயன்படுகிறது
hlp.encrypted=இந்த சொத்து நீக்கப்பட்டது, அதற்கு பதிலாக -குறியாக்க கடவுச்சொல்லைப் பயன்படுத்துங்கள்!
hlp.encryption=வெளியீட்டு PDF இயல்புநிலை மதிப்புக்கான குறியாக்க முறை எதுவும் இல்லை. சாத்தியமான மதிப்புகள் {0}. கடவுச்சொல் பயன்முறையில் -upwd மற்றும் -opwd உடன் togethter ஐப் பயன்படுத்தவும், மற்றும் சான்றிதழ் இருந்தால் -ec
hlp.footer.examples=எடுத்துக்காட்டுகள்:\r\n ---------\r\n $ சாவா -jar jsignpdf.jar -kst சாளரங்கள் -மீ மைடோகூமென்ட்.பிடிஎஃப்\r\n .\r\n ------------\r\n $ சாவா -jar jsignpdf.jar -kst pkcs12 -ksf my_certificate.pfx -ksp myprivatekeystorepassword -ka cert23 -pe password -pewd xxx123 -upwd 123xx -pr myDocument.pdfing myDocument.pdfing\r\n . கையொப்பம் my_certificate.pfx கோப்பிலிருந்து CERT23 மாற்றுப்பெயருடன் பயன்படுத்தப்படுகிறது\r\n ------------\r\n $ சாவா -jar jsignpdf.jar -lkt\r\n -> கீச்டோர் வகைகளை பட்டியலிடுகிறது\r\n ------------\r\n $ சாவா -jar jsignpdf.jar -kst pkcs12 -ksf my_certificate.pfx -ksp myveryprivatepassword -lk -q\r\n . அமைதியான பயன்முறை இயக்கப்பட்டது, எனவே பிழைத்திருத்த செய்தி எதுவும் அச்சிடப்படவில்லை.
hlp.footer.exitCodes=நிரல் வெளியேறும் குறியீடுகள்:\r\n --------------------\r\n 0 நிரல் பிழை இல்லாமல் முடிந்தது\r\n 1 கட்டளை வரி தவறான வடிவத்தில் உள்ளது\r\n 2 எந்த நடவடிக்கையும் கோரப்படவில்லை - எ.கா. கையொப்பமிடுவதற்கான கோப்பு எதுவும் வழங்கப்படவில்லை\r\n 3 சிலவற்றில் கையொப்பமிடுதல் - ஆனால் அனைத்தும் இல்லை - கோப்புகள் தோல்வியடைந்தன\r\n அனைத்து கோப்புகளின் கையொப்பமும் தோல்வியடைந்தது
hlp.gui=(பீட்டா) பிற கட்டளை வரி வாதங்கள் வழங்கப்படும்போது கூட GUI ஐக் காட்டு
hlp.hashAlgorithm=கையொப்பத்திற்கு பயன்படுத்தப்படும் ஆச் வழிமுறை. இயல்புநிலை மதிப்பு SHA1. கிடைக்கக்கூடிய மதிப்புகள் {0}
hlp.header=JSIGNPDF என்பது PDF ஆவணங்களை டிசிட்டல் முறையில் கையொப்பமிட வடிவமைக்கப்பட்ட பயன்பாடாகும். எந்தவொரு கட்டளை வரி வாதமும் இல்லாமல் நீங்கள் நிரலைத் தொடங்கினால், GUI தொடங்கப்படும், இல்லையெனில் நீங்கள் கட்டளை வரி தொகுதி பயன்முறையில் JSIGNPDF ஐப் பயன்படுத்தலாம்.
hlp.help=இந்த உதவித் திரையை அச்சிடுகிறது
hlp.imgPath=புலப்படும் கையொப்பத்திற்கான பட பாதை
hlp.keyAlias=விசையின் பெயர் (மாற்றுப்பெயர்), இது ஆவணத்தில் கையொப்பமிட பயன்படுத்தப்பட வேண்டும். இந்த விருப்பம் வழங்கப்படாவிட்டால், கீச்டோரில் முதல் விசை பயன்படுத்தப்படுகிறது. (-Lk ஐப் பயன்படுத்தி முக்கிய மாற்றுப்பெயர்களை பட்டியலிடுங்கள்)
hlp.keyIndex=விசையின் சுழிய அடிப்படையிலான குறியீடு, இது ஆவணத்தில் கையொப்பமிட பயன்படுத்தப்பட வேண்டும். இந்த விருப்பமோ அல்லது மாற்றுப்பெயரோ கொடுக்கப்படாவிட்டால், கீச்டோரில் முதல் விசை (குறியீட்டு = 0) பயன்படுத்தப்படுகிறது. (-Lk ஐப் பயன்படுத்தி முக்கிய மாற்றுப்பெயர்களை பட்டியலிடுங்கள்). இந்த விருப்பத்திற்கு மாற்றுப்பெயரை விட குறைந்த முன்னுரிமை உள்ளது.
hlp.keyPwd=கீச்டோரில் விசையின் கடவுச்சொல். பெரும்பாலான சந்தர்ப்பங்களில் நீங்கள் இந்த விருப்பத்தை அமைக்கத் தேவையில்லை - கீச்டோர் மட்டுமே கடவுச்சொல்லால் பாதுகாக்கப்படுகிறது, ஆனால் ஒரு விசயத்தில் தான் :) stdin இலிருந்து படிக்க '-' ஐப் பயன்படுத்தவும் (--enable-stdin-passwords தேவை).
hlp.ksFile=கீச்டோர் கோப்பை அமைக்கிறது - மதிப்பில் தனியார் விசை (கள்) அமைந்துள்ள பாதையை மதிப்பு பயன்படுத்துவதால் (.p12, .pfx, .jks, ...). சில கீச்டோர்ச் ஒரு கோப்பில் (எ.கா. சாளரங்கள் கீச்டோர் - சாளரங்கள் -என்) சேமிக்கப்பட்ட விசைகள் இல்லை, பின்னர் இந்த விருப்பத்தைப் பயன்படுத்த வேண்டாம்.
hlp.ksPwd=கீச்டோருக்கு கடவுச்சொல். stdin இலிருந்து படிக்க '-' ஐப் பயன்படுத்தவும் (--enable-stdin-passwords தேவை).
hlp.ksType=கீச்டோர் வகையை அமைக்கிறது (இந்த விருப்பத்திற்கான சாத்தியமான மதிப்புகளை நீங்கள் பட்டியலிடலாம் -lkt வாதம்)
hlp.l2Text=கையொப்ப உரை, கையொப்ப பண்புகளுக்கு ($ {signer}, $ {certificate}, $ {timestamp}, $ {location}, $ {reason}, $ {contact})
hlp.l2TextFontSize=காணக்கூடிய கையொப்ப உரைக்கான எழுத்துரு அளவு, இயல்புநிலை மதிப்பு {0}
hlp.l4Text=நிலை உரை
hlp.listKeys=சீசன் கீச்டோரில் விசைகளை பட்டியலிடுகிறது
hlp.listKsTypes=கீச்டோர் வகைகளை பட்டியலிடுகிறது, அவை மதிப்புகள் -கேஎச்டி விருப்பமாக பயன்படுத்தப்படலாம்
hlp.posLLX=புலப்படும் கையொப்பத்தின் x- அச்சில் கீழ் இடது மூலையில் நிலை (எதிர்மறை மதிப்பு பக்க அகலத்திலிருந்து கழிக்கப்படுகிறது)
hlp.posLLY=புலப்படும் கையொப்பத்தின் Y- அச்சில் கீழ் இடது மூலையில் நிலை (எதிர்மறை மதிப்பு பக்க உயரத்திலிருந்து கழிக்கப்படுகிறது)
hlp.posURX=புலப்படும் கையொப்பத்தின் எக்ச்-அச்சில் மேல் வலது மூலையில் நிலை (எதிர்மறை மதிப்பு பக்க அகலத்திலிருந்து கழிக்கப்படுகிறது)
hlp.posURY=புலப்படும் கையொப்பத்தின் Y- அச்சில் மேல் வலது மூலையில் நிலை (எதிர்மறை மதிப்பு பக்க உயரத்திலிருந்து கழிக்கப்படுகிறது)
hlp.printRight=அச்சிடும் உரிமைகள். மறைகுறியாக்கப்பட்ட ஆவணங்களுக்கு பயன்படுத்தப்படுகிறது. இயல்புநிலை மதிப்பு Allow_printing ஆகும். கிடைக்கக்கூடிய மதிப்புகள் {0}
hlp.proxyHost=பதிலாள் சேவையகத்தின் ஓச்ட்பெயர் அல்லது ஐபி முகவரி
hlp.proxyPort=பதிலாள் சேவையகத்தின் துறைமுகம், இயல்புநிலை மதிப்பு {0}
hlp.proxyType=இணைய இணைப்புகளுக்கான பதிலாள் வகை. இயல்புநிலை மதிப்பு {0}. சாத்தியமான மதிப்புகள் {1}
hlp.quiet=அமைதியான பயன்முறை - செயல்பாட்டின் போது செய்தி செய்திகள் இல்லாமல்
hlp.signerName=கையொப்பமிட்டவர் பெயர். தேர்ந்தெடுக்கப்பட்ட சான்றிதழின் பொதுவான பெயருக்கு (சி.என்) இயல்புநிலை.
hlp.reason=கையொப்பத்தின் காரணம். இயல்பாக காலியாக உள்ளது.
hlp.renderMode=புலப்படும் கையொப்பங்களுக்கான பயன்முறை. இயல்புநிலை மதிப்பு விளக்கம்_ஒரு. சாத்தியமான மதிப்புகள் {0}
hlp.tsaAuthn=TSA சேவையகத்தைத் தொடர்பு கொள்ளும்போது அங்கீகார முறை பயன்படுத்தப்படுகிறது. இயல்புநிலை மதிப்பு எதுவுமில்லை. சாத்தியமான மதிப்புகள் {0}
hlp.tsaCertFile=சான்றிதழ் அங்கீகார முறை பயன்படுத்தப்படும்போது, டிஎச்ஏ சேவையகத்திற்கு எதிரான அங்கீகாரத்திற்கு பயன்படுத்தப்படும் தனிப்பட்ட விசையைக் கொண்ட கீச்டோர் கோப்பிற்கான பாதை
hlp.tsaCertFileType=TSA சான்றிதழ் அங்கீகாரத்திற்கான கீச்டோர் வகை - இயல்புநிலை PKCS12
hlp.tsaCertPasswd=தனிப்பட்ட விசையுடன் PKCS#12 கோப்பை (-TSCF விருப்பத்தைப் பார்க்கவும்) திறக்க கடவுச்சொல் பயன்படுத்தப்படுகிறது. stdin இலிருந்து படிக்க '-' ஐப் பயன்படுத்தவும் (--enable-stdin-passwords தேவை).
