hlp.footer.examples=\u0B8E\u0B9F\u0BC1\u0BA4\u0BCD\u0BA4\u0BC1\u0B95\u0BCD\u0B95\u0BBE\u0B9F\u0BCD\u0B9F\u0BC1\u0B95\u0BB3\u0BCD:\r\n ---------\r\n $ \u0B9A\u0BBE\u0BB5\u0BBE -jar jsignpdf.jar -kst \u0B9A\u0BBE\u0BB3\u0BB0\u0B99\u0BCD\u0B95\u0BB3\u0BCD -\u0BAE\u0BC0 \u0BAE\u0BC8\u0B9F\u0BCB\u0B95\u0BC2\u0BAE\u0BC6\u0BA9\u0BCD\u0B9F\u0BCD.\u0BAA\u0BBF\u0B9F\u0BBF\u0B8E\u0B83\u0BAA\u0BCD\r\n .\r\n ------------\r\n $ \u0B9A\u0BBE\u0BB5\u0BBE -jar jsignpdf.jar -kst pkcs12 -ksf my_certificate.pfx -ksp myprivatekeystorepassword -ka cert23 -pe password -pewd xxx123 -upwd 123xx -pr myDocument.pdfing myDocument.pdfing\r\n . \u0B95\u0BC8\u0BAF\u0BCA\u0BAA\u0BCD\u0BAA\u0BAE\u0BCD my_certificate.pfx \u0B95\u0BCB\u0BAA\u0BCD\u0BAA\u0BBF\u0BB2\u0BBF\u0BB0\u0BC1\u0BA8\u0BCD\u0BA4\u0BC1 CERT23 \u0BAE\u0BBE\u0BB1\u0BCD\u0BB1\u0BC1\u0BAA\u0BCD\u0BAA\u0BC6\u0BAF\u0BB0\u0BC1\u0B9F\u0BA9\u0BCD \u0BAA\u0BAF\u0BA9\u0BCD\u0BAA\u0B9F\u0BC1\u0BA4\u0BCD\u0BA4\u0BAA\u0BCD\u0BAA\u0B9F\u0BC1\u0B95\u0BBF\u0BB1\u0BA4\u0BC1\r\n ------------\r\n $ \u0B9A\u0BBE\u0BB5\u0BBE -jar jsignpdf.jar -lkt\r\n -> \u0B95\u0BC0\u0B9A\u0BCD\u0B9F\u0BCB\u0BB0\u0BCD \u0BB5\u0B95\u0BC8\u0B95\u0BB3\u0BC8 \u0BAA\u0B9F\u0BCD\u0B9F\u0BBF\u0BAF\u0BB2\u0BBF\u0B9F\u0BC1\u0B95\u0BBF\u0BB1\u0BA4\u0BC1\r\n ------------\r\n $ \u0B9A\u0BBE\u0BB5\u0BBE -jar jsignpdf.jar -kst pkcs12 -ksf my_certificate.pfx -ksp myveryprivatepassword -lk -q\r\n . \u0B85\u0BAE\u0BC8\u0BA4\u0BBF\u0BAF\u0BBE\u0BA9 \u0BAA\u0BAF\u0BA9\u0BCD\u0BAE\u0BC1\u0BB1\u0BC8 \u0B87\u0BAF\u0B95\u0BCD\u0B95\u0BAA\u0BCD\u0BAA\u0B9F\u0BCD\u0B9F\u0BA4\u0BC1, \u0B8E\u0BA9\u0BB5\u0BC7 \u0BAA\u0BBF\u0BB4\u0BC8\u0BA4\u0BCD\u0BA4\u0BBF\u0BB0\u0BC1\u0BA4\u0BCD\u0BA4 \u0B9A\u0BC6\u0BAF\u0BCD\u0BA4\u0BBF \u0B8E\u0BA4\u0BC1\u0BB5\u0BC1\u0BAE\u0BCD \u0B85\u0B9A\u0BCD\u0B9A\u0BBF\u0B9F\u0BAA\u0BCD\u0BAA\u0B9F\u0BB5\u0BBF\u0BB2\u0BCD\u0BB2\u0BC8.
