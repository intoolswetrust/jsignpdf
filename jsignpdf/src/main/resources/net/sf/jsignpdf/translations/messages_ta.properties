hlp.tsaUrl=நேர முத்திரை சேவையகத்தின் முகவரி (டிஎச்ஏ). நீங்கள் இந்த வாதத்தைப் பயன்படுத்தினால், நேர முத்திரை கையொப்பத்திற்கு சேர்க்கப்படும். (சோதனை நோக்கங்களுக்காக நீங்கள் முகவரி ஐப் பின்பற்ற முயற்சி செய்யலாம்
hlp.tsaUser=TSA பயனர் பெயர். நீங்கள் நேர முத்திரை (-TS) மற்றும் TSA சேவையகத்தைப் பயன்படுத்தினால் இந்த சுவிட்சைப் பயன்படுத்தவும்.
