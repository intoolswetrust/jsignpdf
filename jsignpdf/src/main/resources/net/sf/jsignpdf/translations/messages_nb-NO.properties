hlp.append=legg til signatur til de eksisterende. Som standard erstattes eksisterende signaturer med den nye.
hlp.bgPath=bane til bakgrunnsbilde for synlige signaturer
hlp.bgScale=skalering av bakgrunnsbilde for synlige signaturer. Angi en positiv verdi for å multiplisere bildestørrelsen med verdien. Angi null for å fylle hele bakgrunnen med bildet (strekk). Angi en negativ verdi for best tilpasning.
hlp.certLevel=sertifiseringsnivå. Standardverdi er NOT_CERTIFIED. Tilgjengelige verdier er {0}
hlp.contact=signaturens kontaktdetaljer (et signaturfelt)
hlp.crl=aktiver CRL-sertifikatvalidering
hlp.disableAcro6Layers=deaktiverer Acrobat 6-lagmodus, dvs. alle signaturlag vil bli opprettet. Acrobat 6.0 og nyere anbefaler at kun lag n2 og n4 er til stede.
hlp.disableAnnot=nekt endring av merknader i krypterte dokumenter
hlp.disableAssembly=nekt sammenstilling i krypterte dokumenter
hlp.disableContent=nekt endring av innhold i krypterte dokumenter
hlp.disableCopy=nekt kopiering i krypterte dokumenter
hlp.disableFill=nekt utfylling i krypterte dokumenter
hlp.disableScrRead=nekt skjermlesere i krypterte dokumenter
hlp.encCert=bane til sertifikatfilen som brukes til å kryptere utdata-PDF-en ved bruk av -encryption CERTIFICATE
hlp.encrypted=Denne egenskapen er utdatert, bruk -encryption PASSWORD i stedet!
hlp.encryption=krypteringsmodus for utdata-PDF-en. Standardverdi er NONE. Mulige verdier er {0}. Brukes sammen med -upwd og -opwd ved PASSWORD-modus, og -ec ved CERTIFICATE
hlp.footer.examples=Eksempler:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> oppretter en kopi av mydocument.pdf med navnet mydocument_signed.pdf, som er digitalt signert med det første sertifikatet som finnes i operativsystemets standard sertifikatlager\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> oppretter en signert og kryptert fil mydocument_signed.pdf, utskrift av den nye filen er ikke tillatt. Til signeringen brukes nøkkelen med alias cert23 fra filen my_certificate.pfx\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> lister nøkkellagertyper\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> lister navn (alias) på nøkler lagret i filen my_certificate.pfx med nøkkellagerpassordet. Stille modus er aktivert, så ingen feilsøkingsinformasjon skrives ut.
hlp.footer.exitCodes=Programavslutningskoder:\\r\\n-------------------\\r\\n  0 programmet fullførte uten feil\\r\\n  1 kommandolinjen har feil format\\r\\n  2 ingen operasjon forespurt - f.eks. ingen fil for signering oppgitt\\r\\n  3 signering av noen - men ikke alle - filer feilet\\r\\n  4 signering av alle filer feilet
hlp.gui=(beta) vis GUI selv når andre kommandolinjeargumenter er oppgitt
hlp.hashAlgorithm=hash-algoritme brukt til signatur. Standardverdi er SHA1. Tilgjengelige verdier er {0}
hlp.header=JSignPdf er et program laget for å digitalt signere PDF-dokumenter. Hvis du starter programmet uten kommandolinjeargumenter, vil GUI-et starte, ellers kan du bruke JSignPdf i kommandolinje-batchmodus.
hlp.help=skriver ut denne hjelpeskjermen
hlp.imgPath=bildebane for synlig signatur
hlp.keyAlias=navn (alias) på nøkkelen som skal brukes til å signere dokumentet. Hvis dette alternativet ikke er oppgitt, brukes den første nøkkelen i nøkkellageret. (List nøkkelalias med -lk)
hlp.keyIndex=nullbasert indeks for nøkkelen som skal brukes til å signere dokumentet. Hvis verken dette alternativet eller alias er oppgitt, brukes den første nøkkelen (index=0) i nøkkellageret. (List nøkkelalias med -lk). Dette alternativet har lavere prioritet enn alias.
hlp.keyPwd=passord for nøkkelen i nøkkellageret. I de fleste tilfeller trenger du ikke å sette dette alternativet - kun nøkkellageret er beskyttet av et passord, men i tilfelle :)
hlp.ksFile=angir KeyStore-fil - som verdi brukes banen der filen med privat(e) nøkkel/nøkler er plassert (.p12, .pfx, .jks, ...). Noen nøkkellagre har ikke nøkler lagret i en fil (f.eks. Windows-nøkkellager - WINDOWS-MY), da skal dette alternativet ikke brukes.
hlp.ksPwd=passord til KeyStore
hlp.ksType=angir KeyStore-type (du kan liste mulige verdier for dette alternativet med -lkt-argumentet)
hlp.l2Text=signaturtekst, du kan også bruke plassholdere for signaturegenskaper (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=skriftstørrelse for synlig signaturtekst, standardverdi er {0}
hlp.listKeys=lister nøkler i valgt nøkkellager
hlp.listKsTypes=lister nøkkellagertyper som kan brukes som verdier for -kst-alternativet
hlp.loadProperties=Laster egenskaper fra en standardfil (opprettet av GUI-programmet).
hlp.loadPropertiesFile=Laster egenskaper fra den oppgitte filen. Filen kan opprettes ved å kopiere standard egenskapsfil .JSignPdf opprettet av GUI-et i brukerens hjemmekatalog.
hlp.location=signaturens plassering (f.eks. Oslo). Tom som standard.
hlp.ocsp=aktiver OCSP-sertifikatvalidering
hlp.ocspServerUrl=standard OCSP-server-URL, som brukes hvis signeringssertifikatet ikke inneholder denne informasjonen
hlp.outPath=mappe der de signerte dokumentene lagres. Standardverdi er gjeldende mappe.
hlp.outPrefix=prefiks for signert fil. Standardverdi er tomt prefiks.
hlp.outSuffix=suffiks for signert filnavn. Standardverdi er "_signed". (f.eks. signering av filen mydocument.pdf oppretter den nye filen mydocument_signed.pdf)
hlp.ownerpwd=eierpassord for krypterte dokumenter (brukes når -e-alternativet er oppgitt)
hlp.page=side med synlig signatur. Standardverdi er 1 (første side). Hvis det oppgitte sidetallet er utenfor rekkevidde, brukes siste side.
hlp.posLLX=posisjonen til nedre venstre hjørne på X-aksen for en synlig signatur (negativ verdi trekkes fra sidebredden)
hlp.posLLY=posisjonen til nedre venstre hjørne på Y-aksen for en synlig signatur (negativ verdi trekkes fra sidehøyden)
hlp.posURX=posisjonen til øvre høyre hjørne på X-aksen for en synlig signatur (negativ verdi trekkes fra sidebredden)
hlp.posURY=posisjonen til øvre høyre hjørne på Y-aksen for en synlig signatur (negativ verdi trekkes fra sidehøyden)
hlp.printRight=utskriftsrettigheter. Brukes for krypterte dokumenter. Standardverdi er ALLOW_PRINTING. Tilgjengelige verdier er {0}
hlp.proxyHost=vertsnavn eller IP-adresse til proxyserver
hlp.proxyPort=port til proxyserver, standardverdi er {0}
hlp.proxyType=proxytype for internetttilkoblinger. Standardverdi er {0}. Mulige verdier er {1}
hlp.quiet=stille modus - uten informasjonsmeldinger under prosessen
hlp.reason=årsak til signaturen. Tom som standard.
hlp.renderMode=visningsmodus for synlige signaturer. Standardverdi er DESCRIPTION_ONLY. Mulige verdier er {0}
hlp.signerName=signaturnavn. Standard er det vanlige navnet (CN) til det valgte sertifikatet.
hlp.tsaAuthn=autentiseringsmetode brukt ved kontakt med TSA-server. Standardverdi er NONE. Mulige verdier er {0}
hlp.tsaCertFile=bane til nøkkellagerfilen som inneholder privat nøkkel brukt til autentisering mot TSA-server når CERTIFICATE-autentiseringsmetode brukes
hlp.tsaCertFileType=nøkkellagertype for TSA CERTIFICATE-autentisering - standard er PKCS12
hlp.tsaCertPasswd=passord som brukes til å åpne PKCS#12-filen (se -tscf-alternativet) med en privat nøkkel
hlp.tsaHashAlg=hash-algoritme brukt i forespørsel til tidsstemplingsserveren (TSA); standard er {0}
hlp.tsaPolicy=TSA-policy-OID som skal settes for tidsstempelforespørselen.
hlp.tsaPwd=TSA-brukerpassord. Bruk denne bryteren hvis du bruker tidsstempling (-ts) og TSA-serveren krever autentisering.
hlp.tsaUrl=adresse til tidsstemplingsserver (TSA). Hvis du bruker dette argumentet, inkluderes tidsstempelet i signaturen. (For testformål kan du prøve følgende URL http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=TSA-brukernavn. Bruk denne bryteren hvis du bruker tidsstempling (-ts) og TSA-serveren krever autentisering.
hlp.userpwd=brukerpassord for krypterte dokumenter (brukes når -e-alternativet er oppgitt)
pdfEncryption.certificate=Sertifikat
rights.allowDegradedPrinting=Tillat forringet
ssl.keymanager.init=Initialiserer nøkkelbehandler fra nøkkellagerfil {0}.
