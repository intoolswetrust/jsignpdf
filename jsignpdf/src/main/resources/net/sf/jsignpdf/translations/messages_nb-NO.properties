hlp.footer.examples=Eksempler:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> oppretter en kopi av mydocument.pdf med navnet mydocument_signed.pdf, som er digitalt signert med det fû¡rste sertifikatet som finnes i operativsystemets standard sertifikatlager\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> oppretter en signert og kryptert fil mydocument_signed.pdf, utskrift av den nye filen er ikke tillatt. Til signeringen brukes nû¡kkelen med alias cert23 fra filen my_certificate.pfx\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> lister nû¡kkellagertyper\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> lister navn (alias) pûË nû¡kler lagret i filen my_certificate.pfx med nû¡kkellagerpassordet. Stille modus er aktivert, sûË ingen feilsû¡kingsinformasjon skrives ut.
