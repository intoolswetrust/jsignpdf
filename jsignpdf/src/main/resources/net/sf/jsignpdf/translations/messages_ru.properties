hlp.footer.examples=\u041F\u0440\u0438\u043C\u0435\u0440\u044B:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> \u0441\u043E\u0437\u0434\u0430\u0451\u0442 \u043A\u043E\u043F\u0438\u044E mydocument.pdf \u0441 \u0438\u043C\u0435\u043D\u0435\u043C mydocument_signed.pdf, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u043F\u043E\u0434\u043F\u0438\u0441\u0430\u043D\u0430 \u0446\u0438\u0444\u0440\u043E\u0432\u043E\u0439 \u043F\u043E\u0434\u043F\u0438\u0441\u044C\u044E \u043F\u0435\u0440\u0432\u044B\u043C \u043D\u0430\u0439\u0434\u0435\u043D\u043D\u044B\u043C \u0441\u0435\u0440\u0442\u0438\u0444\u0438\u043A\u0430\u0442\u043E\u043C \u0432 \u0445\u0440\u0430\u043D\u0438\u043B\u0438\u0449\u0435 \u0441\u0435\u0440\u0442\u0438\u0444\u0438\u043A\u0430\u0442\u043E\u0432 \u041E\u0421\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> \u0441\u043E\u0437\u0434\u0430\u0451\u0442 \u043F\u043E\u0434\u043F\u0438\u0441\u0430\u043D\u043D\u044B\u0439 \u0438 \u0437\u0430\u0448\u0438\u0444\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0439 \u0444\u0430\u0439\u043B mydocument_signed.pdf, \u043F\u0435\u0447\u0430\u0442\u044C \u043D\u043E\u0432\u043E\u0433\u043E \u0444\u0430\u0439\u043B\u0430 \u0437\u0430\u043F\u0440\u0435\u0449\u0435\u043D\u0430. \u0414\u043B\u044F \u043F\u043E\u0434\u043F\u0438\u0441\u0438 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0435\u0442\u0441\u044F \u043A\u043B\u044E\u0447 \u0441 \u043F\u0441\u0435\u0432\u0434\u043E\u043D\u0438\u043C\u043E\u043C cert23 \u0438\u0437 \u0444\u0430\u0439\u043B\u0430 my_certificate.pfx\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> \u0432\u044B\u0432\u043E\u0434\u0438\u0442 \u0441\u043F\u0438\u0441\u043E\u043A \u0442\u0438\u043F\u043E\u0432 \u0445\u0440\u0430\u043D\u0438\u043B\u0438\u0449 \u043A\u043B\u044E\u0447\u0435\u0439\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> \u0432\u044B\u0432\u043E\u0434\u0438\u0442 \u0441\u043F\u0438\u0441\u043E\u043A \u0438\u043C\u0451\u043D (\u043F\u0441\u0435\u0432\u0434\u043E\u043D\u0438\u043C\u043E\u0432) \u043A\u043B\u044E\u0447\u0435\u0439, \u0445\u0440\u0430\u043D\u044F\u0449\u0438\u0445\u0441\u044F \u0432 \u0444\u0430\u0439\u043B\u0435 my_certificate.pfx, \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u044F \u043F\u0430\u0440\u043E\u043B\u044C \u0445\u0440\u0430\u043D\u0438\u043B\u0438\u0449\u0430. \u0412\u043A\u043B\u044E\u0447\u0451\u043D \u0442\u0438\u0445\u0438\u0439 \u0440\u0435\u0436\u0438\u043C, \u043F\u043E\u044D\u0442\u043E\u043C\u0443 \u043E\u0442\u043B\u0430\u0434\u043E\u0447\u043D\u0430\u044F \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u044F \u043D\u0435 \u0432\u044B\u0432\u043E\u0434\u0438\u0442\u0441\u044F.
