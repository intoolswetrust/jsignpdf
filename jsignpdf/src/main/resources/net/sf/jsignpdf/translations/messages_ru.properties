hlp.disableAnnot=запретить изменение аннотаций в зашифрованных документах
hlp.disableAssembly=запретить сборку в зашифрованных документах
hlp.disableContent=запретить изменение содержимого в зашифрованных документах
hlp.disableCopy=запретить копирование в зашифрованных документах
hlp.disableFill=запретить заполнение в зашифрованных документах
hlp.disableScrRead=запретить программы чтения с экрана в зашифрованных документах
hlp.encCert=путь к файлу сертификата, который используется для шифрования выходного PDF в случае -encryption CERTIFICATE
hlp.encrypted=Это свойство устарело, используйте -encryption PASSWORD!
hlp.encryption=режим шифрования выходного PDF. Значение по умолчанию NONE. Возможные значения: {0}. Используйте вместе с -upwd и -opwd в случае режима PASSWORD и с -ec в случае CERTIFICATE
hlp.footer.examples=Примеры:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> создаёт копию mydocument.pdf с именем mydocument_signed.pdf, которая подписана цифровой подписью первым найденным сертификатом в хранилище сертификатов ОС\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> создаёт подписанный и зашифрованный файл mydocument_signed.pdf, печать нового файла запрещена. Для подписи используется ключ с псевдонимом cert23 из файла my_certificate.pfx\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> выводит список типов хранилищ ключей\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> выводит список имён (псевдонимов) ключей, хранящихся в файле my_certificate.pfx, используя пароль хранилища. Включён тихий режим, поэтому отладочная информация не выводится.
hlp.footer.exitCodes=Коды завершения программы:\\r\\n-------------------\\r\\n  0 программа завершилась без ошибок\\r\\n  1 командная строка в неправильном формате\\r\\n  2 операция не запрошена — например, не указан файл для подписи\\r\\n  3 подписание части (но не всех) файлов завершилось с ошибкой\\r\\n  4 подписание всех файлов завершилось с ошибкой
hlp.gui=(бета) показывать GUI даже если указаны другие аргументы командной строки
hlp.hashAlgorithm=алгоритм хеширования, используемый для подписи. Значение по умолчанию SHA1. Доступные значения: {0}
hlp.header=JSignPdf — приложение, предназначенное для цифрового подписания PDF-документов. Если запустить программу без аргументов командной строки, будет открыт графический интерфейс, иначе можно использовать JSignPdf в пакетном режиме командной строки.
hlp.help=выводит этот экран справки
hlp.imgPath=путь к изображению для видимой подписи
hlp.keyAlias=имя (псевдоним) ключа, который следует использовать для подписания документа. Если эта опция не задана, используется первый ключ в хранилище. (Список псевдонимов ключей можно получить с помощью -lk)
hlp.keyIndex=индекс ключа (начиная с нуля), который следует использовать для подписания документа. Если не задана ни эта опция, ни псевдоним, используется первый ключ (index=0) в хранилище. (Список псевдонимов ключей можно получить с помощью -lk). Эта опция имеет более низкий приоритет, чем псевдоним.
hlp.keyPwd=пароль ключа в хранилище. В большинстве случаев эту опцию устанавливать не нужно — обычно паролем защищено только хранилище, но на всякий случай :)
hlp.ksFile=задаёт файл KeyStore — в качестве значения укажите путь к файлу, содержащему закрытый ключ(и) (.p12, .pfx, .jks, ...). Некоторые хранилища не хранят ключи в файле (например, хранилище Windows — WINDOWS-MY), тогда не используйте эту опцию.
hlp.ksPwd=пароль для KeyStore
hlp.ksType=задаёт тип KeyStore (список возможных значений этой опции можно получить с помощью -lkt)
hlp.l2Text=текст подписи, вы также можете использовать заполнители для свойств подписи (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=размер шрифта для текста видимой подписи, значение по умолчанию {0}
hlp.l4Text=текст статуса
hlp.listKeys=выводит список ключей в выбранном хранилище
hlp.listKsTypes=выводит список типов хранилищ ключей, которые можно использовать в качестве значений опции -kst
hlp.loadProperties=Загружает свойства из файла по умолчанию (созданного GUI-приложением).
hlp.loadPropertiesFile=Загружает свойства из указанного файла. Файл можно создать, скопировав файл свойств по умолчанию .JSignPdf, создаваемый GUI в домашнем каталоге пользователя.
hlp.location=местоположение подписи (например, Washington DC). По умолчанию пустое.
hlp.ocsp=включить проверку сертификата по OCSP
hlp.ocspServerUrl=URL OCSP-сервера по умолчанию, который будет использоваться, если сертификат для подписи не содержит этой информации
hlp.outPath=папка, в которой будут сохраняться подписанные документы. Значение по умолчанию — текущая папка.
hlp.outPrefix=префикс для подписанного файла. Значение по умолчанию — пустой префикс.
hlp.outSuffix=суффикс для имени подписанного файла. Значение по умолчанию "_signed". (например, подписание файла mydocument.pdf создаст новый файл mydocument_signed.pdf)
hlp.ownerpwd=пароль владельца для зашифрованных документов (используется, когда задана опция -e)
hlp.page=страница с видимой подписью. Значение по умолчанию 1 (первая страница). Если указанный номер страницы выходит за пределы, используется последняя страница.
hlp.posLLX=позиция нижнего левого угла по оси X для видимой подписи (отрицательное значение вычитается из ширины страницы)
hlp.posLLY=позиция нижнего левого угла по оси Y для видимой подписи (отрицательное значение вычитается из высоты страницы)
hlp.posURX=позиция верхнего правого угла по оси X для видимой подписи (отрицательное значение вычитается из ширины страницы)
hlp.posURY=позиция верхнего правого угла по оси Y для видимой подписи (отрицательное значение вычитается из высоты страницы)
hlp.printRight=права печати. Используется для зашифрованных документов. Значение по умолчанию ALLOW_PRINTING. Доступные значения: {0}
hlp.proxyHost=имя хоста или IP-адрес прокси-сервера
hlp.proxyPort=порт прокси-сервера, значение по умолчанию {0}
hlp.proxyType=тип прокси для интернет-соединений. Значение по умолчанию {0}. Возможные значения: {1}
hlp.quiet=тихий режим — без информационных сообщений во время процесса
hlp.reason=причина подписи. По умолчанию пусто.
hlp.renderMode=режим отображения для видимых подписей. Значение по умолчанию DESCRIPTION_ONLY. Возможные значения: {0}
hlp.signerName=имя подписывающего. По умолчанию — общее имя (CN) выбранного сертификата.
hlp.tsaAuthn=метод аутентификации, используемый при обращении к серверу TSA. Значение по умолчанию NONE. Возможные значения: {0}
hlp.tsaCertFile=путь к файлу хранилища ключей, содержащему закрытый ключ, используемый для аутентификации на сервере TSA при использовании метода аутентификации CERTIFICATE
hlp.tsaCertFileType=тип хранилища ключей для аутентификации TSA CERTIFICATE — по умолчанию PKCS12
hlp.tsaCertPasswd=пароль, используемый для открытия файла PKCS#12 (см. опцию -tscf) с закрытым ключом
hlp.tsaHashAlg=алгоритм хеширования, используемый в запросе к серверу меток времени (TSA); по умолчанию {0}
hlp.tsaPolicy=TSA policy OID, который должен быть установлен в запросе метки времени.
hlp.tsaPwd=пароль пользователя TSA. Используйте эту опцию, если применяется метка времени (-ts) и сервер TSA требует аутентификации.
hlp.tsaUrl=адрес сервера меток времени (TSA). Если вы используете этот аргумент, метка времени будет включена в подпись. (Для целей тестирования можно попробовать следующий URL http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=имя пользователя TSA. Используйте эту опцию, если применяется метка времени (-ts) и сервер TSA требует аутентификации.
hlp.userpwd=пароль пользователя для зашифрованных документов (используется, когда задана опция -e)
hlp.version=показывает версию приложения
hlp.visible=включает видимую подпись
pdfEncryption.notEncrypted=Без шифрования
render.descriptionOnly=Только описание
render.graphicAndDescription=Изображение и описание
render.signameAndDescription=Имя подписи и описание
rights.allowDegradedPrinting=Разрешить в низком качестве
rights.disallowPrinting=Запретить
serverAuthn.certificate=Клиентский сертификат
serverAuthn.none=Без аутентификации
serverAuthn.password=Имя пользователя / Пароль
ssl.keymanager.init=Инициализация менеджера ключей из файла хранилища ключей {0}.
jfx.gui.menu.file.saveAs=Сохранить вывод как...
jfx.gui.menu.signing.visibleSig=Видимая подпись
jfx.gui.status.visibleSigEnabled=Видимая подпись
jfx.gui.status.invisibleSig=Невидимая подпись
jfx.gui.panel.signatureProperties=Свойства подписи
jfx.gui.dialog.missingEncCert.title=Отсутствует сертификат шифрования
jfx.gui.dialog.missingEncCert.text=Шифрование сертификатом требует выбора файла сертификата шифрования.
jfx.gui.dialog.resetSettings.title=Reset Settings
jfx.gui.dialog.resetSettings.text=This will delete all saved settings and reset the application to its default state. Continue?
jfx.gui.status.settingsReset=Settings have been reset to defaults
