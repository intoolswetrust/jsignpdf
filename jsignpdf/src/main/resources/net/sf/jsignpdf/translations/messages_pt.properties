hlp.renderMode=modo de renderização para assinaturas visíveis. O valor padrão é DESCRIPTION_ONLY. Os valores possíveis são {0}
hlp.footer.exitCodes=Códigos de saída do programa:\n-------------------\n  0 programa terminado sem erros\n  1 linha de comando está em um formato errado\n  2 nenhuma operação solicitada - por exemplo, nenhum ficheiro para assinatura fornecido\n  3 assinatura de alguns - mas não todos - ficheiros falharam\n  4 assinatura de todos os ficheiros falhou
hlp.ksFile=define o ficheiro KeyStore - como o valor, use o caminho no qual está o ficheiro com a(s) chave(s) privada(s) localizada(s) (.p12, .pfx, .jks, ...). Alguns armazenamentos de chaves não têm chaves armazenadas em um ficheiro (por exemplo, keystore do Windows - WINDOWS-MY), então não use esta opção.
hlp.loadProperties=Carrega propriedades de um ficheiro padrão (criado pela aplicação GUI).
hlp.location=localização de uma assinatura (por exemplo, Washington DC). Vazio por padrão.
hlp.ocspServerUrl=URL do servidor OCSP padrão, que será usado caso o certificado de assinatura não contenha essas informações
hlp.visible=permite assinatura visível
extcsp.iohost=Não é possível conectar ao servidor de assinatura - erro de conexão: {0}
hlp.outSuffix=sufixo para nome de ficheiro assinado. O valor padrão é "_signed". (por exemplo, processo de assinatura no ficheiro mydocument.pdf criará um novo ficheiro mydocument_signed.pdf)
hlp.proxyType=tipo de proxy para conexões de internet. O valor padrão é {0}. Os valores possíveis são {1}
hlp.posLLY=posição do canto esquerdo inferior no eixo Y de uma assinatura visível(valor negativo é subtraído da largura da página)
