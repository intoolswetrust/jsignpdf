hlp.footer.examples=Exemplos:\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\n-> cria cĂłpia do mydocument.pdf com o nome mydocument_signed.pdf, assinado digitalmente com o primeiro certificado encontrado no certificado armazenado padrĂŁo do sistema operativo\n------------\njava -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> cria ficheiro assinado e encriptado mydocument_signed.pdf, a impressĂŁo do novo ficheiro nĂŁo Ă© permitida. Para assinatura Ă© utilizada chave com o apelido cert23 do ficheiro my_certificate.pfx\n------------\n$ java -jar JSignPdf.jar -lkt\n-> lista os tipos de armazenamento de chaves\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> lista nomes (aliases) de chaves armazenadas no ficheiro my_certificate.pfx utilizando a palavra-passe para keystore. O modo silencioso Ă© ativado para que nenhuma informaĂ§ĂŁo de depuraĂ§ĂŁo seja impressa.
