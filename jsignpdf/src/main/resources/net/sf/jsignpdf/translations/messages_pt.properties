hlp.posURX=posição do canto superior direito no eixo X de uma assinatura visível (valor negativo é subtraído da largura da página)
hlp.posURY=postagem do canto direito superior do eixo Y de uma assinatura visível (valor negativo é subtraído da largura da página)
hlp.printRight=direitos de impressão. Usado para documentos criptografados. O valor padrão é ALLOW_PRINTING. Os valores disponíveis são {0}
hlp.proxyHost=nome do host ou endereço IP do servidor proxy
hlp.quiet=modo silencioso - sem mensagens de informação durante o processo
hlp.reason=razão da assinatura. Vazio por padrão.
serverAuthn.password=Nome de usuário / Senha
