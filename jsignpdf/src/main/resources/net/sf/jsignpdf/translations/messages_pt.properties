hlp.header=JSignPdf Ă© um sistema desenvolvido para assinar digitalmente documentos PDF. Se iniciar o programa sem nenhum argumento de linha de comando, a GUI serĂˇ iniciada, caso contrĂˇrio, pode usar JSignPdf no modo de lote de linha de comando.
