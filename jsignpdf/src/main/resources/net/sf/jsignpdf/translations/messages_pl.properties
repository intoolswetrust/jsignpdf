hlp.disableScrRead=odmów dostępu czytnikom ekranu w zaszyfrowanych dokumentach
hlp.enableStdinPasswords=umożliwia odczyt haseł ze standardowego wejścia. Gdy włączone, wartość '-' opcji hasła oznacza: wczytaj jedną linię ze stdin (lub zapytaj w konsoli). Wiele opcji hasła może używać '-' i są czytane w stałej kolejności: --keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password.
hlp.encCert=ścieżka do pliku certyfikatu, który jest używany do szyfrowania wyjściowego PDF w przypadku -encryption CERTIFICATE
hlp.encrypted=Ta właściwość jest przestarzała, zamiast niej użyj -encryption PASSWORD!
hlp.encryption=tryb szyfrowania wyjściowego PDF. Wartość domyślna to NONE. Możliwe wartości to {0}. Używaj razem z -upwd i -opwd w przypadku trybu PASSWORD, oraz -ec w przypadku CERTIFICATE
hlp.footer.examples=Przykłady:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> tworzy kopię mydocument.pdf o nazwie mydocument_signed.pdf, która jest podpisana cyfrowo pierwszym certyfikatem znalezionym w domyślnym magazynie certyfikatów systemu operacyjnego\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> tworzy podpisany i zaszyfrowany plik mydocument_signed.pdf, drukowanie nowego pliku jest niedozwolone. Do podpisu używany jest klucz o aliasie cert23 z pliku my_certificate.pfx\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> wyświetla typy magazynów kluczy\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> wyświetla nazwy (aliasy) kluczy przechowywanych w pliku my_certificate.pfx używając hasła do magazynu kluczy. Tryb cichy jest włączony, więc żadne informacje diagnostyczne nie są wyświetlane.
hlp.footer.exitCodes=Kody wyjścia programu:\\r\\n-----------------------\\r\\n  0 program zakończony bez błędu\\r\\n  1 wiersz poleceń ma nieprawidłowy format\\r\\n  2 nie zażądano żadnej operacji - np. nie podano pliku do podpisania\\r\\n  3 podpisywanie niektórych - ale nie wszystkich - plików nie powiodło się\\r\\n  4 podpisywanie wszystkich plików nie powiodło się
hlp.gui=(beta) pokaż GUI nawet gdy podano inne argumenty wiersza poleceń
hlp.hashAlgorithm=algorytm skrótu używany do podpisu. Wartość domyślna to SHA1. Dostępne wartości to {0}
hlp.header=JSignPdf to aplikacja przeznaczona do cyfrowego podpisywania dokumentów PDF. Jeżeli uruchomisz program bez żadnych argumentów wiersza poleceń, zostanie uruchomione GUI, w przeciwnym razie możesz używać JSignPdf w trybie wsadowym wiersza poleceń.
hlp.help=wyświetla ten ekran pomocy
hlp.imgPath=ścieżka do obrazu dla widocznego podpisu
hlp.keyAlias=nazwa (alias) klucza, który ma być użyty do podpisania dokumentu. Jeśli ta opcja nie jest podana, używany jest pierwszy klucz w magazynie kluczy. (Wyświetl aliasy kluczy używając -lk)
hlp.keyIndex=indeks klucza (liczony od zera), który ma być użyty do podpisania dokumentu. Jeśli ani ta opcja, ani alias nie są podane, używany jest pierwszy klucz (index=0) w magazynie kluczy. (Wyświetl aliasy kluczy używając -lk). Ta opcja ma niższy priorytet niż alias.
hlp.keyPwd=hasło klucza w magazynie kluczy. W większości przypadków nie musisz ustawiać tej opcji - zazwyczaj tylko magazyn kluczy jest chroniony hasłem, ale na wszelki wypadek :) Użyj '-' aby odczytać hasło ze standardowego wejścia (wymaga --enable-stdin-passwords).
hlp.ksFile=ustawia plik KeyStore - jako wartość podaj ścieżkę do pliku z kluczem(-ami) prywatnym (.p12, .pfx, .jks, ...). Niektóre magazyny kluczy nie przechowują kluczy w pliku (np. magazyn Windows - WINDOWS-MY), wtedy nie używaj tej opcji.
hlp.ksPwd=hasło do KeyStore. Użyj '-' aby odczytać hasło ze standardowego wejścia (wymaga --enable-stdin-passwords).
hlp.ksType=ustawia typ KeyStore (możliwe wartości dla tej opcji możesz wyświetlić używając argumentu -lkt)
hlp.l2Text=tekst podpisu, możesz także używać symboli zastępczych dla właściwości podpisu (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=rozmiar czcionki dla tekstu widocznego podpisu, wartość domyślna to {0}
hlp.l4Text=tekst statusu
hlp.listKeys=wyświetla klucze w wybranym magazynie kluczy
hlp.listKsTypes=wyświetla typy magazynów kluczy, które mogą być używane jako wartości opcji -kst
hlp.loadProperties=Wczytuje właściwości z domyślnego pliku (utworzonego przez aplikację GUI).
hlp.loadPropertiesFile=Wczytuje właściwości z podanego pliku. Plik można utworzyć kopiując domyślny plik właściwości .JSignPdf utworzony przez GUI w katalogu domowym użytkownika.
hlp.location=lokalizacja podpisu (np. Warszawa). Domyślnie puste.
hlp.ocsp=włącz walidację certyfikatu przez OCSP
hlp.ocspServerUrl=domyślny adres URL serwera OCSP, który zostanie użyty w przypadku, gdy certyfikat podpisujący nie zawiera tej informacji
hlp.outPath=folder, w którym będą zapisywane podpisane dokumenty. Wartość domyślna to bieżący folder.
hlp.outPrefix=prefiks podpisanego pliku. Wartość domyślna to pusty prefiks.
hlp.outSuffix=sufiks nazwy podpisanego pliku. Wartość domyślna to "_signed". (np. podpisanie pliku mydocument.pdf utworzy nowy plik mydocument_signed.pdf)
hlp.ownerpwd=hasło właściciela dla zaszyfrowanych dokumentów (używane gdy podano opcję -e). Użyj '-' aby odczytać hasło ze standardowego wejścia (wymaga --enable-stdin-passwords).
hlp.page=strona z widocznym podpisem. Wartość domyślna to 1 (pierwsza strona). Jeśli podany numer strony jest poza zakresem, używana jest ostatnia strona.
hlp.posLLX=położenie lewego dolnego rogu na osi X widocznego podpisu (wartość ujemna jest odejmowana od szerokości strony)
hlp.posLLY=położenie lewego dolnego rogu na osi Y widocznego podpisu (wartość ujemna jest odejmowana od wysokości strony)
hlp.posURX=położenie prawego górnego rogu na osi X widocznego podpisu (wartość ujemna jest odejmowana od szerokości strony)
hlp.posURY=położenie prawego górnego rogu na osi Y widocznego podpisu (wartość ujemna jest odejmowana od wysokości strony)
hlp.printRight=uprawnienia do drukowania. Używane dla zaszyfrowanych dokumentów. Wartość domyślna to ALLOW_PRINTING. Dostępne wartości to {0}
hlp.proxyHost=nazwa hosta lub adres IP serwera proxy
hlp.proxyPort=port serwera proxy, wartość domyślna to {0}
hlp.proxyType=typ proxy dla połączeń internetowych. Wartość domyślna to {0}. Możliwe wartości to {1}
hlp.quiet=tryb cichy - bez komunikatów informacyjnych podczas procesu
hlp.reason=powód podpisu. Domyślnie puste.
hlp.renderMode=tryb renderowania dla widocznych podpisów. Wartość domyślna to DESCRIPTION_ONLY. Możliwe wartości to {0}
hlp.signerName=nazwa podpisującego. Domyślnie nazwa zwyczajowa (CN) wybranego certyfikatu.
hlp.tsaAuthn=metoda uwierzytelniania używana przy kontakcie z serwerem TSA. Wartość domyślna to NONE. Możliwe wartości to {0}
hlp.tsaCertFile=ścieżka do pliku magazynu kluczy zawierającego klucz prywatny używany do uwierzytelniania wobec serwera TSA, gdy używana jest metoda uwierzytelniania CERTIFICATE
hlp.tsaCertFileType=typ magazynu kluczy dla uwierzytelniania TSA CERTIFICATE - domyślnie PKCS12
hlp.tsaCertPasswd=hasło używane do otwarcia pliku PKCS#12 (patrz opcja -tscf) z kluczem prywatnym. Użyj '-' aby odczytać hasło ze standardowego wejścia (wymaga --enable-stdin-passwords).
hlp.tsaHashAlg=algorytm skrótu używany w zapytaniu do serwera znaczników czasu (TSA); domyślnie {0}
hlp.tsaPolicy=OID zasady TSA, który ma zostać ustawiony w żądaniu znacznika czasu.
hlp.tsaPwd=Hasło użytkownika TSA. Użyj tego przełącznika, jeśli używasz znaczników czasu (-ts) i serwer TSA wymaga uwierzytelnienia. Użyj '-' aby odczytać hasło ze standardowego wejścia (wymaga --enable-stdin-passwords).
hlp.tsaUrl=adres serwera znaczników czasu (TSA). Jeśli użyjesz tego argumentu, znacznik czasu zostanie dołączony do podpisu. (Do celów testowych możesz wypróbować następujący URL http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=Nazwa użytkownika TSA. Użyj tego przełącznika, jeśli używasz znaczników czasu (-ts) i serwer TSA wymaga uwierzytelnienia.
hlp.userpwd=hasło użytkownika dla zaszyfrowanych dokumentów (używane gdy podano opcję -e). Użyj '-' aby odczytać hasło ze standardowego wejścia (wymaga --enable-stdin-passwords).
hlp.version=wyświetla wersję aplikacji
hlp.visible=włącza widoczny podpis
serverAuthn.certificate=Certyfikat klienta
serverAuthn.none=Bez uwierzytelniania
serverAuthn.password=Nazwa użytkownika / Hasło
ssl.keymanager.init=Inicjowanie menedżera kluczy z pliku magazynu kluczy {0}.
