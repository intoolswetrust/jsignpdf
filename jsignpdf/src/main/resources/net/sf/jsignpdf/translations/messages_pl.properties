gui.tsa.certFilePwd.label=Has\u0142o klucza
gui.tsa.hashAlg.label=Algorytm skr\u00F3tu TSA
gui.tsa.ocspServerUrl.label=domy\u015Blny adres URL serwera OCSP
gui.tsa.policy.label=Zasada TSA (OID)
gui.tsa.title=TSA && uniewa\u017Cnianie certyfikat\u00F3w
gui.vs.acro6layers.checkbox=Tryb warstw Acrobat 6
gui.vs.preview.button=&Podgl\u0105d i wyb\u00F3r
hlp.append=dodaj podpis do ju\u017C istniej\u0105cych. Domy\u015Blnie istniej\u0105ce podpisy s\u0105 zast\u0119powane nowym.
hlp.bgPath=\u015Bcie\u017Cka do obrazu t\u0142a dla widocznych podpis\u00F3w
hlp.bgScale=skala obrazu t\u0142a dla widocznych podpis\u00F3w. Wprowad\u017A warto\u015B\u0107 dodatni\u0105, aby przemno\u017Cy\u0107 rozmiar obrazu przez t\u0119 warto\u015B\u0107. Wprowad\u017A zero, aby wype\u0142ni\u0107 nim ca\u0142e t\u0142o (rozci\u0105gni\u0119cie). Wprowad\u017A warto\u015B\u0107 ujemn\u0105 dla najlepszego dopasowania.
hlp.certLevel=poziom certyfikacji. Warto\u015B\u0107 domy\u015Blna to NOT_CERTIFIED. Dost\u0119pne warto\u015Bci to {0}
hlp.contact=dane kontaktowe podpisuj\u0105cego (pole podpisu)
hlp.crl=w\u0142\u0105cz walidacj\u0119 certyfikatu przez CRL
hlp.disableAcro6Layers=wy\u0142\u0105cza tryb warstw Acrobat 6, tj. wszystkie warstwy podpisu zostan\u0105 utworzone. Acrobat 6.0 i nowsze zalecaj\u0105, aby obecne by\u0142y tylko warstwy n2 i n4.
hlp.disableAnnot=odm\u00F3w modyfikacji adnotacji w zaszyfrowanych dokumentach
hlp.disableAssembly=odm\u00F3w sk\u0142adania w zaszyfrowanych dokumentach
hlp.disableContent=odm\u00F3w modyfikacji tre\u015Bci w zaszyfrowanych dokumentach
hlp.disableCopy=odm\u00F3w kopiowania w zaszyfrowanych dokumentach
hlp.disableFill=odm\u00F3w wype\u0142niania w zaszyfrowanych dokumentach
hlp.disableScrRead=odm\u00F3w dost\u0119pu czytnikom ekranu w zaszyfrowanych dokumentach
hlp.encCert=\u015Bcie\u017Cka do pliku certyfikatu, kt\u00F3ry jest u\u017Cywany do szyfrowania wyj\u015Bciowego PDF w przypadku -encryption CERTIFICATE
hlp.encrypted=Ta w\u0142a\u015Bciwo\u015B\u0107 jest przestarza\u0142a, zamiast niej u\u017Cyj -encryption PASSWORD!
hlp.encryption=tryb szyfrowania wyj\u015Bciowego PDF. Warto\u015B\u0107 domy\u015Blna to NONE. Mo\u017Cliwe warto\u015Bci to {0}. U\u017Cywaj razem z -upwd i -opwd w przypadku trybu PASSWORD, oraz -ec w przypadku CERTIFICATE
hlp.footer.examples=Przyk\u0142ady:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> tworzy kopi\u0119 mydocument.pdf o nazwie mydocument_signed.pdf, kt\u00F3ra jest podpisana cyfrowo pierwszym certyfikatem znalezionym w domy\u015Blnym magazynie certyfikat\u00F3w systemu operacyjnego\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> tworzy podpisany i zaszyfrowany plik mydocument_signed.pdf, drukowanie nowego pliku jest niedozwolone. Do podpisu u\u017Cywany jest klucz o aliasie cert23 z pliku my_certificate.pfx\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> wy\u015Bwietla typy magazyn\u00F3w kluczy\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> wy\u015Bwietla nazwy (aliasy) kluczy przechowywanych w pliku my_certificate.pfx u\u017Cywaj\u0105c has\u0142a do magazynu kluczy. Tryb cichy jest w\u0142\u0105czony, wi\u0119c \u017Cadne informacje diagnostyczne nie s\u0105 wy\u015Bwietlane.
hlp.footer.exitCodes=Kody wyj\u015Bcia programu:\\r\\n-----------------------\\r\\n  0 program zako\u0144czony bez b\u0142\u0119du\\r\\n  1 wiersz polece\u0144 ma nieprawid\u0142owy format\\r\\n  2 nie za\u017C\u0105dano \u017Cadnej operacji - np. nie podano pliku do podpisania\\r\\n  3 podpisywanie niekt\u00F3rych - ale nie wszystkich - plik\u00F3w nie powiod\u0142o si\u0119\\r\\n  4 podpisywanie wszystkich plik\u00F3w nie powiod\u0142o si\u0119
hlp.gui=(beta) poka\u017C GUI nawet gdy podano inne argumenty wiersza polece\u0144
hlp.hashAlgorithm=algorytm skr\u00F3tu u\u017Cywany do podpisu. Warto\u015B\u0107 domy\u015Blna to SHA1. Dost\u0119pne warto\u015Bci to {0}
hlp.header=JSignPdf to aplikacja przeznaczona do cyfrowego podpisywania dokument\u00F3w PDF. Je\u017Celi uruchomisz program bez \u017Cadnych argument\u00F3w wiersza polece\u0144, zostanie uruchomione GUI, w przeciwnym razie mo\u017Cesz u\u017Cywa\u0107 JSignPdf w trybie wsadowym wiersza polece\u0144.
hlp.help=wy\u015Bwietla ten ekran pomocy
hlp.imgPath=\u015Bcie\u017Cka do obrazu dla widocznego podpisu
hlp.keyAlias=nazwa (alias) klucza, kt\u00F3ry ma by\u0107 u\u017Cyty do podpisania dokumentu. Je\u015Bli ta opcja nie jest podana, u\u017Cywany jest pierwszy klucz w magazynie kluczy. (Wy\u015Bwietl aliasy kluczy u\u017Cywaj\u0105c -lk)
hlp.keyIndex=indeks klucza (liczony od zera), kt\u00F3ry ma by\u0107 u\u017Cyty do podpisania dokumentu. Je\u015Bli ani ta opcja, ani alias nie s\u0105 podane, u\u017Cywany jest pierwszy klucz (index=0) w magazynie kluczy. (Wy\u015Bwietl aliasy kluczy u\u017Cywaj\u0105c -lk). Ta opcja ma ni\u017Cszy priorytet ni\u017C alias.
hlp.keyPwd=has\u0142o klucza w magazynie kluczy. W wi\u0119kszo\u015Bci przypadk\u00F3w nie musisz ustawia\u0107 tej opcji - zazwyczaj tylko magazyn kluczy jest chroniony has\u0142em, ale na wszelki wypadek :)
hlp.ksFile=ustawia plik KeyStore - jako warto\u015B\u0107 podaj \u015Bcie\u017Ck\u0119 do pliku z kluczem(-ami) prywatnym (.p12, .pfx, .jks, ...). Niekt\u00F3re magazyny kluczy nie przechowuj\u0105 kluczy w pliku (np. magazyn Windows - WINDOWS-MY), wtedy nie u\u017Cywaj tej opcji.
hlp.ksPwd=has\u0142o do KeyStore
hlp.ksType=ustawia typ KeyStore (mo\u017Cliwe warto\u015Bci dla tej opcji mo\u017Cesz wy\u015Bwietli\u0107 u\u017Cywaj\u0105c argumentu -lkt)
hlp.l2Text=tekst podpisu, mo\u017Cesz tak\u017Ce u\u017Cywa\u0107 symboli zast\u0119pczych dla w\u0142a\u015Bciwo\u015Bci podpisu (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=rozmiar czcionki dla tekstu widocznego podpisu, warto\u015B\u0107 domy\u015Blna to {0}
hlp.l4Text=tekst statusu
hlp.listKeys=wy\u015Bwietla klucze w wybranym magazynie kluczy
hlp.listKsTypes=wy\u015Bwietla typy magazyn\u00F3w kluczy, kt\u00F3re mog\u0105 by\u0107 u\u017Cywane jako warto\u015Bci opcji -kst
hlp.loadProperties=Wczytuje w\u0142a\u015Bciwo\u015Bci z domy\u015Blnego pliku (utworzonego przez aplikacj\u0119 GUI).
hlp.loadPropertiesFile=Wczytuje w\u0142a\u015Bciwo\u015Bci z podanego pliku. Plik mo\u017Cna utworzy\u0107 kopiuj\u0105c domy\u015Blny plik w\u0142a\u015Bciwo\u015Bci .JSignPdf utworzony przez GUI w katalogu domowym u\u017Cytkownika.
hlp.location=lokalizacja podpisu (np. Warszawa). Domy\u015Blnie puste.
hlp.ocsp=w\u0142\u0105cz walidacj\u0119 certyfikatu przez OCSP
hlp.ocspServerUrl=domy\u015Blny adres URL serwera OCSP, kt\u00F3ry zostanie u\u017Cyty w przypadku, gdy certyfikat podpisuj\u0105cy nie zawiera tej informacji
hlp.outPath=folder, w kt\u00F3rym b\u0119d\u0105 zapisywane podpisane dokumenty. Warto\u015B\u0107 domy\u015Blna to bie\u017C\u0105cy folder.
hlp.outPrefix=prefiks podpisanego pliku. Warto\u015B\u0107 domy\u015Blna to pusty prefiks.
hlp.outSuffix=sufiks nazwy podpisanego pliku. Warto\u015B\u0107 domy\u015Blna to "_signed". (np. podpisanie pliku mydocument.pdf utworzy nowy plik mydocument_signed.pdf)
hlp.ownerpwd=has\u0142o w\u0142a\u015Bciciela dla zaszyfrowanych dokument\u00F3w (u\u017Cywane gdy podano opcj\u0119 -e)
hlp.page=strona z widocznym podpisem. Warto\u015B\u0107 domy\u015Blna to 1 (pierwsza strona). Je\u015Bli podany numer strony jest poza zakresem, u\u017Cywana jest ostatnia strona.
hlp.posLLX=po\u0142o\u017Cenie lewego dolnego rogu na osi X widocznego podpisu (warto\u015B\u0107 ujemna jest odejmowana od szeroko\u015Bci strony)
hlp.posLLY=po\u0142o\u017Cenie lewego dolnego rogu na osi Y widocznego podpisu (warto\u015B\u0107 ujemna jest odejmowana od wysoko\u015Bci strony)
hlp.posURX=po\u0142o\u017Cenie prawego g\u00F3rnego rogu na osi X widocznego podpisu (warto\u015B\u0107 ujemna jest odejmowana od szeroko\u015Bci strony)
hlp.posURY=po\u0142o\u017Cenie prawego g\u00F3rnego rogu na osi Y widocznego podpisu (warto\u015B\u0107 ujemna jest odejmowana od wysoko\u015Bci strony)
hlp.printRight=uprawnienia do drukowania. U\u017Cywane dla zaszyfrowanych dokument\u00F3w. Warto\u015B\u0107 domy\u015Blna to ALLOW_PRINTING. Dost\u0119pne warto\u015Bci to {0}
hlp.proxyHost=nazwa hosta lub adres IP serwera proxy
hlp.proxyPort=port serwera proxy, warto\u015B\u0107 domy\u015Blna to {0}
hlp.proxyType=typ proxy dla po\u0142\u0105cze\u0144 internetowych. Warto\u015B\u0107 domy\u015Blna to {0}. Mo\u017Cliwe warto\u015Bci to {1}
hlp.quiet=tryb cichy - bez komunikat\u00F3w informacyjnych podczas procesu
hlp.reason=pow\u00F3d podpisu. Domy\u015Blnie puste.
hlp.renderMode=tryb renderowania dla widocznych podpis\u00F3w. Warto\u015B\u0107 domy\u015Blna to DESCRIPTION_ONLY. Mo\u017Cliwe warto\u015Bci to {0}
hlp.signerName=nazwa podpisuj\u0105cego. Domy\u015Blnie nazwa zwyczajowa (CN) wybranego certyfikatu.
hlp.tsaAuthn=metoda uwierzytelniania u\u017Cywana przy kontakcie z serwerem TSA. Warto\u015B\u0107 domy\u015Blna to NONE. Mo\u017Cliwe warto\u015Bci to {0}
hlp.tsaCertFile=\u015Bcie\u017Cka do pliku magazynu kluczy zawieraj\u0105cego klucz prywatny u\u017Cywany do uwierzytelniania wobec serwera TSA, gdy u\u017Cywana jest metoda uwierzytelniania CERTIFICATE
hlp.tsaCertFileType=typ magazynu kluczy dla uwierzytelniania TSA CERTIFICATE - domy\u015Blnie PKCS12
hlp.tsaCertPasswd=has\u0142o u\u017Cywane do otwarcia pliku PKCS#12 (patrz opcja -tscf) z kluczem prywatnym
hlp.tsaHashAlg=algorytm skr\u00F3tu u\u017Cywany w zapytaniu do serwera znacznik\u00F3w czasu (TSA); domy\u015Blnie {0}
hlp.tsaPolicy=OID zasady TSA, kt\u00F3ry ma zosta\u0107 ustawiony w \u017C\u0105daniu znacznika czasu.
hlp.tsaPwd=Has\u0142o u\u017Cytkownika TSA. U\u017Cyj tego prze\u0142\u0105cznika, je\u015Bli u\u017Cywasz znacznik\u00F3w czasu (-ts) i serwer TSA wymaga uwierzytelnienia.
hlp.tsaUrl=adres serwera znacznik\u00F3w czasu (TSA). Je\u015Bli u\u017Cyjesz tego argumentu, znacznik czasu zostanie do\u0142\u0105czony do podpisu. (Do cel\u00F3w testowych mo\u017Cesz wypr\u00F3bowa\u0107 nast\u0119puj\u0105cy URL http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=Nazwa u\u017Cytkownika TSA. U\u017Cyj tego prze\u0142\u0105cznika, je\u015Bli u\u017Cywasz znacznik\u00F3w czasu (-ts) i serwer TSA wymaga uwierzytelnienia.
hlp.userpwd=has\u0142o u\u017Cytkownika dla zaszyfrowanych dokument\u00F3w (u\u017Cywane gdy podano opcj\u0119 -e)
hlp.version=wy\u015Bwietla wersj\u0119 aplikacji
hlp.visible=w\u0142\u0105cza widoczny podpis
serverAuthn.certificate=Certyfikat klienta
serverAuthn.none=Bez uwierzytelniania
serverAuthn.password=Nazwa u\u017Cytkownika / Has\u0142o
ssl.keymanager.init=Inicjowanie mened\u017Cera kluczy z pliku magazynu kluczy {0}.
