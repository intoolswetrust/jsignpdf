extcsp.nosignatureerr=B\u0142\u0105d podpisywania, magazyn kluczy zwr\u00F3ci\u0142 b\u0142\u0105d: {0}
extcsp.unknownhashalg=Podany algorytm odcisku/skr\u00F3tu ({0}) nie jest obs\u0142ugiwany
file.notReadable=Plik {0} nie jest mo\u017Cliwy do odczytania przez aplikacj\u0119. Sprawd\u017A, czy plik istnieje oraz czy u\u017Cytkownik ma prawo do odczytu.
gui.certificateNotForEncryption.error=Plik {0} albo nie zawiera certyfikatu X509, albo szyfrowanie nie jest obs\u0142ugiwane dla tego certyfikatu.
gui.encryptionCertFile.label=Plik certyfikatu do szyfrowania
