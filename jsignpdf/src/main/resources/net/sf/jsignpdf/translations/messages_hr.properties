hlp.footer.examples=Primjeri:\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\n-> stvara kopiju mydocument.pdf s imenom mydocument_signed.pdf, koja je digitalno potpisana s prvim certifikatom pronađenim u zadanom spremištu certifikata operacijskog sustava\n---------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe LOZINKA -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> stvara potpisanu i šifriranu datoteku mydocument_signed.pdf, ispis nove datoteke nije dopušten. Za potpis se koristi ključ s aliasom cert23 iz datoteke my_certificate.pfx\n---------\n$ java -jar JSignPdf.jar -lkt\n-> prikazuje popis vrsta spremišta ključeva\n---------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> prikazuje popis imena (aliasa) ključeva koji su spremljeni u datoteci my_certificate.pfx koristeći lozinku za spremanje ključeva. Aktiviran je tihi modus tako da se informacije o otklanjanju grešaka ne ispisuju.
hlp.hashAlgorithm=hash algoritam koji se koristi za potpis. Standardna vrijednost je SHA1. Dostupne vrijednosti su {0}
hlp.header=JSignPdf je aplikacija za digitalno potpisivanje PDF dokumenata. Ako pokreneš program bez ikakvih argumenata naredbenog retka, korisničko grafičko sučelje će se pokrenuti, inače možeš koristiti JSignPdf u grupnom modusu naredbenog retka.
hlp.imgPath=putanja do slike za vidljive potpise
hlp.l2Text=tekst potpisa, također možeš koristiti rezervirana mjesta za svojstva potpisa (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=veličina fonta za vidljivi tekst potpisa, standardna vrijednost je {0}
hlp.listKeys=prikazuje popis ključeva u odabranom spremištu ključeva
hlp.loadProperties=Učitava svojstva iz standardne datoteke (stvorena aplikacijom grafičkog korisničkog sučelja).
hlp.loadPropertiesFile=Učitava svojstva iz zadane datoteke. Datoteka se može stvoriti kopiranjem standardne datoteke svojstava .JSignPdf koju je stvorilo korisničko grafičko sučelje u korisničkom početnom direktoriju.
