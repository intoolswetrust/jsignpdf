hlp.tsaUrl=adresa servera za vremenske žigove (TSA). Ako koristiš ovaj argument, vremenski žigovi će se uključiti u potpis. (Za testiranje isprobaj sljedeći URL http://dse200.ncipher.com/TSS/HttpTspServer)
