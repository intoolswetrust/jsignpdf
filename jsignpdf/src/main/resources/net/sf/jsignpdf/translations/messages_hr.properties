hlp.tsaAuthn=metoda autentifikacije koja se koristi prilikom kontaktiranja TSA servera. Standardna vrijednost je „NONE”. Moguće vrijednosti su {0}
hlp.tsaCertPasswd=lozinka koja se koristi za otvaranje datoteke PKCS#12 (pogledaj opciju -tscf) s privatnim ključem. Koristi '-' za čitanje sa standardnog ulaza (zahtijeva --enable-stdin-passwords).
