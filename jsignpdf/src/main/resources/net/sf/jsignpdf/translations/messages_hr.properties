hlp.keyAlias=ime (alias) ključa za potpisivanje dokumenta. Ako ova opcija nije zadana, koristi se prvi ključ u spremištu ključeva. (Prikaži popis aliasa ključeva koristeći -lk)
hlp.keyPwd=lozinka ključa u spremištu ključeva. U većini slučajeva ne moraš postaviti ovu opciju – lozinkom je zaštićeno samo je spremište ključeva, ali za svaki slučaj :) Koristi '-' za čitanje sa standardnog ulaza (zahtijeva --enable-stdin-passwords).
hlp.ksFile=postavlja KeyStore datoteku – kao vrijednost koristi putanju do datoteke s privatnim ključevima (.p12, .pfx, .jks, …). Neka spremišta ključeva nemaju u datoteci spremljene ključeve (npr. Windows spremište ključeva – WINDOWS-MY). U tom slučaju nemoj koristiti ovu opciju.
hlp.ksPwd=lozinka u KeyStore. Koristi '-' za čitanje sa standardnog ulaza (zahtijeva --enable-stdin-passwords).
hlp.ksType=postavlja KeyStore vrstu (možeš navesti moguće vrijednosti za ovu opciju -lkt argument)
hlp.outSuffix=sufiks za potpisano ime datoteke. Zadana vrijednost je „_signed”. (npr. postupak potpisivanja datoteke „mydocument.pdf” stvorit će novu datoteku „mydocument_signed.pdf”)
hlp.page=stranica s vidljivim potpisom. Standardna vrijednost je 1 (prva stranica). Ako je navedeni broj stranice veći od ukupnog broja stranica, koristi se zadnja stranica.
hlp.keyIndex=nulti indeks ključa, koji bi se trebao koristiti za potpisivanje dokumenta. Ako ova opcija niti alias nisu zadani, koristi se prvi ključ (index=0) u spremištu ključeva. (Prikaži popis aliasa ključeva koristeći -lk). Ova opcija ima niži prioritet od aliasa.
hlp.reason=razlog potpisa. Standardno je prazan.
hlp.proxyHost=ime računala ili IP adresa proxy servera
hlp.proxyPort=priključak proxy servera, standardna vrijednost je {0}
hlp.proxyType=Vrsta proxy-a za internetsku vezu. Standardna vrijednost je {0}. Moguće vrijednosti su {1}
hlp.quiet=tihi modus – bez informacijskih poruka tijekom postupka
hlp.signerName=ime potpisnika. Standardno se koristi uobičajeno ime (common name = CN) odabranog certifikata.
hlp.tsaCertFileType=vrsta spremišta ključeva za autentifikaciju TSA CERTIFIKATA – zadano je PKCS12
extcsp.certfactory=Stvaranje CertificateFactory instance nije uspjelo
extcsp.nosignature=Greška u potpisivanju, potpis nije primljen, nema detalja
extcsp.nosignatureerr=Greška u potpisivanju, spremište ključeva je vratilo grešku: {0}
hlp.tsaHashAlg=hash algoritam koji se koristi prilikom dohvaćanja vremenskog žiga servera (TSA); standardna vrijednost je {0}
hlp.tsaPolicy=OID politike servera vremenskog žiga (TSA) koji treba postaviti za zahtjev vremenskog žiga.
