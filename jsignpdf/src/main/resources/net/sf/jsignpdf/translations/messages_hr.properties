hlp.outPrefix=prefiks za potpisanu datoteku. Standardna vrijednost je prazan prefiks.
hlp.ownerpwd=lozinka vlasnika za šifrirane dokumente (koristi se kada je opcija -e zadana). Koristi '-' za čitanje sa standardnog ulaza (zahtijeva --enable-stdin-passwords).
