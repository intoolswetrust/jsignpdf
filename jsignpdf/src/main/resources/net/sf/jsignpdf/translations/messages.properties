hlp.append=add signature to existing ones. By default are existing signatures replaced by the new one.
hlp.bgPath=background image path for visible signatures
hlp.bgScale=background image scale for visible signatures. Insert positive value to multiply image size with the value. Insert zero value to fill whole background with it (stretch). Insert negative value to best fit resize.
hlp.certLevel=level of certification. Default value is NOT_CERTIFIED. Available values are {0}
hlp.contact=signer's contact details (a signature field)
hlp.crl=enable CRL certificate validation
hlp.disableAcro6Layers=disables the Acrobat 6 layer mode i.e. all signature layers will be created. Acrobat 6.0 and higher recommends that only layer n2 and n4 be present.
hlp.disableAnnot=deny modify annotations in encrypted documents
hlp.disableAssembly=deny assembly in encrypted documents
hlp.disableContent=deny modify content in encrypted documents
hlp.disableCopy=deny copy in encrypted documents
hlp.disableFill=deny fill encrypted documents
hlp.disableScrRead=deny screen readers in encrypted documents
hlp.enableStdinPasswords=allow reading password values from standard input. When set, a password option value of '-' means: read one line from stdin (or prompt on a console). Multiple password options may use '-' and are read in the fixed order: --keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password.
hlp.encCert=path to the certificate file, which is used to encrypt output PDF in case of -encryption CERTIFICATE
hlp.encrypted=This property is deprecated, use -encryption PASSWORD instead!
hlp.encryption=encryption mode for the output PDF. Default value is NONE. Possible values are {0}. Use together with -upwd and -opwd in case of PASSWORD mode, and -ec in case of CERTIFICATE
hlp.footer.examples=Examples:\r\n---------\r\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\r\n-> creates copy of mydocument.pdf with name mydocument_signed.pdf, which is digitally signed with the first certificate found in default operational system certificate store\r\n------------\r\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\r\n-> creates signed and encrypted file mydocument_signed.pdf, printing of the new file is not allowed. For signature is used key with alias cert23 from the file my_certificate.pfx\r\n------------\r\n$ java -jar JSignPdf.jar -lkt\r\n-> lists keystore types\r\n------------\r\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\r\n-> list names (aliases) of keys stored in my_certificate.pfx file using the password for keystore. Quiet mode is enabled so no debug info is printed.
hlp.footer.exitCodes=Program exit codes:\r\n-------------------\r\n  0 program finished without error\r\n  1 command line is in a wrong format\r\n  2 no operation requested - e.g. no file for signing provided\r\n  3 signing of some - but not all - files failed\r\n  4 signing of all files failed\r\n  5 input file cannot be read\r\n  6 common error
hlp.gui=(beta) show GUI even when other command line arguments are provided
hlp.hashAlgorithm=hash algorithm used for signature. Default value is SHA1. Available values are {0}
hlp.header=JSignPdf is an application designed to digitally sign PDF documents. If you start the program without any command line argument, the GUI will be started, otherwise you can use JSignPdf in command line batch mode.
hlp.help=prints this help screen
hlp.imgPath=image path for visible signature
hlp.keyAlias=name (alias) of the key, which should be used for signing the document. If this option is not given, the first key in the keystore is used. (List the key aliases using -lk)
hlp.keyIndex=zero based index of the key, which should be used for signing the document. If neither this option nor alias is given, the first key (index=0) in the keystore is used. (List the key aliases using -lk). This option has lower priority than alias.
hlp.keyPwd=password of the key in keystore. In most cases you don't need to set this option - only keystore is protected by a password, but just in case :) Use '-' to read from stdin (requires --enable-stdin-passwords).
hlp.ksFile=sets KeyStore file - as the value use the path on which is file with private key(s) located (.p12, .pfx, .jks, ...). Some keystores haven't keys stored in a file (e.g. windows keystore - WINDOWS-MY), then don't use this option.
hlp.ksPwd=password to KeyStore. Use '-' to read from stdin (requires --enable-stdin-passwords).
hlp.ksType=sets KeyStore type (you can list possible values for this option -lkt argument)
hlp.l2Text=signature text, you can also use placeholders for signature properties (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=font size for visible signature text, default value is {0}
hlp.l4Text=status text
hlp.listKeys=lists keys in chosen keystore
hlp.listKsTypes=lists keystore types, which can be used as values -kst option
hlp.loadProperties=Loads properties from a default file (created by GUI application).
hlp.loadPropertiesFile=Loads properties from the given file. The file can be create by copying the default property file .JSignPdf created by the GUI in the user home directory.
hlp.location=location of a signature (e.g. Washington DC). Empty by default.
hlp.ocsp=enable OCSP certificate validation
hlp.ocspServerUrl=default OCSP server URL, which will be used in case the signing certificate doesn't contain this information
hlp.outPath=folder in which the signed documents will be stored. Default value is current folder.
hlp.outPrefix=prefix for signed file. Default value is empty prefix.
hlp.outSuffix=suffix for signed filename. Default value is "_signed". (e.g. sign process on file mydocument.pdf will create new file mydocument_signed.pdf)
hlp.ownerpwd=owner password for encrypted documents (used when -e option is given). Use '-' to read from stdin (requires --enable-stdin-passwords).
hlp.page=page with visible signature. Default value is 1 (first page). If the provided page number is out of bounds, then the last page is used.
hlp.posLLX=lower left corner position on X-axis of a visible signature (negative value is subtracted from page width)
hlp.posLLY=lower left corner position on Y-axis of a visible signature (negative value is subtracted from page height)
hlp.posURX=upper right corner position on X-axis of a visible signature (negative value is subtracted from page width)
hlp.posURY=upper right corner position on Y-axis of a visible signature (negative value is subtracted from page height)
hlp.printRight=printing rights. Used for encrypted documents. Default value is ALLOW_PRINTING. Available values are {0}
hlp.proxyHost=hostname or IP address of proxy server
hlp.proxyPort=port of proxy server, default value is {0}
hlp.proxyType=proxy type for internet connections. Default value is {0}. Possible values are {1}
hlp.quiet=quiet mode - without info messages during process
hlp.signerName=signer name. Defaults to the common name (CN) of the chosen certificate.
hlp.reason=reason of signature. Empty by default.
hlp.renderMode=render mode for visible signatures. Default value is DESCRIPTION_ONLY. Possible values are {0}
hlp.tsaAuthn=authentication method used when contacting TSA server. Default value is NONE. Possible values are {0}
hlp.tsaCertFile=path to keystore file, which contains private key used to authentication against TSA server, when CERTIFICATE authentication method is used
hlp.tsaCertFileType=keystore type for TSA CERTIFICATE authentication - the default is PKCS12
hlp.tsaCertPasswd=password used to open PKCS#12 file (see -tscf option) with a private key. Use '-' to read from stdin (requires --enable-stdin-passwords).
hlp.tsaHashAlg=hash algorithm used to in query to time-stamping server (TSA); the default is {0}
hlp.tsaPolicy=TSA policy OID which should be set to timestamp request.
hlp.tsaPwd=TSA user password. Use this switch if you use timestamping (-ts) and TSA server requires authentication. Use '-' to read from stdin (requires --enable-stdin-passwords).
hlp.tsaUrl=address of timestamping server (TSA). If you use this argument, the timestamp will be included to signature. (For testing purposes you can try following URL http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=TSA user name. Use this switch if you use timestamping (-ts) and TSA server requires authentication.
hlp.userpwd=user password for encrypted documents (used when -e option is given). Use '-' to read from stdin (requires --enable-stdin-passwords).
hlp.version=shows the application version
hlp.visible=enables visible signature
