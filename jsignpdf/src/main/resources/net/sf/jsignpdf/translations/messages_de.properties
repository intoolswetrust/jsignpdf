hlp.footer.examples=Beispiele:\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\n-> erstellt eine Kopie von mydocument.pdf mit dem Namen mydocument_signed.pdf, die mit dem ersten Zertifikat digital signiert ist, das im standardmäßigen Zertifikatspeicher des Betriebssystems gefunden wurde\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> erzeugt die signierte und verschlüsselte Datei mydocument_signed.pdf, das Drucken der neuen Datei ist nicht erlaubt. Für die Signatur wird der Schlüssel mit dem Alias cert23 aus der Datei my_certificate.pfx verwendet\n------------\n$ java -jar JSignPdf.jar -lkt\n-> listet die Schlüsselspeichertypen auf\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> listet die Namen (Aliase) der in der Datei my_certificate.pfx gespeicherten Schlüssel unter Verwendung des Passworts für den Schlüsselspeicher auf. Der stille Modus ist aktiviert, sodass keine Debug-Informationen ausgegeben werden.
console.crlinfo.distPointNotSupported=Die Erweiterung Verteilungspunkte (Distribution Points extension) wird vom bereitgestellten Zertifikat nicht unterstützt.
console.skippingSigning=Überprüfung der PDF-Datei fehlgeschlagen, Pfade überprüfen. Die Signatur wird nicht erstellt.
#console.updateVersionNotPossibleInAppendMode=Choosen configuration requires PDF version update, but it's not possible in the "append" signature mode.
console.updateVersionNotPossibleInAppendModeForGivenHash=Der ausgewählte Hash-Algorithmus ({0}) erfordert eine neuere PDF-Version ({1}) als im Originaldokument ({2}). Es ist nicht möglich, die Version im Modus "Signatur an vorhandene anhängen" zu ändern. Deaktivieren Sie entweder den Modus "Signatur an vorhandene anhängen" oder wählen Sie eine andere Hash-Funktion. Dies sind die Voraussetzungen der Algorithmen: {3}
error.sslHandshakeException=SSL-Verbindung fehlgeschlagen - das Zertifikat des Servers ist wahrscheinlich nicht bekannt. Sie können das Tool InstallCert verwenden, um das Zertifikat in den Java Keystore zu importieren.
gui.certificateNotForEncryption.error=Die Datei {0} enthält entweder kein X509-Zertifikat oder die Verschlüsselung wird für das Zertifikat nicht unterstützt.
hlp.bgScale=Vergrößerungsverhältnis für das Hintergrundbild der sichtbaren Unterschrift. Optionen: Positive Zahl - Ein Vielfaches dieser Zahl wird verwendet, um die ursprüngliche Bildgröße zu multiplizieren. (z. B. 0,5 eingeben, um zu halbieren). Null – Das Bild wird so skaliert, dass es den gesamten Signaturhintergrund ausfüllt. Negative Zahl – Das Bild wird so skaliert, dass das Seitenverhältnis beibehalten wird und die beste Anpassung den Hintergrund ausfüllt.
hlp.disableAcro6Layers=deaktiviert die Acrobat 6 Ebeneneinstellungen, was bedeutet, dass alle Signaturebenen erstellt werden. Acrobat 6.0 und höher empfiehlt, nur n2- und n4-Ebenen zu erstellen.
hlp.enableStdinPasswords=erlaubt das Lesen von Passwortwerten von der Standardeingabe. Wenn gesetzt, bedeutet der Wert '-' einer Passwortoption: eine Zeile von stdin lesen (oder auf einer Konsole abfragen). Mehrere Passwortoptionen dürfen '-' verwenden und werden in fester Reihenfolge gelesen: --keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password.
hlp.encCert=Pfad zur Zertifikatsdatei, die zum Verschlüsseln der Ausgabe-PDF verwendet werden soll (wenn -encryption CERTIFICATE gesetzt ist)
hlp.outSuffix=Suffix für den signierten Dateinamen. Standardwert ist "_signed" (z. B. wird beim Signieren der Datei mydocument.pdf die neue Datei mydocument_signed.pdf erstellt)
hlp.tsaHashAlg=Hash-Algorithmus, der für die Anfrage an den Zeitstempel-Server (TSA) verwendet wird; der Standardwert ist {0}
hlp.outPrefix=Präfix für die signierte Datei. Standardwert ist ein leeres Präfix.
hlp.page=Seite mit sichtbarer Signatur. Standardwert ist 1 (erste Seite). Wenn die angegebene Seitenzahl außerhalb des zulässigen Bereichs liegt, wird die letzte Seite verwendet.
