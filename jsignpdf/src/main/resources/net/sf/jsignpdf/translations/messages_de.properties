hlp.footer.exitCodes=Programm-Exit-Codes:\n-------------------\n  0 Programm ohne Fehler beendet\n  1 Befehlszeile hat ein falsches Format\n  2 keine Operation angefordert - z. B. keine zu signierenden Dateien\n  3 Signieren einiger - aber nicht aller - Dateien fehlgeschlagen\n  4 Signieren aller Dateien fehlgeschlagen\n  5 Die Eingabedatei kann nicht gelesen werden.\n  6 häufiger Fehler
hlp.help=gibt diesen Hilfebildschirm aus
hlp.keyIndex=Schlüsselreihenfolge (die Sequenz beginnt bei Null), die zum Signieren des Dokuments verwendet werden soll. Wird weder diese Option noch der Schlüsselname (Alias) verwendet, wird der erste im Repository gefundene Schlüssel (Index = 0) verwendet. Diese Option hat weniger Priorität als ein Alias.
hlp.header=JSignPdf ist eine Anwendung zum digitalen Signieren von PDF-Dokumenten. Wenn Sie das Programm ohne Kommandozeilenargument starten, wird die grafische Benutzeroberfläche (GUI) gestartet, andernfalls können Sie JSignPdf im Kommandozeilen-Batch-Modus verwenden.
hlp.proxyHost=Hostname oder IP-Adresse des Proxy-Servers
