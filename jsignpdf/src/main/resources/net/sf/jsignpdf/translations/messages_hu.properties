hlp.append=al\u00E1\u00EDr\u00E1s hozz\u00E1f\u0171z\u00E9se a megl\u00E9v\u0151kh\u00F6z. Alap\u00E9rtelmez\u00E9s szerint a megl\u00E9v\u0151 al\u00E1\u00EDr\u00E1sokat felv\u00E1ltja az \u00FAj.
hlp.bgPath=h\u00E1tt\u00E9rk\u00E9p el\u00E9r\u00E9si \u00FAtja a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1shoz
