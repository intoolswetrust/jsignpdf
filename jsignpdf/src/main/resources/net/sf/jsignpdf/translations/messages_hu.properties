hlp.disableAcro6Layers=letiltja az Acrobat 6 r\u00E9tegm\u00F3dot, azaz az \u00F6sszes al\u00E1\u00EDr\u00E1si r\u00E9teg l\u00E9trej\u00F6n. Az Acrobat 6.0 \u00E9s \u00FAjabb verzi\u00F3i csak az n2 \u00E9s n4 r\u00E9teget aj\u00E1nlj\u00E1k.
hlp.disableAnnot=a jegyzetek m\u00F3dos\u00EDt\u00E1s\u00E1nak tilt\u00E1sa titkos\u00EDtott dokumentumokban
hlp.disableAssembly=az \u00F6ssze\u00E1ll\u00EDt\u00E1s tilt\u00E1sa titkos\u00EDtott dokumentumokban
hlp.disableContent=a tartalom m\u00F3dos\u00EDt\u00E1s\u00E1nak tilt\u00E1sa titkos\u00EDtott dokumentumokban
hlp.disableCopy=a m\u00E1sol\u00E1s tilt\u00E1sa titkos\u00EDtott dokumentumokban
hlp.disableFill=a kit\u00F6lt\u00E9s tilt\u00E1sa titkos\u00EDtott dokumentumokban
hlp.disableScrRead=a k\u00E9perny\u0151olvas\u00F3k tilt\u00E1sa titkos\u00EDtott dokumentumokban
hlp.encCert=annak a tan\u00FAs\u00EDtv\u00E1nyf\u00E1jlnak az el\u00E9r\u00E9si \u00FAtja, amely a kimeneti PDF titkos\u00EDt\u00E1s\u00E1hoz lesz haszn\u00E1lva -encryption CERTIFICATE eset\u00E9n
hlp.encrypted=Ez a tulajdons\u00E1g elavult, haszn\u00E1lja helyette a -encryption PASSWORD param\u00E9tert!
hlp.encryption=a kimeneti PDF titkos\u00EDt\u00E1si m\u00F3dja. Az alap\u00E9rtelmezett \u00E9rt\u00E9k NONE. Lehets\u00E9ges \u00E9rt\u00E9kek: {0}. PASSWORD m\u00F3d eset\u00E9n haszn\u00E1lja a -upwd \u00E9s -opwd param\u00E9tereket, CERTIFICATE m\u00F3d eset\u00E9n pedig a -ec param\u00E9tert.
hlp.footer.examples=P\u00E9ld\u00E1k:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> l\u00E9trehoz egy m\u00E1solatot a mydocument.pdf f\u00E1jlr\u00F3l mydocument_signed.pdf n\u00E9ven, amelyet digit\u00E1lisan al\u00E1\u00EDr az alap\u00E9rtelmezett oper\u00E1ci\u00F3s rendszer tan\u00FAs\u00EDtv\u00E1nyt\u00E1r\u00E1ban tal\u00E1lt els\u0151 tan\u00FAs\u00EDtv\u00E1nnyal\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> l\u00E9trehozza az al\u00E1\u00EDrt \u00E9s titkos\u00EDtott mydocument_signed.pdf f\u00E1jlt, az \u00FAj f\u00E1jl nyomtat\u00E1sa nem enged\u00E9lyezett. Az al\u00E1\u00EDr\u00E1shoz a my_certificate.pfx f\u00E1jlb\u00F3l a cert23 \u00E1lnev\u0171 kulcs haszn\u00E1latos\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> list\u00E1zza a kulcst\u00E1rol\u00F3 t\u00EDpusokat\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> list\u00E1zza a my_certificate.pfx f\u00E1jlban t\u00E1rolt kulcsok neveit (\u00E1lneveit) a kulcst\u00E1rol\u00F3 jelszav\u00E1t haszn\u00E1lva. A csendes m\u00F3d be van kapcsolva, \u00EDgy nem \u00EDr\u00F3dnak ki hibakeres\u0151 inform\u00E1ci\u00F3k.
hlp.footer.exitCodes=Program kil\u00E9p\u00E9si k\u00F3dok:\\r\\n-------------------\\r\\n  0 a program hiba n\u00E9lk\u00FCl befejez\u0151d\u00F6tt\\r\\n  1 a parancssor rossz form\u00E1tum\u00FA\\r\\n  2 nem volt m\u0171velet k\u00E9rve \u2013 pl. nincs al\u00E1\u00EDrand\u00F3 f\u00E1jl megadva\\r\\n  3 n\u00E9h\u00E1ny \u2013 de nem az \u00F6sszes \u2013 f\u00E1jl al\u00E1\u00EDr\u00E1sa meghi\u00FAsult\\r\\n  4 az \u00F6sszes f\u00E1jl al\u00E1\u00EDr\u00E1sa meghi\u00FAsult
hlp.gui=(b\u00E9ta) GUI megjelen\u00EDt\u00E9se akkor is, ha m\u00E1s parancssori argumentumok is meg vannak adva
hlp.hashAlgorithm=az al\u00E1\u00EDr\u00E1shoz haszn\u00E1lt hash algoritmus. Az alap\u00E9rtelmezett \u00E9rt\u00E9k SHA1. El\u00E9rhet\u0151 \u00E9rt\u00E9kek: {0}
hlp.header=A JSignPdf egy alkalmaz\u00E1s PDF dokumentumok digit\u00E1lis al\u00E1\u00EDr\u00E1s\u00E1ra. Ha parancssori argumentum n\u00E9lk\u00FCl ind\u00EDtja a programot, a GUI jelenik meg, egy\u00E9bk\u00E9nt a JSignPdf parancssori k\u00F6tegelt m\u00F3dban is haszn\u00E1lhat\u00F3.
hlp.help=ki\u00EDrja ezt a s\u00FAg\u00F3 k\u00E9perny\u0151t
hlp.imgPath=k\u00E9p el\u00E9r\u00E9si \u00FAtja a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1shoz
hlp.keyAlias=annak a kulcsnak a neve (\u00E1lneve), amely a dokumentum al\u00E1\u00EDr\u00E1s\u00E1hoz haszn\u00E1land\u00F3. Ha ez az opci\u00F3 nincs megadva, a kulcst\u00E1rol\u00F3ban tal\u00E1lhat\u00F3 els\u0151 kulcs lesz haszn\u00E1lva. (A kulcs-\u00E1lnevek list\u00E1z\u00E1sa a -lk param\u00E9terrel)
hlp.keyIndex=annak a kulcsnak a null\u00E1ra alapozott indexe, amely a dokumentum al\u00E1\u00EDr\u00E1s\u00E1hoz haszn\u00E1land\u00F3. Ha sem ez az opci\u00F3, sem az \u00E1ln\u00E9v nincs megadva, a kulcst\u00E1rol\u00F3ban tal\u00E1lhat\u00F3 els\u0151 kulcs (index=0) lesz haszn\u00E1lva. (A kulcs-\u00E1lnevek list\u00E1z\u00E1sa a -lk param\u00E9terrel). Ennek az opci\u00F3nak alacsonyabb a priorit\u00E1sa, mint az \u00E1ln\u00E9vnek.
hlp.keyPwd=a kulcs jelszava a kulcst\u00E1rol\u00F3ban. A legt\u00F6bb esetben nem kell be\u00E1ll\u00EDtani ezt az opci\u00F3t \u2013 \u00E1ltal\u00E1ban csak a kulcst\u00E1rol\u00F3 v\u00E9dett jelsz\u00F3val, de minden eshet\u0151s\u00E9gre :)
hlp.ksFile=be\u00E1ll\u00EDtja a kulcst\u00E1rol\u00F3 f\u00E1jlt \u2013 \u00E9rt\u00E9kk\u00E9nt haszn\u00E1lja annak a f\u00E1jlnak az el\u00E9r\u00E9si \u00FAtj\u00E1t, amelyben a priv\u00E1t kulcs(ok) tal\u00E1lhat\u00F3k (.p12, .pfx, .jks, ...). Egyes kulcst\u00E1rol\u00F3k nem f\u00E1jlban t\u00E1rolj\u00E1k a kulcsokat (pl. Windows kulcst\u00E1rol\u00F3 \u2013 WINDOWS-MY), ilyenkor ne haszn\u00E1lja ezt az opci\u00F3t.
hlp.ksPwd=jelsz\u00F3 a kulcst\u00E1rol\u00F3hoz
hlp.ksType=be\u00E1ll\u00EDtja a kulcst\u00E1rol\u00F3 t\u00EDpus\u00E1t (a lehets\u00E9ges \u00E9rt\u00E9kek list\u00E1zhat\u00F3k a -lkt opci\u00F3val)
hlp.l2Text=al\u00E1\u00EDr\u00E1s sz\u00F6vege, haszn\u00E1lhat hely\u0151rz\u0151ket is az al\u00E1\u00EDr\u00E1s tulajdons\u00E1gaihoz (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=bet\u0171m\u00E9ret a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1s sz\u00F6veg\u00E9hez, alap\u00E9rtelmezett \u00E9rt\u00E9k: {0}
hlp.l4Text=\u00E1llapot sz\u00F6veg
hlp.listKeys=list\u00E1zza a kulcsokat a kiv\u00E1lasztott kulcst\u00E1rol\u00F3ban
hlp.listKsTypes=list\u00E1zza a kulcst\u00E1rol\u00F3 t\u00EDpusokat, amelyek a -kst opci\u00F3 \u00E9rt\u00E9kek\u00E9nt haszn\u00E1lhat\u00F3k
hlp.loadProperties=Bet\u00F6lti a tulajdons\u00E1gokat egy alap\u00E9rtelmezett f\u00E1jlb\u00F3l (amelyet a GUI alkalmaz\u00E1s hoz l\u00E9tre).
hlp.loadPropertiesFile=Bet\u00F6lti a tulajdons\u00E1gokat a megadott f\u00E1jlb\u00F3l. A f\u00E1jl l\u00E9trehozhat\u00F3 a GUI \u00E1ltal a felhaszn\u00E1l\u00F3 saj\u00E1t k\u00F6nyvt\u00E1r\u00E1ban l\u00E9trehozott .JSignPdf alap\u00E9rtelmezett tulajdons\u00E1gf\u00E1jl m\u00E1sol\u00E1s\u00E1val.
hlp.location=az al\u00E1\u00EDr\u00E1s helysz\u00EDne (pl. Washington DC). Alap\u00E9rtelmez\u00E9s szerint \u00FCres.
hlp.ocsp=OCSP tan\u00FAs\u00EDtv\u00E1ny \u00E9rv\u00E9nyes\u00EDt\u00E9s enged\u00E9lyez\u00E9se
hlp.ocspServerUrl=alap\u00E9rtelmezett OCSP szerver URL, amely akkor lesz haszn\u00E1lva, ha az al\u00E1\u00EDr\u00F3 tan\u00FAs\u00EDtv\u00E1ny nem tartalmazza ezt az inform\u00E1ci\u00F3t
hlp.outPath=az a mappa, amelybe az al\u00E1\u00EDrt dokumentumok ment\u00E9sre ker\u00FClnek. Alap\u00E9rtelmezett \u00E9rt\u00E9k az aktu\u00E1lis mappa.
hlp.outPrefix=el\u0151tag az al\u00E1\u00EDrt f\u00E1jlhoz. Alap\u00E9rtelmezett \u00E9rt\u00E9k az \u00FCres el\u0151tag.
hlp.outSuffix=ut\u00F3tag az al\u00E1\u00EDrt f\u00E1jln\u00E9vhez. Alap\u00E9rtelmezett \u00E9rt\u00E9k: "_signed". (pl. a mydocument.pdf f\u00E1jl al\u00E1\u00EDr\u00E1sa l\u00E9trehozza a mydocument_signed.pdf f\u00E1jlt)
hlp.ownerpwd=tulajdonosi jelsz\u00F3 titkos\u00EDtott dokumentumokhoz (a -e opci\u00F3 megad\u00E1sa eset\u00E9n haszn\u00E1latos)
hlp.page=az oldal a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1ssal. Alap\u00E9rtelmezett \u00E9rt\u00E9k 1 (els\u0151 oldal). Ha a megadott oldalsz\u00E1m k\u00EDv\u00FCl esik a tartom\u00E1nyon, az utols\u00F3 oldal lesz haszn\u00E1lva.
hlp.posLLX=a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1s bal als\u00F3 sark\u00E1nak poz\u00EDci\u00F3ja az X tengelyen (negat\u00EDv \u00E9rt\u00E9k az oldalsz\u00E9less\u00E9gb\u0151l lesz kivonva)
hlp.posLLY=a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1s bal als\u00F3 sark\u00E1nak poz\u00EDci\u00F3ja az Y tengelyen (negat\u00EDv \u00E9rt\u00E9k az oldal magass\u00E1g\u00E1b\u00F3l lesz kivonva)
hlp.posURX=a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1s jobb fels\u0151 sark\u00E1nak poz\u00EDci\u00F3ja az X tengelyen (negat\u00EDv \u00E9rt\u00E9k az oldalsz\u00E9less\u00E9gb\u0151l lesz kivonva)
hlp.posURY=a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1s jobb fels\u0151 sark\u00E1nak poz\u00EDci\u00F3ja az Y tengelyen (negat\u00EDv \u00E9rt\u00E9k az oldal magass\u00E1g\u00E1b\u00F3l lesz kivonva)
hlp.printRight=nyomtat\u00E1si jogok. Titkos\u00EDtott dokumentumokhoz haszn\u00E1latos. Alap\u00E9rtelmezett \u00E9rt\u00E9k: ALLOW_PRINTING. El\u00E9rhet\u0151 \u00E9rt\u00E9kek: {0}
hlp.proxyHost=a proxy szerver g\u00E9pneve vagy IP-c\u00EDme
hlp.proxyPort=proxy szerver portja, alap\u00E9rtelmezett \u00E9rt\u00E9k: {0}
hlp.proxyType=proxy t\u00EDpusa az internetkapcsolatokhoz. Alap\u00E9rtelmezett \u00E9rt\u00E9k: {0}. Lehets\u00E9ges \u00E9rt\u00E9kek: {1}
hlp.quiet=csendes m\u00F3d \u2013 inform\u00E1ci\u00F3s \u00FCzenetek n\u00E9lk\u00FCl a folyamat sor\u00E1n
hlp.reason=az al\u00E1\u00EDr\u00E1s indoka. Alap\u00E9rtelmez\u00E9s szerint \u00FCres.
hlp.renderMode=megjelen\u00EDt\u00E9si m\u00F3d a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1shoz. Alap\u00E9rtelmezett \u00E9rt\u00E9k: DESCRIPTION_ONLY. Lehets\u00E9ges \u00E9rt\u00E9kek: {0}
hlp.signerName=al\u00E1\u00EDr\u00F3 neve. Alap\u00E9rtelmez\u00E9s szerint a kiv\u00E1lasztott tan\u00FAs\u00EDtv\u00E1ny k\u00F6znapi nev\u00E9t (CN) veszi fel.
hlp.tsaAuthn=a TSA szerverrel val\u00F3 kommunik\u00E1ci\u00F3 sor\u00E1n haszn\u00E1lt hiteles\u00EDt\u00E9si m\u00F3dszer. Alap\u00E9rtelmezett \u00E9rt\u00E9k: NONE. Lehets\u00E9ges \u00E9rt\u00E9kek: {0}
hlp.tsaCertFile=annak a kulcst\u00E1rol\u00F3 f\u00E1jlnak az el\u00E9r\u00E9si \u00FAtja, amely a TSA szerverrel szembeni hiteles\u00EDt\u00E9shez haszn\u00E1lt priv\u00E1t kulcsot tartalmazza, ha a CERTIFICATE hiteles\u00EDt\u00E9si m\u00F3dszer van haszn\u00E1lva
hlp.tsaCertFileType=kulcst\u00E1rol\u00F3 t\u00EDpus a TSA CERTIFICATE hiteles\u00EDt\u00E9shez \u2013 az alap\u00E9rtelmezett a PKCS12
hlp.tsaCertPasswd=a priv\u00E1t kulcsot tartalmaz\u00F3 PKCS#12 f\u00E1jl (l\u00E1sd a -tscf opci\u00F3t) megnyit\u00E1s\u00E1hoz haszn\u00E1lt jelsz\u00F3
hlp.tsaHashAlg=az id\u0151b\u00E9lyeg szerverhez (TSA) k\u00FCld\u00F6tt lek\u00E9rdez\u00E9sben haszn\u00E1lt hash algoritmus; az alap\u00E9rtelmezett: {0}
hlp.tsaPolicy=TSA szab\u00E1lyzat OID, amelyet az id\u0151b\u00E9lyeg-k\u00E9r\u00E9shez kell be\u00E1ll\u00EDtani.
hlp.tsaPwd=TSA felhaszn\u00E1l\u00F3i jelsz\u00F3. Haszn\u00E1lja ezt a kapcsol\u00F3t, ha id\u0151b\u00E9lyegz\u00E9st haszn\u00E1l (-ts) \u00E9s a TSA szerver hiteles\u00EDt\u00E9st ig\u00E9nyel.
hlp.tsaUrl=az id\u0151b\u00E9lyeg szerver (TSA) c\u00EDme. Ha haszn\u00E1lja ezt az argumentumot, az id\u0151b\u00E9lyeg beker\u00FCl az al\u00E1\u00EDr\u00E1sba. (Tesztel\u00E9shez kipr\u00F3b\u00E1lhatja a k\u00F6vetkez\u0151 URL-t: http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=TSA felhaszn\u00E1l\u00F3n\u00E9v. Haszn\u00E1lja ezt a kapcsol\u00F3t, ha id\u0151b\u00E9lyegz\u00E9st haszn\u00E1l (-ts) \u00E9s a TSA szerver hiteles\u00EDt\u00E9st ig\u00E9nyel.
hlp.userpwd=felhaszn\u00E1l\u00F3i jelsz\u00F3 titkos\u00EDtott dokumentumokhoz (a -e opci\u00F3 megad\u00E1sa eset\u00E9n haszn\u00E1latos)
hlp.version=megjelen\u00EDti az alkalmaz\u00E1s verzi\u00F3j\u00E1t
hlp.visible=enged\u00E9lyezi a l\u00E1that\u00F3 al\u00E1\u00EDr\u00E1st
pdfEncryption.certificate=Tan\u00FAs\u00EDtv\u00E1ny
pdfEncryption.notEncrypted=Nincs titkos\u00EDtva
pdfEncryption.password=Jelszavak
render.descriptionOnly=Csak le\u00EDr\u00E1s
render.graphicAndDescription=K\u00E9p \u00E9s le\u00EDr\u00E1s
render.signameAndDescription=Al\u00E1\u00EDr\u00E1s neve \u00E9s le\u00EDr\u00E1sa
rights.allowDegradedPrinting=Cs\u00F6kkentett enged\u00E9lyez\u00E9se
rights.disallowPrinting=Tilt\u00E1s
serverAuthn.none=Hiteles\u00EDt\u00E9s n\u00E9lk\u00FCl
ssl.keymanager.init=Kulcskezel\u0151 inicializ\u00E1l\u00E1sa a(z) {0} kulcst\u00E1rol\u00F3 f\u00E1jlb\u00F3l.
