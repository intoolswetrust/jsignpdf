hlp.bgScale=háttérkép méretezése a látható aláíráshoz. Pozitív értéket megadva a kép mérete az adott értékkel lesz megszorozva. Nulla érték esetén az egész háttér ki lesz töltve a képpel (nyújtás). Negatív értéket megadva a kép a legjobban illeszkedő méretre lesz átméretezve.
hlp.certLevel=tanúsítási szint. Az alapértelmezett érték NOT_CERTIFIED. Elérhető értékek: {0}
hlp.contact=az aláíró kapcsolattartási adatai (aláírás mező)
hlp.crl=CRL tanúsítvány érvényesítés engedélyezése
hlp.disableAcro6Layers=letiltja az Acrobat 6 rétegmódot, azaz az összes aláírási réteg létrejön. Az Acrobat 6.0 és újabb verziói csak az n2 és n4 réteget ajánlják.
hlp.disableAnnot=a jegyzetek módosításának tiltása titkosított dokumentumokban
hlp.disableAssembly=az összeállítás tiltása titkosított dokumentumokban
hlp.disableContent=a tartalom módosításának tiltása titkosított dokumentumokban
hlp.disableCopy=a másolás tiltása titkosított dokumentumokban
hlp.disableFill=a kitöltés tiltása titkosított dokumentumokban
hlp.disableScrRead=a képernyőolvasók tiltása titkosított dokumentumokban
hlp.enableStdinPasswords=engedélyezi jelszóértékek olvasását a szabványos bemenetről. Beállítva egy jelszóparaméter '-' értéke azt jelenti: egy sor beolvasása a szabványos bemenetről (vagy bekérés konzolon). Több jelszóparaméter is használhatja a '-'-t, ezek rögzített sorrendben olvasódnak be: --keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password.
hlp.encCert=annak a tanúsítványfájlnak az elérési útja, amely a kimeneti PDF titkosításához lesz használva -encryption CERTIFICATE esetén
hlp.encrypted=Ez a tulajdonság elavult, használja helyette a -encryption PASSWORD paramétert!
hlp.encryption=a kimeneti PDF titkosítási módja. Az alapértelmezett érték NONE. Lehetséges értékek: {0}. PASSWORD mód esetén használja a -upwd és -opwd paramétereket, CERTIFICATE mód esetén pedig a -ec paramétert.
hlp.footer.examples=Példák:\\r\\n---------\\r\\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\\r\\n-> létrehoz egy másolatot a mydocument.pdf fájlról mydocument_signed.pdf néven, amelyet digitálisan aláír az alapértelmezett operációs rendszer tanúsítványtárában talált első tanúsítvánnyal\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\\r\\n-> létrehozza az aláírt és titkosított mydocument_signed.pdf fájlt, az új fájl nyomtatása nem engedélyezett. Az aláíráshoz a my_certificate.pfx fájlból a cert23 álnevű kulcs használatos\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -lkt\\r\\n-> listázza a kulcstároló típusokat\\r\\n------------\\r\\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\\r\\n-> listázza a my_certificate.pfx fájlban tárolt kulcsok neveit (álneveit) a kulcstároló jelszavát használva. A csendes mód be van kapcsolva, így nem íródnak ki hibakereső információk.
hlp.footer.exitCodes=Program kilépési kódok:\\r\\n-------------------\\r\\n  0 a program hiba nélkül befejeződött\\r\\n  1 a parancssor rossz formátumú\\r\\n  2 nem volt művelet kérve – pl. nincs aláírandó fájl megadva\\r\\n  3 néhány – de nem az összes – fájl aláírása meghiúsult\\r\\n  4 az összes fájl aláírása meghiúsult
hlp.gui=(béta) GUI megjelenítése akkor is, ha más parancssori argumentumok is meg vannak adva
hlp.hashAlgorithm=az aláíráshoz használt hash algoritmus. Az alapértelmezett érték SHA1. Elérhető értékek: {0}
hlp.header=A JSignPdf egy alkalmazás PDF dokumentumok digitális aláírására. Ha parancssori argumentum nélkül indítja a programot, a GUI jelenik meg, egyébként a JSignPdf parancssori kötegelt módban is használható.
hlp.help=kiírja ezt a súgó képernyőt
hlp.imgPath=kép elérési útja a látható aláíráshoz
hlp.keyAlias=annak a kulcsnak a neve (álneve), amely a dokumentum aláírásához használandó. Ha ez az opció nincs megadva, a kulcstárolóban található első kulcs lesz használva. (A kulcs-álnevek listázása a -lk paraméterrel)
hlp.keyIndex=annak a kulcsnak a nullára alapozott indexe, amely a dokumentum aláírásához használandó. Ha sem ez az opció, sem az álnév nincs megadva, a kulcstárolóban található első kulcs (index=0) lesz használva. (A kulcs-álnevek listázása a -lk paraméterrel). Ennek az opciónak alacsonyabb a prioritása, mint az álnévnek.
hlp.keyPwd=a kulcs jelszava a kulcstárolóban. A legtöbb esetben nem kell beállítani ezt az opciót – általában csak a kulcstároló védett jelszóval, de minden eshetőségre :) A '-' használatával a jelszó a szabványos bemenetről olvasható be (szükséges: --enable-stdin-passwords).
hlp.ksFile=beállítja a kulcstároló fájlt – értékként használja annak a fájlnak az elérési útját, amelyben a privát kulcs(ok) találhatók (.p12, .pfx, .jks, ...). Egyes kulcstárolók nem fájlban tárolják a kulcsokat (pl. Windows kulcstároló – WINDOWS-MY), ilyenkor ne használja ezt az opciót.
hlp.ksPwd=jelszó a kulcstárolóhoz. A '-' használatával a jelszó a szabványos bemenetről olvasható be (szükséges: --enable-stdin-passwords).
hlp.ksType=beállítja a kulcstároló típusát (a lehetséges értékek listázhatók a -lkt opcióval)
hlp.l2Text=aláírás szövege, használhat helyőrzőket is az aláírás tulajdonságaihoz (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=betűméret a látható aláírás szövegéhez, alapértelmezett érték: {0}
hlp.l4Text=állapot szöveg
hlp.listKeys=listázza a kulcsokat a kiválasztott kulcstárolóban
hlp.listKsTypes=listázza a kulcstároló típusokat, amelyek a -kst opció értékeként használhatók
hlp.loadProperties=Betölti a tulajdonságokat egy alapértelmezett fájlból (amelyet a GUI alkalmazás hoz létre).
hlp.loadPropertiesFile=Betölti a tulajdonságokat a megadott fájlból. A fájl létrehozható a GUI által a felhasználó saját könyvtárában létrehozott .JSignPdf alapértelmezett tulajdonságfájl másolásával.
hlp.location=az aláírás helyszíne (pl. Washington DC). Alapértelmezés szerint üres.
hlp.ocsp=OCSP tanúsítvány érvényesítés engedélyezése
hlp.ocspServerUrl=alapértelmezett OCSP szerver URL, amely akkor lesz használva, ha az aláíró tanúsítvány nem tartalmazza ezt az információt
hlp.outPath=az a mappa, amelybe az aláírt dokumentumok mentésre kerülnek. Alapértelmezett érték az aktuális mappa.
hlp.outPrefix=előtag az aláírt fájlhoz. Alapértelmezett érték az üres előtag.
hlp.outSuffix=utótag az aláírt fájlnévhez. Alapértelmezett érték: "_signed". (pl. a mydocument.pdf fájl aláírása létrehozza a mydocument_signed.pdf fájlt)
hlp.ownerpwd=tulajdonosi jelszó titkosított dokumentumokhoz (a -e opció megadása esetén használatos). A '-' használatával a jelszó a szabványos bemenetről olvasható be (szükséges: --enable-stdin-passwords).
hlp.page=az oldal a látható aláírással. Alapértelmezett érték 1 (első oldal). Ha a megadott oldalszám kívül esik a tartományon, az utolsó oldal lesz használva.
hlp.posLLX=a látható aláírás bal alsó sarkának pozíciója az X tengelyen (negatív érték az oldalszélességből lesz kivonva)
hlp.posLLY=a látható aláírás bal alsó sarkának pozíciója az Y tengelyen (negatív érték az oldal magasságából lesz kivonva)
hlp.posURX=a látható aláírás jobb felső sarkának pozíciója az X tengelyen (negatív érték az oldalszélességből lesz kivonva)
hlp.posURY=a látható aláírás jobb felső sarkának pozíciója az Y tengelyen (negatív érték az oldal magasságából lesz kivonva)
hlp.printRight=nyomtatási jogok. Titkosított dokumentumokhoz használatos. Alapértelmezett érték: ALLOW_PRINTING. Elérhető értékek: {0}
hlp.proxyHost=a proxy szerver gépneve vagy IP-címe
hlp.proxyPort=proxy szerver portja, alapértelmezett érték: {0}
hlp.proxyType=proxy típusa az internetkapcsolatokhoz. Alapértelmezett érték: {0}. Lehetséges értékek: {1}
hlp.quiet=csendes mód – információs üzenetek nélkül a folyamat során
hlp.reason=az aláírás indoka. Alapértelmezés szerint üres.
hlp.renderMode=megjelenítési mód a látható aláíráshoz. Alapértelmezett érték: DESCRIPTION_ONLY. Lehetséges értékek: {0}
hlp.signerName=aláíró neve. Alapértelmezés szerint a kiválasztott tanúsítvány köznapi nevét (CN) veszi fel.
hlp.tsaAuthn=a TSA szerverrel való kommunikáció során használt hitelesítési módszer. Alapértelmezett érték: NONE. Lehetséges értékek: {0}
hlp.tsaCertFile=annak a kulcstároló fájlnak az elérési útja, amely a TSA szerverrel szembeni hitelesítéshez használt privát kulcsot tartalmazza, ha a CERTIFICATE hitelesítési módszer van használva
hlp.tsaCertFileType=kulcstároló típus a TSA CERTIFICATE hitelesítéshez – az alapértelmezett a PKCS12
hlp.tsaCertPasswd=a privát kulcsot tartalmazó PKCS#12 fájl (lásd a -tscf opciót) megnyitásához használt jelszó. A '-' használatával a jelszó a szabványos bemenetről olvasható be (szükséges: --enable-stdin-passwords).
hlp.tsaHashAlg=az időbélyeg szerverhez (TSA) küldött lekérdezésben használt hash algoritmus; az alapértelmezett: {0}
hlp.tsaPolicy=TSA szabályzat OID, amelyet az időbélyeg-kéréshez kell beállítani.
hlp.tsaPwd=TSA felhasználói jelszó. Használja ezt a kapcsolót, ha időbélyegzést használ (-ts) és a TSA szerver hitelesítést igényel. A '-' használatával a jelszó a szabványos bemenetről olvasható be (szükséges: --enable-stdin-passwords).
hlp.tsaUrl=az időbélyeg szerver (TSA) címe. Ha használja ezt az argumentumot, az időbélyeg bekerül az aláírásba. (Teszteléshez kipróbálhatja a következő URL-t: http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=TSA felhasználónév. Használja ezt a kapcsolót, ha időbélyegzést használ (-ts) és a TSA szerver hitelesítést igényel.
hlp.userpwd=felhasználói jelszó titkosított dokumentumokhoz (a -e opció megadása esetén használatos). A '-' használatával a jelszó a szabványos bemenetről olvasható be (szükséges: --enable-stdin-passwords).
hlp.version=megjeleníti az alkalmazás verzióját
hlp.visible=engedélyezi a látható aláírást
pdfEncryption.certificate=Tanúsítvány
pdfEncryption.notEncrypted=Nincs titkosítva
pdfEncryption.password=Jelszavak
render.descriptionOnly=Csak leírás
render.graphicAndDescription=Kép és leírás
render.signameAndDescription=Aláírás neve és leírása
rights.allowDegradedPrinting=Csökkentett engedélyezése
rights.disallowPrinting=Tiltás
serverAuthn.none=Hitelesítés nélkül
ssl.keymanager.init=Kulcskezelő inicializálása a(z) {0} kulcstároló fájlból.
