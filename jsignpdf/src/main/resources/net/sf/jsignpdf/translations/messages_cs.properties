hlp.keyIndex=pořadí klíče (posloupnost začíná nulou), který má být použi k podepsání dokumentu. Jestliže ani tato volba ani jméno (alias) klíče není použito, pak je použit první klíč (index=0) nalezený v úložišti. Tato volba má menší prioritu než alias.
hlp.footer.exitCodes=Exit kódy programu:\n-------------------\n  0 skončeno bez chyb\n  1 chybné argumenty\n  2 žadná operace nebyla požadována - např. neuvedeny žádné soubory k podepsání\n  3 podepsání některých - ale ne všech - souborů selhalo\n  4 podepsání všech souborů selhalo
hlp.footer.examples=Příklady:\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\n-> vytvoří digitálně podepsanou kopii souboru mydocument.pdf pod jménem mydocument_signed.pdf. Podpis je vytvořen pomocí prvního osobního certifikátu nalezeného ve výchozím úložišti certifikátů systému Windows\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> vytvoří podepsaný a zašifrovaný soubor mydocument_signed.pdf, tisk podepsaného dokumentu není povolen. Pro podpis je použit klíč se jménem cert23 z úložiště typu PKCS12 v souboru my_certificate.pfx\n------------\n$ java -jar JSignPdf.jar -lkt\n-> vypíše typy úložišť\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> vypíše jména (aliasy) klíčů uložených v úložišti my_certificate.pfx. Pro přístup do úložiště je použito heslo. Je použit tichý mód, takže nebudou vytištěny žádné dodatečné informace.
