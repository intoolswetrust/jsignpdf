hlp.footer.examples=PĹ™Ă­klady:\n---------\n$ java -jar JSignPdf.jar -kst WINDOWS-MY mydocument.pdf\n-> vytvoĹ™Ă­ digitĂˇlnÄ› podepsanou kopii souboru mydocument.pdf pod jmĂ©nem mydocument_signed.pdf. Podpis je vytvoĹ™en pomocĂ­ prvnĂ­ho osobnĂ­ho certifikĂˇtu nalezenĂ©ho ve vĂ˝chozĂ­m ĂşloĹľiĹˇti certifikĂˇtĹŻ systĂ©mu Windows\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myPrivateKeystorePassword -ka cert23 -pe PASSWORD -opwd xxx123 -upwd 123xxx -pr DISALLOW_PRINTING mydocument.pdf\n-> vytvoĹ™Ă­ podepsanĂ˝ a zaĹˇifrovanĂ˝ soubor mydocument_signed.pdf, tisk podepsanĂ©ho dokumentu nenĂ­ povolen. Pro podpis je pouĹľit klĂ­ÄŤ se jmĂ©nem cert23 z ĂşloĹľiĹˇtÄ› typu PKCS12 v souboru my_certificate.pfx\n------------\n$ java -jar JSignPdf.jar -lkt\n-> vypĂ­Ĺˇe typy ĂşloĹľiĹˇĹĄ\n------------\n$ java -jar JSignPdf.jar -kst PKCS12 -ksf my_certificate.pfx -ksp myVeryPrivatePassword -lk -q\n-> vypĂ­Ĺˇe jmĂ©na (aliasy) klĂ­ÄŤĹŻ uloĹľenĂ˝ch v ĂşloĹľiĹˇti my_certificate.pfx. Pro pĹ™Ă­stup do ĂşloĹľiĹˇtÄ› je pouĹľito heslo. Je pouĹľit tichĂ˝ mĂłd, takĹľe nebudou vytiĹˇtÄ›ny ĹľĂˇdnĂ© dodateÄŤnĂ© informace.
