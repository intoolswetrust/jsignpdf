hlp.append=přidání podpisu k již existujícím. Výchozí nastavení nahrazuje existující podpisy novým.
hlp.bgPath=cesta k souboru s obrázkem na pozadí viditelnému podpisu
hlp.bgScale=poměr zvětšení pro obrázek na pozadí viditelného podpisu. Možnosti: Kladné číslo - násobek tohoto čísla bude použit k vynásobení původní velikosti obrázku. (např. pro zmenšení na polovinu zadejte 0.5). Nula - velikost obrázku bude změněna tak aby vyplnil celé pozadí podpisu. Záporné číslo - velikost obrázku bude změněna tak, aby poměr stran zůstal zachován a aby co nejlépe vyplnil pozadí (best fit).
hlp.certLevel=úroveň certifikace. Výchozí hodnota je NOT_CERTIFIED. Možné hodnoty: {0}
hlp.contact=kontakt na podepisujícího (položka podpisu)
hlp.crl=povoluje CRL validaci certifikátu
hlp.disableAcro6Layers=vypíná nastavení vrstev z Acrobatu 6, to znamená, že všechny vrstvy podpisu budou vytvořeny. Acrobat 6.0 a vyšší doporučují vytvořit pouze vrstvy podpisu n2 a n4.
hlp.disableAnnot=zakáže úpravu anotací u kódovaných dokumentů
hlp.disableAssembly=zakáže sestavení (assembly) u kódovaných dokumentů
hlp.disableContent=zakáže úpravu obsahu u kódovaných dokumentů
hlp.disableCopy=zakáže kopírování z kódovaných dokumentů
hlp.disableFill=zakáže vyplňování kódovaných dokumentů
hlp.disableScrRead=zakáže screen-readery u kódovaných dokumentů
hlp.enableStdinPasswords=povolí čtení hodnot hesel ze standardního vstupu. Je-li nastaveno, hodnota '-' u heslové volby znamená: přečíst jeden řádek ze stdin (nebo se zeptat na konzoli). Více heslových voleb může použít '-' a jsou čtena v pevném pořadí: --keystore-password, --key-password, --owner-password, --user-password, --tsa-cert-password, --tsa-password.
hlp.encCert=cesta k souboru s certifikátem, který má být použit pro zakódování výstupního PDF (v případě, že je nastaven -encryption CERTIFICATE)
hlp.encrypted=Tento přepínač nebude v budoucnu podporován, použijte místo něho -encryption PASSWORD!
hlp.encryption=typ kódování výstupního dokumentu. Výchozí hodnota je NONE (žádné). Možné hodnoty: {0}. Použijte tento přepínač společně s -upwd a -opwd pro typ PASSWORD a -ec pro typ CERTIFICATE
hlp.hashAlgorithm=hešovací funkce použitá pro podpis. Výchozí hodnota je SHA1. Možné hodnoty jsou {0}
hlp.header=JSignPdf je program, který slouží k digitálnímu podepisování PDF dokumentů. Při spuštění bez parametrů na příkazové řádce je spuštěno grafické uživatelské rozhraní. Jsou-li na parametry příkazové řádce přítomny je použit dávkový mód zpracování bez GUI.
hlp.help=zobrazí tuto obrazovku s nápovědou
hlp.imgPath=cesta k souboru s obrázkem k viditelnému podpisu
hlp.keyAlias=jméno (alias) klíče ze zvoleného úložiště, který má být použitý pro podepsání dokumentu. Jestliže tato volba není použita, je automaticky volen první klíč ve zvoleném úložišti. (Seznam možných jmen klíčů získáte pomocí volby -lk).
hlp.keyPwd=heslo klíče v úložišti. Většinou nemusíte tuto volbu nastavovat - heslem bývají chráněna v prvé řadě úložiště. Ale pro všechny případy tuto možnost máte. Použijte '-' pro čtení ze standardního vstupu (vyžaduje --enable-stdin-passwords).
hlp.ksFile=nastaví cestu k souboru úložiště klíčů - jako hodnotu použijte soubor s vašimi privátními klíči (.p12, .pfx, .jks, ...). Některé typy úložišť klíčů nepracují s externími soubory (např. nativní úložiště na windows - WINDOWS-MY), u těchto úložišť tuto volbu neuvádějte.
hlp.ksPwd=heslo pro úložiště klíčů. Použijte '-' pro čtení ze standardního vstupu (vyžaduje --enable-stdin-passwords).
hlp.ksType=nastavuje typ úložiště (seznam možných typů získáte použitím argumentu -lkt)
hlp.l2Text=text podpisu, můžete použít zástupné výrazy, které budou nahrazeny atributy podpisu (${signer}, ${certificate}, ${timestamp}, ${location}, ${reason}, ${contact})
hlp.l2TextFontSize=velikost fontu použitého pro text viditelného podpisu, výchozí velikost je {0}
hlp.l4Text=status text
hlp.listKeys=vylistuje seznam klíčů ve zvoleném úložišti
hlp.listKsTypes=vylistuje typy úložišť klíčů (keystore types), které mohou být použity jako hodnoty pro volbu -kst
hlp.loadProperties=Načítá nastavení ze standartního souboru vytvářeného při použití JSignPdf GUI.
hlp.loadPropertiesFile=Načítá nastavení programu ze zadaného souboru. Použitý soubor může být vytvořený zkopírováním výchozího souboru .JSignPdf vytvořeného při spuštění GUI v uživatelském domovském adresáři.
hlp.location=nastavení místa (location) podpisu (např. Brno). Výchozí hodnota je prázdná.
hlp.ocsp=povoluje OCSP validaci certifikátu
hlp.ocspServerUrl=adresa OCSP serveru, která bude použita v případě, že certifikát tuto informaci neobsahuje
hlp.outPath=adresář do kterého budou umístěny podepsaná PDF. Výchozím nastavením je současný adresář.
hlp.outPrefix=prefix podepsaného souboru. Výchozí hodnota je prázdný prefix.
hlp.outSuffix=suffix (přípona) podepsaného souboru. Výchozí hodnota je "_signed". Např. při podepsání souboru dokument.pdf bude vytvořen soubor dokument_signed.pdf
hlp.ownerpwd=heslo vlastníka (owner password) použité je-li zapnuté kódování podepsaného dokumentu (-e). Použijte '-' pro čtení ze standardního vstupu (vyžaduje --enable-stdin-passwords).
hlp.page=stránka na kterou bude umístěn viditelný podpis. Výchozí hodnota je 1 (první stránka)
hlp.posLLX=pozice na ose X levého dolního rohu viditelného podpisu (při použití záporné hodnoty je hodnota odečtena od šiřky stránky)
hlp.posLLY=pozice na ose Y levého dolního rohu viditelného podpisu (při použití záporné hodnoty je hodnota odečtena od výšky stránky)
hlp.posURX=pozice na ose X pravého horního rohu viditelného podpisu (při použití záporné hodnoty je hodnota odečtena od šiřky stránky)
hlp.posURY=pozice na ose Y pravého horního rohu viditelného podpisu (při použití záporné hodnoty je hodnota odečtena od výšky stránky)
hlp.printRight=nastavení práv k tisku dokumentu. Použito, je-li zapnuto kódování dokumentu. Výchozí hodnota je ALLOW_PRINTING. Možné hodnoty: {0}
hlp.proxyHost=jméno nebo IP adresa proxy serveru
hlp.proxyPort=port proxy serveru. Výchozí hodnota je {0}
hlp.proxyType=typ proxy serveru pro internetová spojení. Výchozí hodnota je {0}. Možné hodnoty: {1}
hlp.quiet=tichý mód - bez informací o průběhu podepisování
hlp.reason=důvod (reason) podpisu. Výchozí hodnota je prázdná.
hlp.renderMode=typ zobrazení viditelného podpisu. Výchozí hodnota je DESCRIPTION_ONLY. Možné hodnoty: {0}
hlp.tsaAuthn=autentizační metoda použitá při komunikaci s TSA serverem. Výchozí hodnota je NONE. Možné hodnoty: {0}
hlp.tsaCertFile=cesta k úložišti klíčů, které obsahuje privátní klíč pro použití k autentizaci oproti TSA serveru v případě, že zvolená autentizační metoda je CERTIFICATE
hlp.tsaCertFileType=typ úložiště klíčů pro TSA autentizaci typu CERTIFICATE, výchozí hodnota je PKCS12
hlp.tsaCertPasswd=heslo použité k otevření PKCS#12 souboru (viz. argument -tscf) s privátním klíčem. Použijte '-' pro čtení ze standardního vstupu (vyžaduje --enable-stdin-passwords).
hlp.tsaHashAlg=hešovací algoritmus použitý při získávání časového razítka od TSA serveru; výchozí hodnota je {0}
hlp.tsaPolicy=OID politiky serveru časového razítka.
hlp.tsaPwd=uživatelské heslo pro TSA. Použijte tuto volbu jestliže využíváte časová razítka (-ts) a TSA server vyžaduje autentizaci. Použijte '-' pro čtení ze standardního vstupu (vyžaduje --enable-stdin-passwords).
hlp.tsaUrl=adresa TSA serveru (timestamping authority). Při použití tohoto argumentu, bude k podpisu přiloženo časové razítko (timestamp) z daného serveru. (můžete např zkusit url http://dse200.ncipher.com/TSS/HttpTspServer)
hlp.tsaUser=uživatelské jméno pro TSA. Použijte tuto volbu jestliže využíváte časová razítka (-ts) a TSA server vyžaduje autentizaci.
