# Bundled defaults for the advanced JSignPdf configuration.
# These values are the in-jvm fallback when the user has not set the
# corresponding key in <cfg>/advanced.properties, and the source for the
# Preferences dialog "Reset to defaults" action.
#
# DO NOT edit at runtime. User overrides live in <cfg>/advanced.properties.

# Path to a TTF/OTF font used to render the visible signature L2 text.
# Empty value -> JSignPdf uses the bundled DejaVuSans font.
font.path=

# Font name used when calling OpenPDF BaseFont.createFont. Empty value ->
# basename of font.path is used; falls back to the bundled font name.
font.name=

# Font encoding. Allowed: Cp1250, Cp1252, Cp1257, Identity-H, Identity-V,
# MacRoman. Empty -> WINANSI when font.path is set, Identity-H for the
# bundled DejaVuSans.
font.encoding=

# When true, expired or not-yet-valid certificates are filtered from the
# alias list.
certificate.checkValidity=true

# When true, only certificates whose KeyUsage includes digitalSignature
# or nonRepudiation are listed.
certificate.checkKeyUsage=true

# When true, certificates with critical extensions outside JSignPdf's
# known set (KeyUsage, SubjectAltName, BasicConstraints, CertificateIssuer,
# ExtendedKeyUsage) are rejected.
certificate.checkCriticalExtensions=false

# When true, hostname verification is disabled and all server certificates
# are trusted for TSA / OCSP / CRL traffic. Use only on trusted networks.
relax.ssl.security=false

# Comma-separated, ordered list of preview backends. The first library
# that succeeds is used. Allowed tokens: jpedal, pdfbox, openpdf.
pdf2image.libraries=jpedal,pdfbox,openpdf

# Default hash algorithm requested when stamping a signature with a TSA
# (used when the signer options don't override it).
tsa.hashAlgorithm=SHA-256
